    <script>
        // --- ÂM THANH ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU ---
        const hanziData = [

            { char: '说', pinyin: 'shuō', meaning: 'nói', type: 'Hình thanh', radical: '讠 (Ngôn)', memo: 'Dùng lời nói (讠) để trao đổi NÓI chuyện.' },
            { char: '菜', pinyin: 'cài', meaning: 'món ăn, rau', type: 'Hình thanh', radical: '艹 (Thảo)', memo: 'Món ăn làm từ rau cỏ (艹) hái trên cây (木) bởi bàn tay (爫).' },
            { char: '做', pinyin: 'zuò', meaning: 'làm, nấu', type: 'Hình thanh', radical: '亻 (Nhân)', memo: 'Người (亻) đang cầm công cụ cổ (故) để LÀM việc.' },
            { char: '写', pinyin: 'xiě', meaning: 'viết', type: 'Hội ý', radical: '冖 (Mịch - mái che)', memo: 'Dưới mái che (冖) đang VIẾT chữ (与).' },
            { char: '怎', pinyin: 'zěn', meaning: 'thế nào', type: 'Hình thanh', radical: '心 (Tâm)', memo: 'Lòng (心) đang tự hỏi làm việc đó NHƯ THẾ NÀO.' },
            { char: '读', pinyin: 'dú', meaning: 'đọc', type: 'Hình thanh', radical: '讠 (Ngôn)', memo: 'Dùng lời nói (讠) để ĐỌC sách, bán (卖) kiến thức.' }
        ];

        const vocabData = [
            { word: '会', pinyin: 'huì', meaning: 'Biết (do học tập)', ex_cn: '我会说汉语。', ex_py: 'Wǒ huì shuō Hànyǔ.', ex_vn: 'Tôi biết nói tiếng Trung.' },
            { word: '说', pinyin: 'shuō', meaning: 'Nói', ex_cn: '你会说什么？', ex_py: 'Nǐ huì shuō shénme?', ex_vn: 'Bạn biết nói gì?' },
            { word: '妈妈', pinyin: 'māma', meaning: 'Mẹ', ex_cn: '我妈妈不会做饭。', ex_py: 'Wǒ māma bú huì zuò fàn.', ex_vn: 'Mẹ tôi không biết nấu cơm.' },
            { word: '菜', pinyin: 'cài', meaning: 'Món ăn, rau', ex_cn: '中国菜很好吃。', ex_py: 'Zhōngguó cài hěn hǎochī.', ex_vn: 'Món ăn Trung Quốc rất ngon.' },
            { word: '很', pinyin: 'hěn', meaning: 'Rất', ex_cn: '我很好。', ex_py: 'Wǒ hěn hǎo.', ex_vn: 'Tôi rất khỏe.' },

        const quizQuestions = [
            { q: 'Phân biệt: Động từ nào dùng để chỉ cái biết "thông qua học tập"?', options: ['知道 (zhīdao)', '会 (huì)', '认识 (rènshi)', '是 (shì)'], answer: 1, exp: '会 (huì) dùng để chỉ những kỹ năng phải học mới biết (nói ngoại ngữ, nấu ăn, lái xe...).' },

            { q: 'Điền từ: <span class="question-highlight">我会 _ 汉字。</span> (Tôi biết viết chữ Hán)', options: ['说', '做', '写', '读'], answer: 2, exp: 'Viết chữ Hán dùng động từ 写 (xiě).' },
            { q: 'Khi muốn nói "Tôi rất khỏe", chữ "Rất" là chữ nào?', options: ['很 (hěn)', '会 (huì)', '太 (tài)', '不 (bù)'], answer: 0, exp: '很 (hěn) thường đứng trước tính từ để nhấn mạnh hoặc làm bổ ngữ.' },
            { q: 'Chữ <span class="question-highlight">会</span> có bộ thủ nào ở trên cùng?', options: ['Bộ Khẩu (口)', 'Bộ Nhân (人)', 'Bộ Thủy (氵)', 'Bộ Mịch (冖)'], answer: 1, exp: 'Chữ 会 có bộ Nhân (人 - người) nằm ở trên.' },
            { q: 'Điền vào chỗ trống: <br><span class="question-highlight">你会做中国菜 _ ？</span>', options: ['呢', '的', '吗', '谁'], answer: 2, exp: 'Câu hỏi có-không (Yes/No) dùng trợ từ nghi vấn 吗 ở cuối câu.' }
        ];

        // --- RENDER ---
        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Lật thẻ</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "✅" : "❌";
            document.getElementById('modal-title').innerText = correct ? "Đúng rồi!" : "Tiếc quá!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
