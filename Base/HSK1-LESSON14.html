    <script>
        // --- ÂM THANH ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU BÀI 14 ---
        const hanziData = [
            { char: '东', pinyin: 'dōng', meaning: 'hướng Đông', type: 'Tượng hình', radical: '一 (Nhất)', memo: 'Ghép với Tây (西) thành từ 东西 (dōngxi) nghĩa là ĐỒ ĐẠC.' },
            { char: '苹', pinyin: 'píng', meaning: 'cây táo', type: 'Hình thanh', radical: '艹 (Thảo)', memo: 'Có bộ Thảo (艹) ở trên chỉ các loài thực vật. Đi với 果 (quả) thành quả táo.' },
            { char: '见', pinyin: 'jiàn', meaning: 'nhìn, thấy', type: 'Hội ý', radical: '见 (Kiến)', memo: 'Hình ảnh con người có con mắt (目) to để NHÌN.' },
            { char: '先', pinyin: 'xiān', meaning: 'trước, tiên', type: 'Hội ý', radical: '儿 (Nhi)', memo: 'Bước chân (儿) đi TRƯỚC dẫn đường. Trong từ 先生 (tiên sinh/ông).' },
            { char: '开', pinyin: 'kāi', meaning: 'mở, lái xe', type: 'Tượng hình', radical: '廾 (Củng)', memo: 'Hình ảnh hai bàn tay đang MỞ then cài cửa. 开车 là lái xe.' },
            { char: '车', pinyin: 'chē', meaning: 'xe', type: 'Tượng hình', radical: '车 (Xa)', memo: 'Tượng hình chiếc XE có trục và hai bánh xe nhìn từ trên xuống.' },
            { char: '服', pinyin: 'fú', meaning: 'phục, quần áo', type: 'Hình thanh', radical: '月 (Nhục)', memo: 'Bộ Nhục (月) liên quan đến cơ thể. Quần áo (衣服) là thứ mặc trên cơ thể.' },
            { char: '漂', pinyin: 'piào', meaning: 'nổi, đẹp', type: 'Hình thanh', radical: '氵 (Thủy)', memo: 'Có bộ Thủy (氵) là nước. Kết hợp thành 漂亮 (đẹp).' }
        ];

        const vocabData = [
            { word: '东西', pinyin: 'dōngxi', meaning: 'Đồ, đồ đạc', ex_cn: '我买了一些东西。', ex_py: 'Wǒ mǎi le yìxiē dōngxi.', ex_vn: 'Tôi đã mua một ít đồ.' },
            { word: '一点儿', pinyin: 'yìdiǎnr', meaning: 'Một ít, một chút', ex_cn: '我想喝一点儿水。', ex_py: 'Wǒ xiǎng hē yìdiǎnr shuǐ.', ex_vn: 'Tôi muốn uống một chút nước.' },
            { word: '苹果', pinyin: 'píngguǒ', meaning: 'Quả táo', ex_cn: '这个苹果很大。', ex_py: 'Zhège píngguǒ hěn dà.', ex_vn: 'Quả táo này rất to.' },
            { word: '看见', pinyin: 'kànjiàn', meaning: 'Nhìn thấy', ex_cn: '你看见张先生了吗？', ex_py: 'Nǐ kànjiàn Zhāng xiānsheng le ma?', ex_vn: 'Bạn có nhìn thấy ông Trương không?' },
            { word: '先生', pinyin: 'xiānsheng', meaning: 'Ông, ngài', ex_cn: '张先生在开车。', ex_py: 'Zhāng xiānsheng zài kāi chē.', ex_vn: 'Ông Trương đang lái xe.' },
            { word: '开车', pinyin: 'kāi chē', meaning: 'Lái xe', ex_cn: '他会开车吗？', ex_py: 'Tā huì kāi chē ma?', ex_vn: 'Anh ấy biết lái xe không?' },
            { word: '回来', pinyin: 'huílái', meaning: 'Trở về, quay lại', ex_cn: '他五分钟后回来。', ex_py: 'Tā wǔ fēnzhōng hòu huílái.', ex_vn: '5 phút sau anh ấy quay lại.' },
            { word: '分钟', pinyin: 'fēnzhōng', meaning: 'Phút (thời lượng)', ex_cn: '请等我十分钟。', ex_py: 'Qǐng děng wǒ shí fēnzhōng.', ex_vn: 'Xin đợi tôi 10 phút.' },
            { word: '后', pinyin: 'hòu', meaning: 'Sau (thời gian/vị trí)', ex_cn: '吃饭后我看电视。', ex_py: 'Chī fàn hòu wǒ kàn diànshì.', ex_vn: 'Sau khi ăn cơm tôi xem tivi.' },
            { word: '衣服', pinyin: 'yīfu', meaning: 'Quần áo', ex_cn: '她买了不少衣服。', ex_py: 'Tā mǎi le bùshǎo yīfu.', ex_vn: 'Cô ấy mua nhiều quần áo.' },
            { word: '漂亮', pinyin: 'piàoliang', meaning: 'Đẹp', ex_cn: '这件衣服很漂亮。', ex_py: 'Zhè jiàn yīfu hěn piàoliang.', ex_vn: 'Bộ quần áo này rất đẹp.' },
            { word: '少 / 不少', pinyin: 'shǎo / bùshǎo', meaning: 'Ít / Nhiều', ex_cn: '这里的人不少。', ex_py: 'Zhèlǐ de rén bùshǎo.', ex_vn: 'Người ở đây không ít (nhiều).' },
            { word: '这些', pinyin: 'zhèxiē', meaning: 'Những cái này', ex_cn: '这些都是我的。', ex_py: 'Zhèxiē dōu shì wǒ de.', ex_vn: 'Những thứ này đều là của tôi.' },
            { word: '都', pinyin: 'dōu', meaning: 'Đều', ex_cn: '我们都是学生。', ex_py: 'Wǒmen dōu shì xuésheng.', ex_vn: 'Chúng tôi đều là học sinh.' }
        ];

        const quizQuestions = [
            { q: 'Trợ từ "了" (le) đứng sau động từ biểu thị điều gì?', options: ['Hành động sắp xảy ra', 'Hành động đang diễn ra', 'Hành động đã hoàn thành', 'Hành động không bao giờ xảy ra'], answer: 2, exp: 'Trợ từ 了 (le) thường đứng sau động từ để biểu thị hành động đã hoàn thành hoặc sự việc đã xảy ra.' },
            { q: 'Dịch câu: "Cô ấy đã mua nhiều quần áo".', options: ['她买衣服了。', '她买了不少衣服。', '她买了少衣服。', '她买衣服不少。'], answer: 1, exp: '不少 (bùshǎo) nghĩa là "không ít" (tức là nhiều). Cấu trúc: Động từ + 了 + Số lượng + Danh từ.' },
            { q: 'Từ "不少" (bùshǎo) có nghĩa tương đương với từ nào?', options: ['很小 (hěn xiǎo)', '很少 (hěn shǎo)', '很多 (hěn duō)', '不大 (bù dà)'], answer: 2, exp: '不少 (không ít) mang ý nghĩa khẳng định là "rất nhiều" (很多).' },
            { q: 'Chữ <span class="question-highlight">车</span> (chē) nghĩa là gì?', options: ['Điện thoại', 'Quần áo', 'Máy tính', 'Xe'], answer: 3, exp: '车 (chē) là chiếc xe (ô tô, xe đạp, xe máy...).' },
            { q: 'Phó từ "都" (đōu - đều) thường đứng ở vị trí nào trong câu?', options: ['Trước chủ ngữ', 'Cuối câu', 'Trước động từ / tính từ', 'Sau tân ngữ'], answer: 2, exp: '都 đứng trước động từ để tóm tắt các đối tượng đã được nhắc đến phía trước (VD: 他们都去 - Họ đều đi).' },
            { q: 'Dịch câu: "Những thứ này đều là của tôi".', options: ['这些是我都的。', '都是这些我的。', '这些都是我的。', '这都是我的些。'], answer: 2, exp: '这些 (những cái này) + 都 (đều) + 是 (là) + 我的 (của tôi).' },
            { q: '"5 phút sau" trong tiếng Trung nói như thế nào?', options: ['后五分钟', '五分钟后', '五点后', '后五点'], answer: 1, exp: 'Cấu trúc thời gian: Khoảng thời gian + 后 (Sau khoảng thời gian đó).' },
            { q: 'Từ <span class="question-highlight">看见</span> (kànjiàn) có nghĩa là gì?', options: ['Nghe thấy', 'Nhìn thấy', 'Cảm thấy', 'Nói ra'], answer: 1, exp: '看 (nhìn) + 见 (thấy) = Nhìn thấy (kết quả của hành động nhìn).' },
            { q: 'Điền từ còn thiếu: 张_____在开车。 (Ông Trương đang lái xe)', options: ['小姐 (xiǎojiě)', '先生 (xiānsheng)', '老师 (lǎoshī)', '医生 (yīshēng)'], answer: 1, exp: '先生 (xiānsheng) là Ông/Ngài. 张先生 = Ông Trương.' },
            { q: '"Quả táo" tiếng Trung là gì?', options: ['东西 (dōngxi)', '衣服 (yīfu)', '水果 (shuǐguǒ)', '苹果 (píngguǒ)'], answer: 3, exp: '苹果 (píngguǒ) là quả táo.' },
            { q: 'Chữ <span class="question-highlight">衣服</span> (yīfu) nghĩa là gì?', options: ['Đồ ăn', 'Đồ uống', 'Quần áo', 'Giày dép'], answer: 2, exp: '衣服 (yīfu) nghĩa là quần áo.' },
            { q: 'Động từ "开" (kāi) khi đi với "车" (chē) có nghĩa là gì?', options: ['Mở xe', 'Đóng xe', 'Mua xe', 'Lái xe'], answer: 3, exp: '开车 (kāi chē) là cụm động từ mang nghĩa Lái xe.' },
            { q: 'Để biểu thị "Một ít, một chút", ta dùng từ nào?', options: ['一下 (yíxià)', '一点儿 (yìdiǎnr)', '不少 (bùshǎo)', '这些 (zhèxiē)'], answer: 1, exp: '一点儿 (yìdiǎnr) đứng trước danh từ không đếm được để chỉ số lượng ít (VD: 一点儿水 - một chút nước).' },
            { q: 'Điền từ để khen: 你的衣服很_____。 (Quần áo của bạn rất đẹp)', options: ['少 (shǎo)', '漂亮 (piàoliang)', '高兴 (gāoxìng)', '热 (rè)'], answer: 1, exp: '漂亮 (piàoliang) là tính từ mang nghĩa đẹp.' },
            { q: 'Từ "东西" (dōngxi) nghĩa đen là "Đông Tây", nhưng trong khẩu ngữ thường mang nghĩa là gì?', options: ['Phương hướng', 'Con người', 'Đồ vật, đồ đạc', 'Thời gian'], answer: 2, exp: '东西 (dōngxi) là từ ghép rất phổ biến dùng để chỉ đồ đạc, vật dụng nói chung.' }
        ];

        // --- RENDER ---
        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Lật thẻ</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "✅" : "❌";
            document.getElementById('modal-title').innerText = correct ? "Đúng rồi!" : "Tiếc quá!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
