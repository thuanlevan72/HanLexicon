
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK 1 - Bài 15: 我是坐飞机来的 | Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tông màu xanh lá & cam đồng bộ với Bài 7 và Bài 14 */
            --primary: #8bc34a; 
            --primary-dark: #558b2f;
            --secondary: #ffb74d; 
            --bg-color: #f1f8e9; 
            --card-bg: #ffffff;
            --text-main: #33691e;
            --text-muted: #5d4037;
            --hanzi-color: #d84315;
            --font-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; 
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#cddc39 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
        }

        .branding {
            width: 100%; background: #fff; text-align: center; padding: 6px 0;
            font-size: 0.8rem; font-weight: 800; color: var(--primary-dark);
            letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }

        .header {
            width: 100%; max-width: 800px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border-radius: 0 0 20px 20px;
            box-shadow: 0 5px 15px rgba(139, 195, 74, 0.3);
        }

        .btn-back {
            background: rgba(255,255,255,0.2); color: white; text-decoration: none;
            padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.5);
        }

        .header h2 { font-size: 1.1rem; text-align: center; flex: 1; margin: 0 10px; }
        .header-spacer { width: 80px; }

        .tabs {
            display: flex; justify-content: space-between; gap: 5px;
            margin: 20px auto; background: white; padding: 6px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 95%; max-width: 600px;
        }

        .tab-btn {
            flex: 1; border: none; background: transparent;
            padding: 10px 0; border-radius: 25px;
            font-size: 0.9rem; font-weight: 700; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
            text-align: center; white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--secondary); color: white;
            box-shadow: 0 4px 10px rgba(255, 183, 77, 0.4);
        }

        .section { display: none; width: 100%; max-width: 800px; padding: 0 15px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hanzi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .hanzi-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border-top: 4px solid var(--primary);
        }
        .char-display { font-family: var(--font-cn); font-size: 4rem; color: var(--hanzi-color); line-height: 1.2; }
        .pinyin {
            background: #e3f2fd; color: #1565c0; padding: 4px 15px; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; display: inline-block; margin-bottom: 10px;
        }
        .meaning { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--text-muted); }
        
        .hanzi-details {
            background: #f5f5f5; border-radius: 10px; padding: 12px; margin-bottom: 10px;
            text-align: left; font-size: 0.95rem; color: #424242; border-left: 4px solid var(--primary);
        }
        .hanzi-details p { margin-bottom: 5px; }
        .hanzi-details b { color: var(--primary-dark); }
        .memo { font-size: 0.95rem; background: #fff8e1; padding: 12px; border-radius: 10px; color: #5d4037; text-align: left; border-left: 4px solid var(--secondary); line-height: 1.4;}

        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .flashcard { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; }
        .flashcard-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.5s; transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px;
        }
        .flashcard-front { background: #fff; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .flashcard-front .word-cn { font-family: var(--font-cn); font-size: 3.5rem; color: var(--text-main); }
        .flashcard-front .hint { position: absolute; bottom: 10px; font-size: 0.8rem; color: #aaa; }
        .flashcard-back { background: #fffde7; transform: rotateY(180deg); border: 2px solid var(--secondary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .flashcard-back .py { font-size: 1.3rem; font-weight: bold; color: #1976d2; margin-bottom: 5px; }
        .flashcard-back .mn { font-size: 1.2rem; font-weight: 800; color: #e65100; margin-bottom: 15px; }
        .example-box { background: white; padding: 10px; border-radius: 10px; width: 100%; }
        .ex-cn { font-family: var(--font-cn); font-size: 1.1rem; color: #333; margin-bottom: 2px; }
        .ex-py { font-size: 0.9rem; color: #666; margin-bottom: 2px; }
        .ex-vn { font-size: 0.9rem; color: var(--primary-dark); font-style: italic; }

        .game-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
        .game-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; color: var(--primary-dark); font-size: 1rem; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), #ff9800); width: 0%; transition: width 0.3s; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; color: var(--text-muted); line-height: 1.4; }
        .question-highlight { font-family: var(--font-cn); font-size: 2.5rem; color: var(--hanzi-color); display: block; margin: 10px 0; font-weight: normal; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: #f8f9fa; border: 2px solid #e0e0e0; padding: 15px; border-radius: 12px;
            font-size: 1.1rem; font-weight: bold; color: #424242; cursor: pointer; transition: all 0.2s; font-family: var(--font-cn);
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: #4CAF50 !important; color: white !important; border-color: #388E3C !important; }
        .option-btn.wrong { background: #F44336 !important; color: white !important; border-color: #D32F2F !important; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 400px; padding: 25px;
            border-radius: 20px; text-align: center; animation: popIn 0.3s;
        }
        .modal-icon { font-size: 4rem; margin-bottom: 10px; line-height: 1; }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .modal-title.t-correct { color: #4CAF50; }
        .modal-title.t-wrong { color: #F44336; }
        .modal-desc { font-size: 1.05rem; color: #555; margin-bottom: 20px; line-height: 1.5; }
        .btn-next {
            background: var(--primary); color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%;
        }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .game-result { display: none; flex-direction: column; align-items: center; gap: 15px; }
        .score-circle {
            width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; color: var(--primary-dark); margin: 10px 0;
        }
        .btn-play-again {
            background: var(--secondary); color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="branding">© Bản Quyền Thuộc Về Nga Học HSK</div>

    <header class="header">
        <a href="index.html" class="btn-back">❮ Về Vườn</a>
        <h2>Bài 15: 我是坐飞机来的</h2>
        <div class="header-spacer"></div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('hanzi')">✏️ Hán Tự</button>
        <button class="tab-btn" onclick="switchTab('vocab')">🃏 Từ Vựng</button>
        <button class="tab-btn" onclick="switchTab('game')">🎮 Luyện Tập</button>
    </div>

    <!-- HÁN TỰ -->
    <section id="hanzi" class="section active">
        <div class="hanzi-grid" id="hanzi-container"></div>
    </section>

    <!-- TỪ VỰNG -->
    <section id="vocab" class="section">
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem;">
            * Chạm vào thẻ để lật xem mặt sau
        </p>
        <div class="vocab-grid" id="vocab-container"></div>
    </section>

    <!-- LUYỆN TẬP -->
    <section id="game" class="section">
        <div class="game-container" id="quiz-area">
            <div class="game-header">
                <span id="score-display">Điểm: 0</span>
                <span id="question-count">Câu: 1/15</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            <div id="question-text" class="question-text"></div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div class="game-container game-result" id="result-area">
            <div style="font-size: 5rem;" id="medal-emoji">🏆</div>
            <div class="score-circle" id="final-score">150</div>
            <h2 id="result-title">Xuất sắc!</h2>
            <p id="result-desc" style="color: #555;">Bạn đã nắm vững kiến thức bài 15!</p>
            <button class="btn-play-again" onclick="startGame()">↻ Chơi lại nhé</button>
        </div>
    </section>

    <!-- MODAL -->
    <div id="explanation-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-icon" class="modal-icon">✅</div>
            <h3 id="modal-title" class="modal-title">Đúng rồi!</h3>
            <p id="modal-desc" class="modal-desc"></p>
            <button class="btn-next" onclick="nextQuestion()">Tiếp tục ❯</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        const hanziData = [
            { char: '认', pinyin: 'rèn', meaning: 'nhận, biết', radical: '讠 (Ngôn)', memo: 'Dùng lời nói (讠) để xác NHẬN danh tính một người.' },
            { char: '识', pinyin: 'shi', meaning: 'biết, kiến thức', radical: '讠 (Ngôn)', memo: 'Quen biết (认识) một người qua lời nói (讠) và sự tương tác.' },
            { char: '年', pinyin: 'nián', meaning: 'năm', radical: '干 (Can)', memo: 'Tượng hình bông lúa chín cúi đầu. Một năm là một chu kỳ thu hoạch.' },
            { char: '饭', pinyin: 'fàn', meaning: 'cơm, bữa ăn', radical: '饣 (Thực)', memo: 'Có bộ Thực (饣) chỉ đồ ăn. 饭店 là khách sạn/nhà hàng.' },
            { char: '飞', pinyin: 'fēi', meaning: 'bay', radical: '飞 (Phi)', memo: 'Tượng hình con chim đang sải cánh BAY.' },
            { char: '机', pinyin: 'jī', meaning: 'máy móc, cơ hội', radical: '木 (Mộc)', memo: 'Ngày xưa máy móc làm từ gỗ (木). 飞机 là máy bay.' },
            { char: '高', pinyin: 'gāo', meaning: 'cao', radical: '高 (Cao)', memo: 'Tượng hình một cái tháp hoặc ngôi nhà CAO tầng.' },
            { char: '兴', pinyin: 'xìng', meaning: 'hứng thú, phấn khởi', radical: '八 (Bát)', memo: 'Trong từ 高兴 (vui vẻ). Cảm giác phấn khởi dâng trào.' }
        ];

        const vocabData = [
            { word: '认识', pinyin: 'rènshi', meaning: 'Quen biết', ex_cn: '认识你很高兴。', ex_py: 'Rènshi nǐ hěn gāoxìng.', ex_vn: 'Rất vui được quen biết bạn.' },
            { word: '年', pinyin: 'nián', meaning: 'Năm', ex_cn: '我是2010年来的。', ex_py: 'Wǒ shì èr líng yī líng nián lái de.', ex_vn: 'Tôi đến vào năm 2010.' },
            { word: '大学', pinyin: 'dàxué', meaning: 'Đại học', ex_cn: '我们在大学认识。', ex_py: 'Wǒmen zài dàxué rènshi.', ex_vn: 'Chúng tôi quen nhau ở đại học.' },
            { word: '饭店', pinyin: 'fàndiàn', meaning: 'Nhà hàng / Khách sạn', ex_cn: '我们在饭店吃饭。', ex_py: 'Wǒmen zài fàndiàn chī fàn.', ex_vn: 'Chúng tôi ăn cơm ở nhà hàng.' },
            { word: '出租车', pinyin: 'chūzhūchē', meaning: 'Xe taxi', ex_cn: '我们坐出租车去。', ex_py: 'Wǒmen zuò chūzhūchē qù.', ex_vn: 'Chúng tôi đi bằng taxi.' },
            { word: '一起', pinyin: 'yìqǐ', meaning: 'Cùng nhau', ex_cn: '我们一起去吧。', ex_py: 'Wǒmen yìqǐ qù ba.', ex_vn: 'Chúng ta cùng đi đi.' },
            { word: '高兴', pinyin: 'gāoxìng', meaning: 'Vui vẻ', ex_cn: '今天我很高兴。', ex_py: 'Jīntiān wǒ hěn gāoxìng.', ex_vn: 'Hôm nay tôi rất vui.' },
            { word: '听', pinyin: 'tīng', meaning: 'Nghe', ex_cn: '你听我说。', ex_py: 'Nǐ tīng wǒ shuō.', ex_vn: 'Bạn nghe tôi nói này.' },
            { word: '飞机', pinyin: 'fēijī', meaning: 'Máy bay', ex_cn: '我是坐飞机来的。', ex_py: 'Wǒ shì zuò fēijī lái de.', ex_vn: 'Tôi đi máy bay đến đây.' }
        ];

        const quizQuestions = [
            { q: 'Cấu trúc "是...... de" dùng để nhấn mạnh điều gì?', options: ['Tương lai', 'Sự việc đã xảy ra', 'Hành động đang diễn ra', 'Khả năng'], answer: 1, exp: 'Cấu trúc 是...的 nhấn mạnh thời gian, địa điểm, cách thức của hành động ĐÃ XẢY RA.' },
            { q: 'Dịch câu: "Tôi đi taxi đến đây".', options: ['我坐出租车来。', '我是坐出租车来的。', '我是坐飞机来的。', '我来坐出租车。'], answer: 1, exp: 'Dùng 是...的 để nhấn mạnh cách thức (đi taxi).' },
            { q: '"Quen biết" trong tiếng Trung đọc là gì?', options: ['rènshi', 'gāoxìng', 'xuéxí', 'shuìjiào'], answer: 0, exp: '认识 (rènshi) nghĩa là quen biết.' },
            { q: 'Trong tiếng Trung, thứ tự nói ngày tháng năm là gì?', options: ['Ngày-Tháng-Năm', 'Tháng-Ngày-Năm', 'Năm-Tháng-Ngày', 'Năm-Ngày-Tháng'], answer: 2, exp: 'Tiếng Trung nói từ lớn đến nhỏ: Năm -> Tháng -> Ngày.' },
            { q: 'Từ <span class="question-highlight">飞机</span> (fēijī) nghĩa là gì?', options: ['Xe bus', 'Xe taxi', 'Máy bay', 'Xe đạp'], answer: 2, exp: '飞 (bay) + 机 (máy) = Máy bay.' },
            { q: 'Dịch: "Rất vui được quen biết bạn".', options: ['认识你很高兴。', '你是我的大学。', '你是高兴的。', '认识我很大学。'], answer: 0, exp: '认识你很高兴 (Rènshi nǐ hěn gāoxìng) là câu chào hỏi lịch sự phổ biến.' },
            { q: 'Điền vào chỗ trống: 我们是_____去饭店的。(Chúng tôi cùng nhau đi nhà hàng)', options: ['也 (yě)', '都 (dōu)', '一起 (yìqǐ)', '没 (méi)'], answer: 2, exp: '一起 (yìqǐ) nghĩa là cùng nhau.' },
            { q: 'Từ <span class="question-highlight">饭店</span> (fàndiàn) nghĩa là gì?', options: ['Bệnh viện', 'Trường học', 'Nhà hàng / Khách sạn', 'Công viên'], answer: 2, exp: '饭店 có thể hiểu là nhà hàng hoặc khách sạn tùy ngữ cảnh.' },
            { q: 'Cách nói năm "2011" trong tiếng Trung là gì?', options: ['Èr qiān shí yī nián', 'Èr líng yī yī nián', 'Èr líng yāo yāo nián', 'Èr líng yī yāo nián'], answer: 1, exp: 'Năm được đọc từng con số một. Lưu ý: Số 1 trong năm đọc là "yī", không đọc là "yāo".' },
            { q: 'Phủ định của cấu trúc "是...的" là gì?', options: ['不...的', '没...的', '不是... de', '没有... de'], answer: 2, exp: 'Phủ định là 不是...的 (Bú shì... de).' },
            { q: 'Từ <span class="question-highlight">听</span> (tīng) nghĩa là gì?', options: ['Nói', 'Nghe', 'Đọc', 'Viết'], answer: 1, exp: '听 (tīng) nghĩa là nghe.' },
            { q: 'University trong tiếng Trung là gì?', options: ['小学 (xiǎoxué)', '中学 (zhōngxué)', '大学 (dàxué)', '饭店 (fàndiàn)'], answer: 2, exp: '大学 (dàxué) là đại học.' },
            { q: 'Chữ <span class="question-highlight">高</span> (gāo) trong "高兴" có nghĩa gốc là gì?', options: ['Thấp', 'Rộng', 'Cao', 'Dài'], answer: 2, exp: '高 nghĩa là cao.' },
            { q: '"Taxi" trong tiếng Trung gồm 3 chữ nào?', options: ['公共汽车', '出租车', '自行车', '大飞机'], answer: 1, exp: '出租车 (chūzhūchē) là xe taxi.' },
            { q: 'Sắp xếp câu: 坐 / 飞机 / 来的 / 他 / 是 / 。', options: ['他是坐飞机来的。', '他坐飞机是的来。', '他是来坐飞机的。', '坐飞机他是来的。'], answer: 0, exp: 'Cấu trúc: Chủ ngữ + 是 + Cách thức + Động từ + 的.' }
        ];

        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Chạm để lật</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "✅" : "❌";
            document.getElementById('modal-title').innerText = correct ? "Đúng rồi!" : "Tiếc quá!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
                const medal = document.getElementById('medal-emoji');
                const title = document.getElementById('result-title');
                if (score >= 140) { medal.innerText = "🏆"; title.innerText = "Xuất sắc!"; }
                else if (score >= 100) { medal.innerText = "🥈"; title.innerText = "Rất tốt!"; }
                else { medal.innerText = "🥉"; title.innerText = "Cố gắng lên!"; }
            }
        }

        window.onload = render;
    </script>
</body>
</html>
