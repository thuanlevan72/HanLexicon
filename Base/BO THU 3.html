<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Bộ Thủ 3 | Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4caf50; 
            --primary-dark: #2e7d32;
            --secondary: #ffb74d; 
            --bg-color: #e8f5e9; 
            --card-bg: #ffffff;
            --text-main: #1b5e20;
            --text-muted: #4e342e;
            --hanzi-color: #d84315;
            --font-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent;}

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#81c784 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-main); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
        }

        .branding { width: 100%; background: #fff; text-align: center; padding: 6px 0; font-size: 0.8rem; font-weight: 800; color: var(--primary-dark); letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-transform: uppercase;}
        .header { width: 100%; max-width: 800px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-radius: 0 0 20px 20px; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);}
        .btn-back { background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.5);}

        .screen { display: none; width: 100%; max-width: 800px; padding: 20px 15px; animation: fadeIn 0.4s; flex-direction: column; align-items: center;}
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* STUDY SECTION */
        .study-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 100%;}
        .study-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-left: 5px solid var(--secondary);
        }
        .st-hz-box {
            width: 70px; height: 70px; background: #f1f8e9; border-radius: 12px; border: 2px solid #a5d6a7;
            display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .st-hz { font-family: var(--font-cn); font-size: 2.2rem; color: var(--primary-dark); font-weight: bold; line-height: 1;}

        /* QUIZ */
        .game-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #81c784); width: 0%; transition: width 0.3s; }
        .hz-py-inline { display: inline-flex; align-items: baseline; gap: 4px; color: var(--primary-dark); background: #f1f8e9; padding: 2px 8px; border-radius: 8px;}
        .hz-char { font-family: var(--font-cn); font-weight: 700; font-size: 1.5rem; color: var(--hanzi-color);}
        
        .option-btn {
            background: #f8f9fa; border: 2px solid #e0e0e0; padding: 15px; border-radius: 12px;
            font-size: 1rem; font-weight: bold; color: #424242; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; text-align: left; gap: 10px; margin-bottom: 10px;
        }
        .option-btn.selected { background: #e8f5e9; border-color: var(--primary); }
        .btn-check {
            background: var(--primary-dark); color: white; border: none; padding: 15px; border-radius: 15px;
            font-size: 1.1rem; font-weight: 900; width: 100%; margin-top: 20px; cursor: pointer;
        }

        .btn-large {
            background: linear-gradient(135deg, var(--secondary), #f57c00); color: white; border: none;
            padding: 15px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: 900;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4); cursor: pointer; margin-top: 25px; width: 100%; max-width: 350px;
        }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 15px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 400px; padding: 25px;
            border-radius: 20px; text-align: center; border: 4px solid var(--primary);
        }
    </style>
</head>
<body>

    <div class="branding">© Bản Quyền Thuộc Về Nga Học HSK</div>
    <header class="header">
        <a href="index.html" class="btn-back">❮ Về Vườn</a>
        <h2>Khu Vườn Bộ Thủ 3</h2>
        <div style="width: 80px;"></div>
    </header>

    <!-- HỌC LÝ THUYẾT -->
    <section id="screen-study" class="screen active">
        <h1 style="font-size: 1.5rem; font-weight: 900; color: var(--primary-dark); margin-bottom: 5px; text-align: center;">Nhóm 3: Thiên Nhiên & Động Vật</h1>
        <p style="font-size: 0.95rem; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; text-align: center;">Thế giới tự nhiên kỳ thú qua nét chữ Hán.</p>
        <div class="study-grid" id="study-container"></div>
        <button class="btn-large" onclick="startQuiz()">Bắt Đầu Hành Trình ➔</button>
    </section>

    <!-- QUIZ -->
    <section id="screen-quiz" class="screen">
        <div class="game-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800;">
                <span id="score-display">Điểm: 0</span>
                <span id="question-count">Câu: 1/15</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div id="question-text" style="font-size: 1.2rem; font-weight: 700; margin-bottom: 25px;"></div>
            <div id="options-container" style="display: grid; grid-template-columns: 1fr; gap: 10px;"></div>
            <button class="btn-check" onclick="checkAnswer()">XÁC NHẬN</button>
        </div>
    </section>

    <!-- KẾT QUẢ -->
    <section id="screen-result" class="screen">
        <div class="game-container" style="display: flex; flex-direction: column; align-items: center; padding: 40px 20px;">
            <div style="font-size: 5rem;">🌿</div>
            <h2 style="font-size: 1.8rem; color: var(--primary-dark); font-weight: 900; margin-top: 10px;">KẾT QUẢ</h2>
            <div id="final-score" style="width: 120px; height: 120px; border-radius: 50%; border: 6px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--primary-dark); margin: 15px 0; background: #f1f8e9;">0</div>
            <p id="result-msg" style="color: var(--text-muted); font-weight: 700; margin-bottom: 25px; text-align: center;"></p>
            <button class="btn-large" style="background: linear-gradient(135deg, #2196f3, #1976d2);" onclick="location.href='index.html'">Chúc mừng bạn đã hoàn thành! 🏆</button>
        </div>
    </section>

    <div id="explanation-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-icon" style="font-size: 4rem; margin-bottom: 10px;">🌿</div>
            <h3 id="modal-title" style="font-size: 1.5rem; font-weight: 900; margin-bottom: 10px;"></h3>
            <p id="modal-desc" style="font-size: 1.05rem; color: #555; margin-bottom: 20px; font-weight: 600;"></p>
            <button class="btn-check" style="margin-top: 0;" onclick="nextQuestion()">Tiếp tục ❯</button>
        </div>
    </div>

    <script>
        const studyData = [
            { name: "Bộ Nhật", hz: "日", py: "rì", mean: "Mặt trời, ngày", ex: "<span>明</span> (míng: sáng)" },
            { name: "Bộ Nguyệt", hz: "月", py: "yuè", mean: "Mặt trăng, tháng", ex: "<span>期</span> (qī: kỳ)" },
            { name: "Bộ Sơn", hz: "山", py: "shān", mean: "Núi", ex: "<span>岁</span> (suì: tuổi)" },
            { name: "Bộ Thủy", hz: "水", hz2: "氵", py: "shuǐ", mean: "Nước", ex: "<span>海</span> (hǎi: biển), <span>河</span> (hé: sông)" },
            { name: "Bộ Hỏa", hz: "火", hz2: "灬", py: "huǒ", mean: "Lửa", ex: "<span>热</span> (rè: nóng), <span>灯</span> (dēng: đèn)" },
            { name: "Bộ Mộc", hz: "木", py: "mù", mean: "Cây cối", ex: "<span>林</span> (lín: rừng), <span>桌</span> (zhuō: bàn)" },
            { name: "Bộ Thảo", hz: "艸", hz2: "艹", py: "cǎo", mean: "Cỏ, thực vật", ex: "<span>花</span> (huā: hoa), <span>草</span> (cǎo: cỏ)" },
            { name: "Bộ Khuyển", hz: "犬", hz2: "犭", py: "quǎn", mean: "Con chó/thú vật", ex: "<span>狗</span> (gǒu: chó), <span>猫</span> (māo: mèo)" },
            { name: "Bộ Điểu", hz: "鸟", py: "niǎo", mean: "Con chim", ex: "<span>鸡</span> (jī: gà)" },
            { name: "Bộ Ngư", hz: "鱼", py: "yú", mean: "Con cá", ex: "<span>鲜</span> (xiān: tươi)" }
        ];

        function hp(hanzi, pinyin) { return `<span class="hz-py-inline"><span class="hz-char">${hanzi}</span><span class="py-text">${pinyin}</span></span>`; }

        const quizData = [
            { q: `Chữ 'Biển' ${hp('海', 'hǎi')} chứa bộ Thủy ${hp('氵', 'shuǐ')} vì sao?`, options: ["Vì có lửa", "Vì biển chứa nước", "Vì biển có núi", "Vì biển có cá"], correct: 1, explain: "氵 là biến thể của bộ Thủy (nước), chỉ các vật thể liên quan đến chất lỏng." },
            { q: `Bộ Hỏa nằm dưới ${hp('灬', 'huǒ')} trong chữ 'Nóng' ${hp('热', 'rè')} vì?`, options: ["Nóng là do lửa đốt dưới", "Nóng là do nước", "Nóng là do cỏ", "Nóng là do cá"], correct: 0, explain: "Bốn chấm dưới là bộ Hỏa, tượng trưng cho ngọn lửa bùng cháy." },
            { q: `Chữ 'Hoa' ${hp('花', 'huā')} có bộ Thảo ${hp('艹', 'cǎo')} ở trên vì?`, options: ["Hoa là đồ vật", "Hoa là thực vật", "Hoa là con vật", "Hoa là con người"], correct: 1, explain: "Bộ Thảo chỉ các loại cỏ, hoa và cây thân mềm." },
            { q: `Tại sao chữ 'Mèo' ${hp('猫', 'māo')} và 'Chó' ${hp('狗', 'gǒu')} có bộ Khuyển ${hp('犭', 'quǎn')}?`, options: ["Vì chúng biết bơi", "Vì chúng là động vật bốn chân", "Vì chúng biết bay", "Vì chúng làm bằng gỗ"], correct: 1, explain: "Bộ Khuyển đứng chỉ các loài thú nuôi hoặc động vật hoang dã." },
            { q: `Chữ 'Sáng' ${hp('明', 'míng')} gồm bộ Nhật ${hp('日', 'rì')} và bộ Nguyệt ${hp('月', 'yuè')} vì?`, options: ["Chỉ ban đêm", "Chỉ ban ngày", "Sự kết hợp ánh sáng trời và trăng", "Cái cây che mặt trời"], correct: 2, explain: "Mặt trời và mặt trăng cùng xuất hiện mang lại sự sáng sủa." },
            { q: `Bộ Mộc ${hp('木', 'mù')} trong chữ 'Rừng' ${hp('林', 'lín')} gợi ý điều gì?`, options: ["Nhiều cái bàn", "Hai cái cây đứng cạnh nhau", "Nhiều hòn đá", "Dòng sông"], correct: 1, explain: "Ghép hai chữ Mộc (cây) lại với nhau sẽ ra chữ Lâm (rừng thưa)." },
            { q: `Chữ 'Gà' ${hp('鸡', 'jī')} có bộ Điểu ${hp('鸟', 'niǎo')} vì gà thuộc họ?`, options: ["Cá", "Thú", "Chim/Gia cầm", "Côn trùng"], correct: 2, explain: "Bộ Điểu chỉ các loài chim và gia cầm có lông vũ." },
            { q: `Bộ Sơn ${hp('山', 'shān')} trong chữ 'Tuổi' ${hp('岁', 'suì')} mô phỏng hình?`, options: ["Sóng nước", "Ngọn núi", "Lửa cháy", "Mặt trăng"], correct: 1, explain: "Chữ Sơn mô phỏng hình dáng các đỉnh núi nhấp nhô." },
            { q: `Chữ 'Tươi' ${hp('鲜', 'xiān')} có bộ Ngư ${hp('鱼', 'yú')} kết hợp bộ Dương (cừu) vì?`, options: ["Thịt cá và thịt cừu rất tươi", "Cá ăn cỏ", "Cừu biết bơi", "Cá biết bay"], correct: 0, explain: "Người xưa quan niệm sự kết hợp giữa cá và cừu là ngon và tươi nhất." },
            { q: `Bộ Nguyệt ${hp('月', 'yuè')} trong chữ 'Tháng' mang nghĩa?`, options: ["Mặt trời", "Mặt trăng (chu kỳ trăng)", "Ngọn lửa", "Cái cây"], correct: 1, explain: "Tháng được tính theo chu kỳ của mặt trăng." }
        ];

        let currentIdx = 0, score = 0, selectedOption = null;

        window.onload = () => {
            const container = document.getElementById('study-container');
            container.innerHTML = studyData.map(i => `
                <div class="study-card">
                    <div class="st-hz-box"><div class="st-hz">${i.hz2 || i.hz}</div></div>
                    <div style="flex:1;">
                        <div style="font-weight:900; color:var(--primary-dark);">${i.name}</div>
                        <div style="font-size:0.9rem; font-weight:600;">${i.mean}</div>
                        <div style="font-size:0.8rem; color:#777;">VD: ${i.ex}</div>
                    </div>
                </div>
            `).join('');
        };

        function startQuiz() { document.getElementById('screen-study').classList.remove('active'); document.getElementById('screen-quiz').classList.add('active'); loadQuestion(); }

        function loadQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('question-count').innerText = `Câu: ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress').style.width = `${(currentIdx / quizData.length) * 100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container'); container.innerHTML = '';
            selectedOption = null;
            q.options.forEach((opt, idx) => {
                const b = document.createElement('div'); b.className = 'option-btn';
                b.innerHTML = `<div style="background:var(--primary); color:white; width:25px; height:25px; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:0.8rem;">${String.fromCharCode(65+idx)}</div><div>${opt}</div>`;
                b.onclick = () => { document.querySelectorAll('.option-btn').forEach(o => o.classList.remove('selected')); b.classList.add('selected'); selectedOption = idx; };
                container.appendChild(b);
            });
        }

        function checkAnswer() {
            if (selectedOption === null) return;
            const q = quizData[currentIdx]; const isCorrect = (selectedOption === q.correct);
            if (isCorrect) { score += 10; document.getElementById('modal-icon').innerText = "🌿"; document.getElementById('modal-title').innerText = "Đúng rồi!"; }
            else { document.getElementById('modal-icon').innerText = "☁️"; document.getElementById('modal-title').innerText = "Tiếc quá!"; }
            document.getElementById('modal-desc').innerText = q.explain;
            document.getElementById('explanation-modal').style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentIdx++;
            if (currentIdx < quizData.length) loadQuestion(); else {
                document.getElementById('screen-quiz').classList.remove('active');
                document.getElementById('screen-result').classList.add('active');
                document.getElementById('final-score').innerText = score;
                document.getElementById('result-msg').innerText = score >= 80 ? "Bạn thực sự yêu thiên nhiên và am hiểu chữ Hán!" : "Hãy luyện tập thêm để trở thành 'Thần rừng' bộ thủ nhé!";
            }
        }
    </script>
</body>
</html>
