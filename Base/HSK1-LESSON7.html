    <script>
        // --- ÂM THANH ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU BÀI 7 ---
        const hanziData = [
            { char: '请', pinyin: 'qǐng', meaning: 'mời, xin', type: 'Hình thanh', radical: '讠 (Ngôn)', memo: 'Dùng lời nói (讠) lịch sự để thỉnh CẦU, MỜI mọc chân tình (青).' },
            { char: '问', pinyin: 'wèn', meaning: 'hỏi', type: 'Hình thanh', radical: '门 (Môn)', memo: 'Ghé miệng (口) vào cửa (门) để HỎI thăm.' },
            { char: '号', pinyin: 'hào', meaning: 'ngày, số', type: 'Hội ý', radical: '口 (Khẩu)', memo: 'Há miệng (口) hô to con SỐ và NGÀY tháng.' },
            { char: '明', pinyin: 'míng', meaning: 'ngày mai, sáng', type: 'Hội ý', radical: '日 (Nhật)', memo: 'Mặt trời (日) và mặt trăng (月) cùng chiếu SÁNG cho NGÀY MAI.' },
            { char: '昨', pinyin: 'zuó', meaning: 'hôm qua', type: 'Hình thanh', radical: '日 (Nhật)', memo: 'Thời gian (日) đã trôi qua (乍) là HÔM QUA.' },
            { char: '去', pinyin: 'qù', meaning: 'đi', type: 'Hội ý', radical: '厶 (Khư)', memo: 'Người bước chân ra khỏi vùng đất (厶) để ĐI.' },
            { char: '看', pinyin: 'kàn', meaning: 'nhìn, xem', type: 'Hội ý', radical: '目 (Mục)', memo: 'Đặt bàn tay (手 - 龵) lên trên mắt (目) để che nắng mà NHÌN.' },
            { char: '书', pinyin: 'shū', meaning: 'sách', type: 'Chỉ sự', radical: '乛 (Ất)', memo: 'Hình ảnh bàn tay đang cầm bút viết lên trang SÁCH.' }
        ];

        const vocabData = [
            { word: '请问', pinyin: 'qǐngwèn', meaning: 'Xin hỏi', ex_cn: '请问，今天几号？', ex_py: 'Qǐngwèn, jīntiān jǐ hào?', ex_vn: 'Xin hỏi, hôm nay ngày mấy?' },
            { word: '今天', pinyin: 'jīntiān', meaning: 'Hôm nay', ex_cn: '今天星期几？', ex_py: 'Jīntiān xīngqī jǐ?', ex_vn: 'Hôm nay là thứ mấy?' },
            { word: '昨天', pinyin: 'zuótiān', meaning: 'Hôm qua', ex_cn: '昨天是八月八号。', ex_py: 'Zuótiān shì bā yuè bā hào.', ex_vn: 'Hôm qua là ngày 8 tháng 8.' },
            { word: '明天', pinyin: 'míngtiān', meaning: 'Ngày mai', ex_cn: '明天我去学校。', ex_py: 'Míngtiān wǒ qù xuéxiào.', ex_vn: 'Ngày mai tôi đi đến trường.' },
            { word: '月', pinyin: 'yuè', meaning: 'Tháng', ex_cn: '十二月', ex_py: 'Shí\'èr yuè', ex_vn: 'Tháng 12' },
            { word: '号', pinyin: 'hào', meaning: 'Ngày', ex_cn: '三十一号', ex_py: 'Sānshíyī hào', ex_vn: 'Ngày 31' },
            { word: '星期', pinyin: 'xīngqī', meaning: 'Tuần, thứ', ex_cn: '星期日 / 星期天', ex_py: 'Xīngqīrì / Xīngqītiān', ex_vn: 'Chủ nhật' },
            { word: '去', pinyin: 'qù', meaning: 'Đi', ex_cn: '你去哪儿？', ex_py: 'Nǐ qù nǎr?', ex_vn: 'Bạn đi đâu?' },
            { word: '学校', pinyin: 'xuéxiào', meaning: 'Trường học', ex_cn: '我们去学校。', ex_py: 'Wǒmen qù xuéxiào.', ex_vn: 'Chúng tôi đi đến trường học.' },
            { word: '看', pinyin: 'kàn', meaning: 'Nhìn, xem, đọc', ex_cn: '看电视', ex_py: 'Kàn diànshì', ex_vn: 'Xem tivi' },
            { word: '书', pinyin: 'shū', meaning: 'Sách', ex_cn: '看书', ex_py: 'Kàn shū', ex_vn: 'Đọc sách' }
        ];

        const quizQuestions = [
            { q: 'Cụm từ nào dùng để mở đầu câu hỏi một cách lịch sự ("Xin hỏi")?', options: ['你好 (Nǐ hǎo)', '请问 (Qǐngwèn)', '谢谢 (Xièxiè)', '对不起 (Duìbùqǐ)'], answer: 1, exp: '请问 (qǐngwèn) có nghĩa là "Xin hỏi", dùng khi muốn hỏi thăm ai đó một cách lịch sự.' },
            { q: 'Thứ tự nói thời gian (Năm, Tháng, Ngày, Thứ) trong tiếng Trung như thế nào?', options: ['Thứ - Ngày - Tháng - Năm', 'Ngày - Tháng - Năm - Thứ', 'Năm - Tháng - Ngày - Thứ', 'Tháng - Ngày - Thứ - Năm'], answer: 2, exp: 'Người Trung Quốc nói thời gian từ đơn vị LỚN đến BÉ: Năm -> Tháng -> Ngày -> Thứ.' },
            { q: 'Hôm nay là "Ngày 9 tháng 4", tiếng Trung nói thế nào?', options: ['四号九月', '九号四月', '四月九号', '九月四号'], answer: 2, exp: 'Tháng nói trước, Ngày nói sau: 四月 (Tháng 4) + 九号 (Ngày 9).' },
            { q: 'Từ nào có nghĩa là "Hôm qua"?', options: ['今天 (jīntiān)', '昨天 (zuótiān)', '明天 (míngtiān)', '号 (hào)'], answer: 1, exp: '昨天 (zuótiān) nghĩa là Hôm qua.' },
            { q: 'Nếu hôm nay là 星期四 (Thứ 5), thì ngày mai là thứ mấy?', options: ['星期三 (Thứ 4)', '星期六 (Thứ 7)', '星期五 (Thứ 6)', '星期天 (Chủ nhật)'], answer: 2, exp: 'Hôm nay Thứ 5 thì ngày mai là Thứ 6: 星期五 (xīngqī wǔ).' },
            { q: 'Chữ <span class="question-highlight">看</span> (Nhìn, xem) được tạo thành bởi bộ Mục (Mắt) và bộ gì?', options: ['Bộ Thủ (Tay)', 'Bộ Tâm (Tim)', 'Bộ Mộc (Cây)', 'Bộ Khẩu (Miệng)'], answer: 0, exp: 'Chữ 看 mô phỏng hình ảnh đặt bàn tay (Bộ Thủ 龵) lên trên mắt (Bộ Mục 目) để nhìn cho rõ.' },
            { q: 'Dịch câu: "Ngày mai tôi đi đến trường".', options: ['明天我去学校。', '昨天我去学校。', '今天我在学校。', '学校我去明天。'], answer: 0, exp: '明天 (Ngày mai) + 我 (Tôi) + 去 (đi) + 学校 (trường học).' },
            { q: '"Chủ nhật" trong tiếng Trung có thể nói bằng những cách nào?', options: ['星期七', '星期日 / 星期天', '星期六', '星期八'], answer: 1, exp: 'Chủ nhật không gọi là 星期七 mà gọi là 星期日 (xīngqīrì) hoặc 星期天 (xīngqītiān).' },
            { q: 'Tháng 12 trong tiếng Trung nói như thế nào?', options: ['十月 (shí yuè)', '二月 (èr yuè)', '十二号 (shí\'èr hào)', '十二月 (shí\'èr yuè)'], answer: 3, exp: 'Ghép số 12 (十二) và chữ Tháng (月) ta được 十二月.' },
            { q: 'Pinyin của từ "Trường học" là gì?', options: ['xuéxiāo', 'xuéxí', 'xuéxiào', 'xuéshēng'], answer: 2, exp: '学校 (Trường học) có pinyin là xuéxiào.' },
            { q: 'Động từ nào có nghĩa là "Đi, đi đến"?', options: ['来 (lái)', '去 (qù)', '看 (kàn)', '做 (zuò)'], answer: 1, exp: '去 (qù) có nghĩa là đi đến một nơi nào đó.' },
            { q: 'Để hỏi "Hôm nay thứ mấy?", ta dùng câu nào?', options: ['今天几号？', '今天星期几？', '今天几月？', '今天是哪天？'], answer: 1, exp: '星期几 (xīngqī jǐ) dùng để hỏi về Thứ trong tuần.' },
            { q: 'Chữ <span class="question-highlight">书</span> (shū) có nghĩa là gì?', options: ['Bút', 'Vở', 'Sách', 'Bàn'], answer: 2, exp: '书 (shū) có nghĩa là Quyển Sách.' },
            { q: 'Trong cụm từ "看书" (kàn shū), chữ "看" dịch chuẩn nhất là gì?', options: ['Nhìn', 'Đọc', 'Xem', 'Viết'], answer: 1, exp: 'Khi đi với "Sách" (书), chữ 看 (kàn) được dịch là "Đọc" (Đọc sách).' },
            { q: 'Điền vào chỗ trống: <br><span class="question-highlight">请 _ ，今天几号？</span> (Xin hỏi, hôm nay ngày mấy?)', options: ['说 (shuō)', '看 (kàn)', '做 (zuò)', '问 (wèn)'], answer: 3, exp: '请问 (qǐngwèn) là cụm từ cố định nghĩa là "Xin hỏi".' }
        ];

        // --- RENDER ---
        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Lật thẻ</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "✅" : "❌";
            document.getElementById('modal-title').innerText = correct ? "Đúng rồi!" : "Tiếc quá!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
