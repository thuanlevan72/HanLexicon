<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Bộ Thủ 4 | Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8bc34a; 
            --primary-dark: #558b2f;
            --secondary: #ffb74d; 
            --bg-color: #f1f8e9; 
            --card-bg: #ffffff;
            --text-main: #33691e;
            --text-muted: #5d4037;
            --hanzi-color: #d84315;
            --font-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent;}

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#cddc39 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-main); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px; overflow-x: hidden;
        }

        /* --- BRANDING & HEADER --- */
        .branding { width: 100%; background: #fff; text-align: center; padding: 6px 0; font-size: 0.8rem; font-weight: 800; color: var(--primary-dark); letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-transform: uppercase; z-index: 10;}
        .header { width: 100%; max-width: 800px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-radius: 0 0 20px 20px; box-shadow: 0 5px 15px rgba(139, 195, 74, 0.3); z-index: 10;}
        .btn-back { background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.5); transition: 0.2s;}
        .btn-back:active { transform: scale(0.95); }
        .header h2 { font-size: 1.2rem; text-align: center; flex: 1; margin: 0 10px; }
        .header-spacer { width: 80px; }

        /* --- SCREEN CONTROLS --- */
        .screen { display: none; width: 100%; max-width: 800px; padding: 20px 15px; animation: fadeIn 0.4s; flex-direction: column; align-items: center;}
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- STUDY SECTION --- */
        .study-title { font-size: 1.5rem; font-weight: 900; color: var(--primary-dark); margin-bottom: 5px; text-align: center; }
        .study-subtitle { font-size: 0.95rem; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; text-align: center;}
        .study-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 100%;}
        
        .study-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-left: 5px solid var(--secondary);
        }
        .st-hz-box {
            width: 70px; height: 70px; background: #fff8e1; border-radius: 12px; border: 2px solid #ffe082;
            display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .st-hz { font-family: var(--font-cn); font-size: 2.2rem; color: var(--hanzi-color); font-weight: bold; line-height: 1;}
        .st-py { font-size: 0.8rem; color: #1565c0; font-weight: 800; margin-top: 2px;}
        .st-info { flex: 1; }
        .st-name { font-size: 1.1rem; font-weight: 900; color: var(--primary-dark); margin-bottom: 3px; }
        .st-mean { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px;}
        .st-ex { font-size: 0.85rem; color: #777; background: #f5f5f5; padding: 4px 8px; border-radius: 8px; display: inline-block;}
        .st-ex span { font-family: var(--font-cn); font-weight: bold; color: var(--text-main); font-size: 0.95rem;}

        .btn-large {
            background: linear-gradient(135deg, var(--secondary), #f57c00); color: white; border: none;
            padding: 15px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: 900;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4); cursor: pointer; transition: 0.3s; margin-top: 25px; width: 100%; max-width: 350px;
        }
        .btn-large:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(255, 152, 0, 0.4); }

        /* --- QUIZ SECTION --- */
        .game-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; }
        .game-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; color: var(--primary-dark); font-size: 1rem; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), #ff9800); width: 0%; transition: width 0.3s; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; color: var(--text-muted); line-height: 1.5; }
        .hz-py-inline { display: inline-flex; align-items: baseline; gap: 4px; color: var(--primary-dark); background: #f1f8e9; padding: 2px 8px; border-radius: 8px;}
        .hz-char { font-family: var(--font-cn); font-weight: 700; font-size: 1.5rem; color: var(--hanzi-color);}
        .py-text { font-size: 1rem; color: #1565c0; font-weight: 800; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
        
        .option-btn {
            background: #f8f9fa; border: 2px solid #e0e0e0; padding: 15px; border-radius: 12px;
            font-size: 1rem; font-weight: bold; color: #424242; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; text-align: left; gap: 10px;
        }
        .opt-label { background: var(--secondary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; flex-shrink: 0; font-size: 0.9rem;}
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected { background: #fff8e1; border-color: var(--secondary); }
        .btn-check {
            background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px;
            font-size: 1.1rem; font-weight: 900; width: 100%; margin-top: 20px; box-shadow: 0 4px 0 var(--primary-dark); cursor: pointer; transition: 0.2s;
        }
        .btn-check:active { transform: translateY(4px); box-shadow: 0 0 0 var(--primary-dark); }

        /* --- MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 15px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 400px; padding: 25px;
            border-radius: 20px; text-align: center; animation: popIn 0.3s; border: 4px solid var(--primary);
        }
        .modal-icon { font-size: 4rem; margin-bottom: 10px; line-height: 1; }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .modal-desc { font-size: 1.05rem; color: #555; margin-bottom: 20px; line-height: 1.5; font-weight: 600;}
        .btn-next { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- RESULT SCREEN --- */
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 6px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--primary-dark); margin: 15px 0; background: #f1f8e9;}
        .rank-badge { background: var(--secondary); color: white; padding: 6px 16px; border-radius: 12px; font-size: 1rem; font-weight: 900; margin-bottom: 15px; box-shadow: 0 4px 0 #e65100; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="branding">© Bản Quyền Thuộc Về Nga Học HSK</div>
    <header class="header">
        <a href="index.html" class="btn-back">❮ Về Vườn</a>
        <h2>Khu Vườn Bộ Thủ 4</h2>
        <div class="header-spacer"></div>
    </header>

    <section id="screen-study" class="screen active">
        <div class="study-title">Nhóm 4: Thế Giới Động Vật</div>
        <div class="study-subtitle">Cùng tìm hiểu 6 bộ thủ động vật quan trọng nhất nhé!</div>
        
        <div class="study-grid" id="study-container"></div>
        <button class="btn-large" onclick="startQuiz()">Đã Nhớ! Bắt Đầu Kiểm Tra ➔</button>
    </section>

    <section id="screen-quiz" class="screen">
        <div class="game-container">
            <div class="game-header">
                <span id="score-display">Điểm: 0</span>
                <span id="question-count">Câu: 1/20</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            
            <div id="question-text" class="question-text"></div>
            <div class="options-grid" id="options-container"></div>
            
            <button id="btn-submit" class="btn-check" onclick="checkAnswer()">CHỐT ĐÁP ÁN</button>
        </div>
    </section>

    <section id="screen-result" class="screen">
        <div class="game-container" style="display: flex; flex-direction: column; align-items: center; padding: 40px 20px;">
            <div style="font-size: 5rem;" id="result-icon">🦁</div>
            <h2 style="font-size: 1.8rem; color: var(--primary-dark); font-weight: 900; margin-top: 10px;">KẾT QUẢ CUỐI CÙNG</h2>
            <div class="score-circle" id="final-score">200</div>
            <div class="rank-badge" id="result-rank">CHÚA TỂ MUÔNG THÚ</div>
            <p id="result-msg" style="color: var(--text-muted); font-weight: 700; margin-bottom: 25px; font-style: italic;"></p>
            
            <button class="btn-large" style="margin-top: 0; background: linear-gradient(135deg, var(--primary), var(--primary-dark));" onclick="location.href='BO THU 5.html'">Sang Game Tiếp Theo: Bộ Thủ 5 ➔</button>
            <button class="btn-back" style="margin-top: 15px; color: var(--text-muted); border-color: #ccc; background: #f5f5f5;" onclick="location.reload()">↻ Chơi lại bài này</button>
        </div>
    </section>

    <div id="explanation-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-icon" class="modal-icon">🌸</div>
            <h3 id="modal-title" class="modal-title" style="color: var(--primary-dark);">Tuyệt quá!</h3>
            <p id="modal-desc" class="modal-desc">Giải thích.</p>
            <button class="btn-next" onclick="nextQuestion()">Tiếp tục ❯</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        document.body.addEventListener('click', initAudio, { once: true });

        function playSfx(type) {
            if(!audioCtx) return;
            const n = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            if(type === 'boing') {
                o.frequency.setValueAtTime(200, n); o.frequency.exponentialRampToValueAtTime(600, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                o.connect(g).connect(audioCtx.destination); o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                [440, 554, 659].forEach((f, i) => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.frequency.value = f; gain.gain.setValueAtTime(0, n + i*0.1);
                    gain.gain.linearRampToValueAtTime(0.1, n + i*0.1 + 0.05); gain.gain.linearRampToValueAtTime(0, n + i*0.1 + 0.3);
                    osc.connect(gain).connect(audioCtx.destination); osc.start(n + i*0.1); osc.stop(n + i*0.1 + 0.4);
                });
            } else if(type === 'fail') {
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.4);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.4);
                o.connect(g).connect(audioCtx.destination); o.start(); o.stop(n + 0.4);
            }
        }

        const studyData = [
            { name: "Bộ Khuyển", hz: "犬", hz2: "犭", py: "quǎn", mean: "Động vật, thú nuôi", ex: "<span>狗</span> (gǒu: chó), <span>猫</span> (māo: mèo)" },
            { name: "Bộ Ngưu", hz: "牛", hz2: "牜", py: "niú", mean: "Gia súc", ex: "<span>物</span> (wù: vật), <span>特</span> (tè: đặc biệt)" },
            { name: "Bộ Trùng", hz: "虫", hz2: "", py: "chóng", mean: "Côn trùng, bò sát", ex: "<span>蛇</span> (shé: rắn), <span>虾</span> (xiā: tôm)" },
            { name: "Bộ Ngư", hz: "鱼", hz2: "", py: "yú", mean: "Con cá", ex: "<span>鲜</span> (xiān: tươi), <span>鲸</span> (jīng: cá voi)" },
            { name: "Bộ Điểu", hz: "鸟", hz2: "", py: "niǎo", mean: "Chim chóc", ex: "<span>鸡</span> (jī: gà), <span>鹰</span> (yīng: đại bàng)" },
            { name: "Bộ Mã", hz: "马", hz2: "", py: "mǎ", mean: "Con ngựa", ex: "<span>骑</span> (qí: cưỡi), <span>驾</span> (jià: lái)" }
        ];

        function hp(hanzi, pinyin) { return `<span class="hz-py-inline"><span class="hz-char">${hanzi}</span><span class="py-text">${pinyin}</span></span>`; }

        const quizData = [
            { q: `Chữ 'Chó' ${hp('狗', 'gǒu')} có bộ Khuyển ${hp('犭', 'quǎn')} bên trái. Bộ này tượng trưng cho?`, options: ["Các loài chim", "Các loài cá", "Các loài thú có vú, động vật 4 chân", "Các loài côn trùng"], correct: 2, explain: "Bộ Khuyển (犭) là hình ảnh con chó đứng dựng đứng. Nó dùng để chỉ thú nuôi hoặc dã thú." },
            { q: `Bộ Điểu ${hp('鸟', 'niǎo')} trong chữ 'Gà' ${hp('鸡', 'jī')} mô phỏng hình ảnh gì?`, options: ["Con chim đang bay", "Con chim có lông và đuôi", "Con chim đang hót", "Tổ chim"], correct: 1, explain: "Bộ Điểu là chữ tượng hình vẽ một con chim với mắt, lông và mào." },
            { q: `Chữ 'Cá' ${hp('鱼', 'yú')} có nét ngang ở dưới cùng tượng trưng cho bộ phận nào?`, options: ["Mắt cá", "Miệng cá", "Vây cá", "Đuôi cá"], correct: 3, explain: "Chữ Ngư vẽ hình đầu cá, vảy cá và nét ngang ở dưới chính là biến thể của cái đuôi cá." },
            { q: `Bộ Trùng ${hp('虫', 'chóng')} trong chữ 'Kiến' ${hp('蚂蚁', 'mǎyǐ')} thường chỉ loại động vật nào?`, options: ["Côn trùng, sâu bọ, bò sát", "Chim chóc", "Thú săn mồi", "Động vật dưới nước"], correct: 0, explain: "Bộ Trùng vẽ hình một con sâu/rắn nhỏ. Nó dùng cho kiến, muỗi, rắn, tôm." },
            { q: `Bộ Mã ${hp('马', 'mǎ')} trong chữ 'Cưỡi' ${hp('骑', 'qí')} tượng trưng cho con vật nào?`, options: ["Con bò", "Con voi", "Con lừa", "Con ngựa"], correct: 3, explain: "Chữ 'Cưỡi' có bộ Mã vì thời xưa phương tiện chủ yếu để cưỡi là ngựa." },
            { q: `Trong chữ 'Tươi' ${hp('鲜', 'xiān')}, sự kết hợp giữa bộ Ngư ${hp('鱼', 'yú')} và bộ Dương ${hp('羊', 'yáng')} mang ý nghĩa gì?`, options: ["Con cá trông giống con dê", "Cá và thịt dê ăn cùng rất tươi ngon", "Con dê đang ăn cá", "Mùi tanh của cá"], correct: 1, explain: "Người xưa cho rằng thịt cá và thịt dê là hai loại thực phẩm bổ dưỡng và tươi nhất." },
            { q: `Bộ Ngưu ${hp('牛', 'niú')} trong chữ 'Vật' ${hp('物', 'wù')} tượng trưng cho con vật nào?`, options: ["Con bò/trâu", "Con lợn", "Con dê", "Con chó"], correct: 0, explain: "Ngày xưa bò là tài sản quan trọng nhất nên đại diện cho mọi 'sự vật'." },
            { q: `Chữ 'Nhà' ${hp('家', 'jiā')} có bộ Miên ${hp('宀', 'mián')} và bộ Thỉ ${hp('豕', 'shǐ')} ở dưới. Tại sao trong nhà lại có lợn?`, options: ["Lợn là thú cưng", "Nhà làm bằng thịt lợn", "Nuôi lợn dưới gầm sàn mới được coi là một nhà", "Tên của chủ nhà"], correct: 2, explain: "Thời cổ đại, một gia đình được coi là ổn định khi có nhà ở và có gia súc (lợn) để ăn." },
            { q: `Bộ Vũ ${hp('羽', 'yǔ')} trong chữ 'Cánh' ${hp('翅膀', 'chìbǎng')} tượng trưng cho cái gì?`, options: ["Cái mỏ", "Chân chim", "Lông vũ/Cánh", "Tiếng hót"], correct: 2, explain: "Bộ Vũ vẽ hình hai chiếc lông vũ hoặc hai cánh chim cạnh nhau." },
            { q: `Chữ 'Hổ' ${hp('虎', 'hǔ')} có bộ Hổ ${hp('虍', 'hū')}. Bộ này mô phỏng đặc điểm nào của hổ?`, options: ["Móng vuốt", "Vằn trên da hổ", "Đuôi hổ", "Tiếng gầm"], correct: 1, explain: "Bộ Hổ mô tả cái đầu hổ với những vằn vện đặc trưng của chúa sơn lâm." },
            { q: `Bộ Hợi ${hp('豕', 'shǐ')} và bộ Khuyển ${hp('犭', 'quǎn')} khác nhau ở chỗ nào?`, options: ["Giống hệt nhau", "Chỉ dùng cho chim", "Chỉ dùng cho cá", "Khuyển dùng cho thú săn/nuôi, Thỉ dùng cho lợn"], correct: 3, explain: "犭thường là thú dữ/thú chạy nhanh, còn 豕 là đặc trưng cho loài lợn." },
            { q: `Chữ 'Voi' ${hp('象', 'xiàng')} là chữ tượng hình vẽ đặc điểm gì nổi bật nhất?`, options: ["Cái vòi dài", "Cái tai to", "Đôi ngà", "Cái bụng phệ"], correct: 0, explain: "Chữ Tượng vẽ lại hình dáng con voi đứng thẳng với cái vòi dài uyển chuyển phía trên." },
            { q: `Bộ Mi ${hp('𠂇', 'mī')} trong chữ 'Rùa' ${hp('龟', 'guī')} mô tả bộ phận nào?`, options: ["Đuôi rùa", "Đầu rùa", "Mai rùa", "Trứng rùa"], correct: 2, explain: "Chữ Quy vẽ hình con rùa nhìn từ trên xuống với cái mai cứng có vân." },
            { q: `Bộ Thử ${hp('鼠', 'shǔ')} trong chữ 'Chuột' ${hp('老鼠', 'lǎoshǔ')} mô tả cái gì?`, options: ["Hàm răng sắc nhọn và cái đuôi", "Đôi tai to", "Bộ lông xám", "Hành động ăn trộm"], correct: 0, explain: "Chữ Thử vẽ đầu con chuột với răng cửa dài (để gặm nhấm) và cái đuôi phía dưới." },
            { q: `Chữ 'Hươu' ${hp('鹿', 'lù')} có phần trên cùng tượng trưng cho?`, options: ["Đôi mắt", "Cái cổ dài", "Cặp sừng", "Đốm trên lưng"], correct: 2, explain: "Bộ Lộc vẽ hình con hươu có cặp sừng đẹp trên đầu và đôi chân dài đang đứng." },
            { q: `Tại sao chữ 'Bầy đàn' ${hp('群', 'qún')} lại có bộ Dương ${hp('羊', 'yáng')}?`, options: ["Dê thích đi một mình", "Dê là loài vật sống theo bầy đàn điển hình", "Dê rất hung dữ", "Dê chạy rất nhanh"], correct: 1, explain: "Dê là loài gia súc hiền lành, luôn đi cùng nhau, nên bộ Dương đại diện cho ý nghĩa tập hợp, bầy đàn." },
            { q: `Bộ Trùng ${hp('虫', 'chóng')} có bao nhiêu nét nếu viết độc lập?`, options: ["4 nét", "5 nét", "6 nét", "7 nét"], correct: 2, explain: "Bộ Trùng gồm 6 nét: sổ, ngang gập, ngang, sổ, hất và chấm." },
            { q: `Chữ 'Rắn' ${hp('蛇', 'shé')} có bộ Trùng ${hp('虫', 'chóng')}. Tại sao không có bộ Khuyển?`, options: ["Vì rắn biết bay", "Vì rắn sống dưới nước", "Vì rắn bò sát, không có chân", "Vì rắn có lông"], correct: 2, explain: "Ngày xưa người Trung Quốc xếp rắn vào nhóm 'Trùng' (loài bò sát, sâu bọ), không phải nhóm thú (Khuyển)." },
            { q: `Bộ Chu ${hp('隹', 'zhuī')} trong chữ 'Khó' ${hp('难', 'nán')} tượng trưng cho loài chim gì?`, options: ["Chim đại bàng", "Chim đuôi ngắn", "Chim công", "Chim sẻ"], correct: 1, explain: "Bộ Truy khác bộ Điểu ở chỗ nó mô phỏng loài chim có đuôi ngắn." },
            { q: `Học bộ thủ nhóm Động vật giúp bạn làm gì?`, options: ["Phân loại và nhớ nhanh từ vựng về muông thú", "Biết cách đi săn", "Học cách cưỡi ngựa", "Nhớ tên các món ăn"], correct: 0, explain: "Cứ thấy 犭là thú, thấy 鸟 là chim, thấy 鱼 là cá. Đó chính là chìa khóa học từ vựng hiệu quả." }
        ];

        let currentIdx = 0, score = 0, selectedOption = null;

        window.onload = () => {
            const studyHtml = studyData.map(item => `
                <div class="study-card">
                    <div class="st-hz-box">
                        <div class="st-hz">${item.hz}</div>
                        <div class="st-py">${item.py}</div>
                    </div>
                    <div class="st-info">
                        <div class="st-name">${item.name} ${item.hz2 ? `(${item.hz2})` : ''}</div>
                        <div class="st-mean">${item.mean}</div>
                        <div class="st-ex">VD: ${item.ex}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('study-container').innerHTML = studyHtml;
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0,0);
        }

        function startQuiz() {
            playSfx('boing');
            switchScreen('screen-quiz');
            currentIdx = 0; score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentIdx + 1}/20`;
            document.getElementById('progress').style.width = `${(currentIdx / 20) * 100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            selectedOption = null;
            document.getElementById('btn-submit').style.background = '#ccc'; 
            document.getElementById('btn-submit').style.boxShadow = '0 4px 0 #999';

            ['A', 'B', 'C', 'D'].forEach((label, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = `<div class="opt-label">${label}</div><div>${q.options[idx]}</div>`;
                btn.onclick = () => selectOption(btn, idx);
                container.appendChild(btn);
            });
        }

        function selectOption(btn, idx) {
            playSfx('boing');
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedOption = idx;
            document.getElementById('btn-submit').style.background = 'var(--primary)';
            document.getElementById('btn-submit').style.boxShadow = '0 4px 0 var(--primary-dark)';
        }

        function checkAnswer() {
            if (selectedOption === null) return;
            const q = quizData[currentIdx];
            const isCorrect = (selectedOption === q.correct);

            const modal = document.getElementById('explanation-modal');
            const mTitle = document.getElementById('modal-title');
            const mIcon = document.getElementById('modal-icon');

            if (isCorrect) {
                playSfx('win'); score += 10;
                mIcon.innerText = "🦁"; mTitle.innerText = "Tuyệt quá!"; mTitle.style.color = "var(--primary-dark)";
                modal.querySelector('.modal-content').style.borderColor = "var(--primary)";
            } else {
                playSfx('fail');
                mIcon.innerText = "☁️"; mTitle.innerText = "Sai mất rồi!"; mTitle.style.color = "#d32f2f";
                modal.querySelector('.modal-content').style.borderColor = "#d32f2f";
            }
            
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('modal-desc').innerText = q.explain;
            modal.style.display = 'flex';
        }

        function nextQuestion() {
            playSfx('boing');
            document.getElementById('explanation-modal').style.display = 'none';
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            switchScreen('screen-result');
            document.getElementById('final-score').innerText = score;
            
            let rank, msg, icon;
            if (score >= 200) { rank = "CHÚA TỂ RỪNG XANH"; msg = "Kiến thức về muông thú của bạn đạt mức hoàn hảo! 👏"; icon = "👑"; }
            else if (score >= 150) { rank = "CHUYÊN GIA ĐỘNG VẬT"; msg = "Bạn đã nắm rất vững các bộ thú cơ bản! 🔥"; icon = "😎"; }
            else if (score >= 100) { rank = "NGƯỜI YÊU ĐỘNG VẬT"; msg = "Khá lắm, hãy tiếp tục phát huy nhé! 👍"; icon = "✨"; }
            else { rank = "NGƯỜI QUA ĐƯỜNG"; msg = "Muông thú rất đa dạng, hãy ôn lại cùng Cô Nga nhé! 🐦"; icon = "🐾"; }

            document.getElementById('result-icon').innerText = icon;
            document.getElementById('result-rank').innerText = rank;
            document.getElementById('result-msg').innerText = `"${msg}"`;
        }
    </script>
</body>
</html>
