    <style>

        body {

            background-size: 25px 25px;

        }

        /* --- BRANDING & HEADER --- */
        .branding {
            width: 100%; background: #fff; text-align: center; padding: 6px 0;
            font-size: 0.8rem; font-weight: 800; color: var(--primary-dark);
            letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }

        .header {
            width: 100%; max-width: 800px; padding: 15px 20px;

        /* --- TABS --- */
        .tabs {
            display: flex; justify-content: space-between; gap: 5px;
            margin: 20px auto; background: white; padding: 6px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);

        .tab-btn {

        /* --- HÁN TỰ GRID --- */
        .hanzi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .hanzi-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;

        /* --- FLASHCARDS --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .flashcard { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; }

        .question-highlight { font-family: var(--font-cn); font-size: 2.5rem; color: var(--hanzi-color); display: block; margin: 10px 0; font-weight: normal; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; }

        /* --- MODAL GIẢI THÍCH --- */
        .modal-overlay {

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .game-result { display: none; flex-direction: column; align-items: center; gap: 15px; }

        }

    <script>
        // === HỆ THỐNG ÂM THANH (Web Audio API) ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } 
            else if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
            else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
            else if (type === 'win') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.15); 
                osc.frequency.setValueAtTime(659.25, now + 0.3); osc.frequency.setValueAtTime(880, now + 0.45); 
                gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }
        document.body.addEventListener('click', initAudio, { once: true });

        // === DỮ LIỆU BÀI 4 ===
        // Note: Đã bỏ chữ 国 (guó) và 学 (xué) vì đã học ở Bài 3
        const hanziData = [
            { char: '她', pinyin: 'tā', meaning: 'cô ấy, bà ấy', type: 'Hình thanh', radical: '女 (Nữ - phụ nữ)', memo: 'Người phụ nữ (女) đó CŨNG (也) là cô ấy.' },
            { char: '他', pinyin: 'tā', meaning: 'anh ấy, ông ấy', type: 'Hình thanh', radical: '亻 (Nhân đứng - người)', memo: 'Người đàn ông (亻) đó CŨNG (也) là anh ấy.' },
            { char: '谁', pinyin: 'shéi', meaning: 'ai', type: 'Hình thanh', radical: '讠 (Ngôn - lời nói)', memo: 'Dùng lời nói (讠) để hỏi con chim (隹) kia là của AI?' },
            { char: '的', pinyin: 'de', meaning: 'của (trợ từ sở hữu)', type: 'Hình thanh', radical: '白 (Bạch - màu trắng)', memo: 'Cái thìa (勺) màu trắng (白) này là CỦA tôi.' },
            { char: '汉', pinyin: 'hàn', meaning: 'Hán', type: 'Hội ý', radical: '氵 (Thủy - nước)', memo: 'Lại (又) có nước (氵) chảy trên sông HÁN.' },
            { char: '语', pinyin: 'yǔ', meaning: 'ngôn ngữ, tiếng', type: 'Hình thanh', radical: '讠 (Ngôn - lời nói)', memo: 'Lời nói (讠) phát ra từ miệng (口) của 5 (五) người tạo thành NGÔN NGỮ.' },
            { char: '哪', pinyin: 'nǎ', meaning: 'nào, đâu', type: 'Hình thanh', radical: '口 (Khẩu - miệng)', memo: 'Dùng miệng (口) để hỏi cái kia (那) là cái NÀO?' },
            { char: '呢', pinyin: 'ne', meaning: 'nhỉ, thế (trợ từ)', type: 'Hình thanh', radical: '口 (Khẩu - miệng)', memo: 'Dùng miệng (口) hỏi ni cô (尼) đang đi đâu THẾ?' },
            { char: '同', pinyin: 'tóng', meaning: 'cùng, giống nhau', type: 'Hội ý', radical: '冂 (Quynh - vùng xa xôi)', memo: 'CÙNG nhau mở chung một (一) cái miệng (口) dưới một mái vòm (冂).' },
            { char: '朋', pinyin: 'péng', meaning: 'bạn bè', type: 'Hội ý', radical: '月 (Nguyệt - mặt trăng)', memo: 'Hai mặt trăng (月) đi sát cánh CÙNG nhau giống như BẠN BÈ.' },
            { char: '友', pinyin: 'yǒu', meaning: 'bạn, hữu nghị', type: 'Hội ý', radical: '又 (Hựu - lại, cái tay)', memo: 'Hai bàn tay nắm lấy nhau (又) thể hiện tình HỮU nghị, bạn bè.' }
        ];

        const vocabData = [
            { word: '她', pinyin: 'tā', meaning: 'Cô ấy, bà ấy', ex_cn: '她是我朋友。', ex_py: 'Tā shì wǒ péngyou.', ex_vn: 'Cô ấy là bạn tôi.' },
            { word: '他', pinyin: 'tā', meaning: 'Anh ấy, ông ấy', ex_cn: '他是谁？', ex_py: 'Tā shì shéi?', ex_vn: 'Anh ấy là ai?' },
            { word: '谁', pinyin: 'shéi', meaning: 'Ai', ex_cn: '那个人是谁？', ex_py: 'Nà gè rén shì shéi?', ex_vn: 'Người kia là ai?' },
            { word: '的', pinyin: 'de', meaning: 'Của (Chỉ sự sở hữu)', ex_cn: '这是我的书。', ex_py: 'Zhè shì wǒ de shū.', ex_vn: 'Đây là sách của tôi.' },
            { word: '汉语', pinyin: 'Hànyǔ', meaning: 'Tiếng Trung Quốc', ex_cn: '她是汉语老师。', ex_py: 'Tā shì Hànyǔ lǎoshī.', ex_vn: 'Cô ấy là giáo viên tiếng Trung.' },
            { word: '哪', pinyin: 'nǎ', meaning: 'Nào', ex_cn: '你是哪国人？', ex_py: 'Nǐ shì nǎ guó rén?', ex_vn: 'Bạn là người nước nào?' },
            { word: '国', pinyin: 'guó', meaning: 'Quốc gia, đất nước', ex_cn: '中国和美国。', ex_py: 'Zhōngguó hé Měiguó.', ex_vn: 'Trung Quốc và Mỹ.' },
            { word: '呢', pinyin: 'ne', meaning: 'Thế, nhỉ (Câu hỏi ngược lại)', ex_cn: '我很好，你呢？', ex_py: 'Wǒ hěn hǎo, nǐ ne?', ex_vn: 'Tôi rất khỏe, còn bạn thì sao?' },
            { word: '同学', pinyin: 'tóngxué', meaning: 'Bạn cùng lớp', ex_cn: '我们是同学。', ex_py: 'Wǒmen shì tóngxué.', ex_vn: 'Chúng tôi là bạn cùng lớp.' },
            { word: '朋友', pinyin: 'péngyou', meaning: 'Bạn bè', ex_cn: '好朋友。', ex_py: 'Hǎo péngyou.', ex_vn: 'Bạn tốt.' }
        ];

        const quizQuestions = [
            { q: 'Để chỉ "Cô ấy", ta dùng chữ Hán nào?', options: ['他 (tā)', '她 (tā)', '我 (wǒ)', '谁 (shéi)'], answer: 1, exp: '她 (tā) có bộ Nữ (女) đứng trước, dùng để chỉ người phụ nữ (cô ấy, bà ấy).' },
            { q: 'Nghĩa của từ <span class="question-highlight">同学</span> (tóngxué) là gì?', options: ['Giáo viên', 'Học sinh', 'Bạn bè', 'Bạn cùng lớp'], answer: 3, exp: '同 (Cùng) + 学 (Học) = Bạn cùng học, bạn cùng lớp.' },
            { q: 'Để hỏi "Bạn là người nước NÀO?", điền từ gì vào chỗ trống:<br><span class="question-highlight">你是 _ 国人？</span>', options: ['哪 (nǎ)', '那 (nà)', '什么 (shénme)', '谁 (shéi)'], answer: 0, exp: '哪 (nǎ) là đại từ nghi vấn có nghĩa là "Nào". 哪国人 = Người nước nào.' },
            { q: 'Trợ từ sở hữu "Của" trong tiếng Trung là từ nào?', options: ['呢 (ne)', '的 (de)', '吗 (ma)', '哪 (nǎ)'], answer: 1, exp: '的 (de) đứng sau đại từ/danh từ để chỉ sự sở hữu. Ví dụ: 我的 (của tôi).' },

        // === INIT & RENDER ===
        function renderContent() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(item => `
                <div class="hanzi-card">
                    <div class="char-display">${item.char}</div>
                    <div class="pinyin">${item.pinyin}</div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="hanzi-details">
                        <p><b>🏷️ Cấu tạo:</b> ${item.type}</p>
                        <p><b>🧩 Bộ thủ:</b> ${item.radical}</p>
                    </div>
                    <div class="memo">💡 <b>Mẹo nhớ:</b> ${item.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(item => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="word-cn">${item.word}</div>
                            <div class="hint">👆 Chạm để lật thẻ</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="py">${item.pinyin}</div>
                            <div class="mn">${item.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${item.ex_cn}</div>
                                <div class="ex-py">${item.ex_py}</div>
                                <div class="ex-vn">${item.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // === TAB LOGIC ===
        function switchTab(tabId) {
            playSound('click');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'game' && currentQuestionIndex === 0 && score === 0) startGame();
        }

        // === QUIZ LOGIC ===
        let currentQuestionIndex = 0, score = 0, isAnswering = false;

        function startGame() {
            currentQuestionIndex = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            isAnswering = false;
            const q = quizQuestions[currentQuestionIndex];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQuestionIndex + 1}/15`;
            document.getElementById('progress').style.width = `${(currentQuestionIndex / 15) * 100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswering) return; 
            isAnswering = true;

            const q = quizQuestions[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            const isCorrect = (selectedIndex === q.answer);

            if (isCorrect) {
                btnElement.classList.add('correct');
                score += 10;
                playSound('correct');
            } else {
                btnElement.classList.add('wrong');
                allBtns[q.answer].classList.add('correct');
                playSound('wrong');
            }
            document.getElementById('score-display').innerText = `Điểm: ${score}`;

            setTimeout(() => {
                const modal = document.getElementById('explanation-modal');
                const title = document.getElementById('modal-title');
                const icon = document.getElementById('modal-icon');
                
                document.getElementById('modal-desc').innerText = q.exp;
                modal.querySelector('.modal-content').className = `modal-content ${isCorrect ? 'correct' : 'wrong'}`;
                
                if (isCorrect) {
                    icon.innerText = "✅"; title.innerText = "Tuyệt vời!";
                    title.className = "modal-title t-correct";
                } else {
                    icon.innerText = "❌"; title.innerText = "Rất tiếc!";
                    title.className = "modal-title t-wrong";
                }
                modal.style.display = 'flex';
            }, 500); 
        }

        function nextQuestion() {
            playSound('click');
            document.getElementById('explanation-modal').style.display = 'none';
            currentQuestionIndex++;
            if (currentQuestionIndex < 15) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            playSound('win');
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('progress').style.width = '100%';
            document.getElementById('final-score').innerText = score;
            const title = document.getElementById('result-title');
            
            if (score === 150) {
                title.innerText = "Hoàn hảo! 150/150"; title.style.color = "#2e7d32";
            } else if (score >= 100) {
                title.innerText = "Rất Tốt!"; title.style.color = "#f57c00";
            } else {
                title.innerText = "Cố lên nhé!"; title.style.color = "#d84315";
            }
        }

        window.onload = renderContent;
    </script>
</body>
</html>
