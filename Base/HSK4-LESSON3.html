<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK4 Bài 3 - 经理对我印象不错</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a8d5ba;
            --ghibli-brown: #d4a373;
            --ghibli-sky: #caf0f8;
            --ghibli-wood: #6d4c41;
            --ghibli-dark-green: #4f7942;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--ghibli-sky) 0%, #fff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chinese-text { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }
        .chinese-sub { font-family: 'Noto Sans SC', sans-serif; }

        .ghibli-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-wood);
            border-radius: 20px;
            box-shadow: 0 10px 0 var(--ghibli-brown);
        }

        .btn-ghibli {
            background-color: var(--ghibli-green);
            color: var(--ghibli-wood);
            border: 2px solid var(--ghibli-wood);
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: bold;
            padding: 12px;
            cursor: pointer;
        }

        .btn-ghibli:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 var(--ghibli-brown);
            background-color: #95c7a9;
        }
        
        .btn-ghibli:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: white;
            border: 2px solid var(--ghibli-wood);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 var(--ghibli-brown);
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%; height: 380px;
            transition: transform 0.6s; transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard-inner.is-flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 15px;
            padding: 24px;
            border: 2px solid var(--ghibli-wood);
        }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #fef3c7; transform: rotateY(180deg); }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ghibli-brown); border-radius: 10px; }
        .hidden { display: none; }

        .circle-stat {
            position: relative;
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 6px solid #f3f4f6;
        }
        .stat-green { border-color: #a8d5ba; color: #4f7942; }
        .stat-red { border-color: #fca5a5; color: #b91c1c; }

        .dictation-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: 3px dashed var(--ghibli-brown);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        .dictation-input:focus {
            border-color: var(--ghibli-green);
            background-color: #f0fdf4;
        }
    </style>
</head>
<body>

    <button onclick="window.location.href='index.html'" class="btn-home" title="Về Vườn">🏡</button>

    <div id="game-container" class="w-full max-w-xl px-4 mt-16 mb-10">
        <!-- START SCREEN -->
        <div id="start-screen" class="ghibli-card p-8 text-center">
            <h1 class="text-3xl font-bold text-amber-900 mb-2">HSK4 - Bài 3</h1>
            <h2 class="text-2xl text-emerald-700 font-bold mb-4 chinese-text">经理对我印象不错</h2>
            <p class="text-sm text-gray-600 mb-4 font-bold">Giáo viên: Nga Học HSK</p>
            <div class="mx-auto mb-6 text-6xl">🌿</div>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="startFlashcards(vocabulary)" class="btn-ghibli text-lg relative">
                    🎴 Phần 1: Học Từ Vựng  <span id="check-flashcard" class="absolute right-4 hidden">✅</span>
                </button>
                
                <button onclick="openDictationMenu()" class="btn-ghibli text-lg relative" style="background-color: #fef3c7;">
                    🎧 Phần 2: Nghe Chép Bài Khóa <span id="check-dictation" class="absolute right-4 hidden">✅</span>
                </button>
                
                <button id="btn-form" class="btn-ghibli text-lg mt-2 transition-all duration-500" style="background-color: #e5e7eb; border-color: #9ca3af; color: #6b7280;" disabled>
                    🔒 Phần 3: Bài Tập 
                </button>
            </div>
        </div>

        <!-- FLASHCARD SCREEN -->
        <div id="flashcard-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về Menu</button>
                <div class="text-amber-900 font-bold px-3 py-1 bg-amber-100 rounded-full text-xs">
                    Thẻ: <span id="card-index">1</span> / <span id="card-total">30</span>
                </div>
            </div>
            <div class="mb-6">
                <div id="flashcard-inner" class="flashcard-inner" onclick="flipCard()">
                    <div class="flashcard-front shadow-lg">
                        <h2 id="card-hanzi" class="chinese-text text-6xl text-amber-900 leading-tight"></h2>
                        <p class="mt-8 text-sm text-amber-600 animate-pulse font-bold">Chạm để lật thẻ 👆</p>
                    </div>
                    <div class="flashcard-back shadow-lg overflow-y-auto custom-scroll">
                        <h3 id="card-pinyin" class="text-3xl font-bold text-emerald-700 mb-1"></h3>
                        <p id="card-mean" class="text-xl text-amber-900 mb-4 font-bold border-b-2 border-amber-200 pb-2 w-full text-center"></p>
                        <div class="text-left w-full space-y-3">
                            <p id="card-example-cn" class="chinese-sub text-xl text-amber-800 leading-relaxed font-medium"></p>
                            <p id="card-example-py" class="text-sm text-emerald-600 italic font-semibold"></p>
                            <p id="card-example-vi" class="text-sm text-gray-600 bg-white p-2 rounded-lg border border-amber-100"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="markCard(false)" class="bg-rose-100 border-2 border-rose-400 text-rose-700 p-4 rounded-xl font-bold hover:bg-rose-200">Chưa thuộc</button>
                <button onclick="markCard(true)" class="bg-emerald-100 border-2 border-emerald-400 text-emerald-700 p-4 rounded-xl font-bold hover:bg-emerald-200">Đã thuộc</button>
            </div>
        </div>

        <!-- FLASHCARD STATS -->
        <div id="flashcard-stat-screen" class="ghibli-card p-8 text-center hidden">
             <h2 class="text-3xl font-bold text-amber-900 mb-8">Kết quả ghi nhớ</h2>
             <div class="flex justify-around items-center mb-8">
                <div class="circle-stat stat-green">
                    <span id="stat-learned-percent" class="text-xl font-bold">0%</span>
                    <span class="text-[10px] uppercase font-bold">Thuộc</span>
                </div>
                <div class="circle-stat stat-red">
                    <span id="stat-unlearned-percent" class="text-xl font-bold">0%</span>
                    <span class="text-[10px] uppercase font-bold">Cần ôn</span>
                </div>
             </div>
             <div class="text-left mb-6">
                <p class="font-bold text-amber-900 mb-2">Danh sách cần lưu ý:</p>
                <div id="unlearned-list" class="max-h-48 overflow-y-auto custom-scroll bg-amber-50 rounded-lg border border-amber-200 p-2 space-y-2"></div>
             </div>
             <div class="grid grid-cols-1 gap-3">
                 <button id="btn-relearn" onclick="relearnUnlearned()" class="btn-ghibli w-full bg-amber-500 text-white border-amber-700 hidden">🔄 Học lại các từ chưa thuộc</button>
                 <button onclick="endFlashcardSession()" class="btn-ghibli w-full">🔙 Hoàn thành & Về Menu</button>
             </div>
        </div>

        <!-- DICTATION MENU -->
        <div id="dictation-menu-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về Menu Chính</button>
                <h2 class="text-xl font-bold text-emerald-800">Chọn Bài Khóa</h2>
            </div>
            <div id="lesson-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <!-- DICTATION GAME -->
        <div id="dictation-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="backToDictationMenu()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về DS Bài khóa</button>
                <div class="text-emerald-800 font-bold text-sm" id="dictation-title-display">Bài 3: <span id="dict-step">1</span>/10</div>
            </div>
            
            <div class="flex flex-col items-center justify-center space-y-4 mt-2">
                <div class="w-full bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 shadow-sm">
                    <audio id="lesson-audio-player" controls class="w-full h-10 outline-none rounded-lg"></audio>
                </div>

                <div class="w-full bg-white border-2 border-dashed border-amber-300 p-3 rounded-xl text-center">
                    <p class="text-xs text-amber-800 font-bold mb-1">GỢI Ý CÂU ĐANG NGHE:</p>
                    <div id="sentence-range-hint" class="chinese-text text-2xl text-emerald-700 tracking-widest">-- ... --</div>
                </div>
                
                <div class="w-full relative mt-2">
                    <input type="text" id="dict-input" class="dictation-input chinese-text" placeholder="Nghe và gõ chữ Hán..." autocomplete="off">
                </div>

                <div id="dict-answer-box" class="w-full hidden space-y-3">
                    <div id="dict-feedback" class="w-full p-2 rounded-lg text-center font-bold text-sm"></div>
                    <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl text-center space-y-2">
                        <p class="chinese-text text-2xl text-amber-900" id="ans-hanzi"></p>
                        <p class="text-emerald-700 italic font-semibold text-lg" id="ans-pinyin"></p>
                        <p class="text-gray-600 border-t border-amber-200 pt-2 text-sm" id="ans-vi"></p>
                    </div>
                </div>

                <div class="w-full">
                    <button id="btn-next-dict" onclick="nextDictation()" class="btn-ghibli w-full bg-emerald-500 border-emerald-700 text-white hidden py-3 text-lg">Câu tiếp theo ➡️</button>
                    <p id="enter-instruction" class="text-[10px] text-gray-400 text-center mt-2 font-bold uppercase tracking-wider">Nhấn ENTER để kiểm tra</p>
                </div>
            </div>
        </div>

        <!-- FINAL SUCCESS -->
        <div id="dictation-end-screen" class="ghibli-card p-8 text-center hidden">
            <h2 class="text-3xl font-bold text-amber-900 mb-4">Tuyệt vời!</h2>
            <div class="text-6xl mb-4">🏆</div>
            <p class="text-amber-800 mb-6 font-bold text-xl">Bạn đã luyện xong tất cả bài khóa bài 3!</p>
            <button onclick="endDictationSession()" class="btn-ghibli w-full py-3 text-lg bg-emerald-100 border-emerald-500 text-emerald-800">🔙 Về Menu Chính</button>
        </div>
    </div>

    <!-- AUDIO ASSETS -->
    <audio id="audio-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3"></audio>
    <audio id="audio-flip" src="https://assets.mixkit.co/active_storage/sfx/2045/2045-preview.mp3"></audio>

    <script>
        const completedStatus = { flashcard: false, dictation: false };

        function playAudio(audioId) {
            const audio = document.getElementById(audioId);
            if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
        }

        function returnToStart() {
            playAudio('audio-click');
            const audioPlayer = document.getElementById('lesson-audio-player');
            if (audioPlayer) audioPlayer.pause();
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('start-screen').classList.remove('hidden');
        }

        const vocabulary = [
            { h: "挺", p: "tǐng", m: "Khá, rất", ex: "她挺聪明的，同事们都喜欢她。", exp: "Tā tǐng cōngmíng de, tóngshìmen dōu xǐhuan tā.", exv: "Cô ấy khá thông minh, đồng nghiệp đều thích cô ấy." },
            { h: "紧张", p: "jǐnzhāng", m: "Căng thẳng", ex: "第一次面试，他有点紧张。", exp: "Dì yī cì miànshì, tā yǒudiǎn jǐnzhāng.", exv: "Lần đầu phỏng vấn, anh ấy hơi căng thẳng." },
            { h: "信心", p: "xìnxīn", m: "Sự tự tin", ex: "我对自己的能力很有信心。", exp: "Wǒ duì zìjǐ de nénglì hěn yǒu xìnxīn.", exv: "Tôi rất tự tin vào năng lực của mình." },
            { h: "能力", p: "nénglì", m: "Năng lực", ex: "她的组织能力很强。", exp: "Tā de zǔzhī nénglì hěn qiáng.", exv: "Khả năng tổ chức của cô ấy rất tốt." },
            { h: "招聘", p: "zhāopìn", m: "Tuyển dụng", ex: "我们公司正在招聘新员工。", exp: "Wǒmen gōngsī zhèngzài zhāopìn xīn yuángōng.", exv: "Công ty chúng tôi đang tuyển nhân viên mới." },
            { h: "提供", p: "tígōng", m: "Cung cấp", ex: "公司为员工提供午餐。", exp: "Gōngsī wèi yuángōng tígōng wǔcān.", exv: "Công ty cung cấp bữa trưa cho nhân viên." },
            { h: "负责", p: "fùzé", m: "Phụ trách", ex: "他负责公司的 market 工作。", exp: "Tā fùzé gōngsī de shìchǎng gōngzuò.", exv: "Anh ấy phụ trách công việc marketing của công ty." },
            { h: "本来", p: "běnlái", m: "Vốn dĩ", ex: "我本来想去旅游，可是生病了。", exp: "Wǒ běnlái xiǎng qù lǚyóu, kěshì shēngbìng le.", exv: "Tôi vốn định đi du lịch nhưng lại bị ốm." },
            { h: "应聘", p: "yìngpìn", m: "Ứng tuyển", ex: "他应聘了那家外企的经理职位。", exp: "Tā yìngpìn le nà jiā wàiqǐ de jīnglǐ zhíwèi.", exv: "Anh ấy ứng tuyển vị trí quản lý của công ty nước ngoài đó." },
            { h: "材料", p: "cáiliào", m: "Tài liệu", ex: "请把报名材料交到办公室。", exp: "Qǐng bǎ bàomíng cáiliào jiāo dào bàngōngshì.", exv: "Hãy nộp tài liệu đăng ký đến văn phòng." },
            { h: "符合", p: "fúhé", m: "Phù hợp", ex: "你的经验很符合公司的要求。", exp: "Nǐ de jīngyàn hěn fúhé gōngsī de yāoqiú.", exv: "Kinh nghiệm của bạn rất phù hợp với yêu cầu công ty." },
            { h: "通知", p: "tōngzhī", m: "Thông báo", ex: "公司明天会通知你结果。", exp: "Gōngsī míngtiān huì tōngzhī nǐ jiéguǒ.", exv: "Công ty sẽ thông báo kết quả cho bạn vào ngày mai." },
            { h: "律师", p: "lǜshī", m: "Luật sư", ex: "他是一名经验丰富的律师。", exp: "Tā shì yī míng jīngyàn fēngfù de lǜshī.", exv: "Anh ấy là một luật sư giàu kinh nghiệm." },
            { h: "专业", p: "zhuānyè", m: "Chuyên ngành", ex: "我的专业是法律。", exp: "Wǒ de zhuānyè shì fǎlǜ.", exv: "Chuyên ngành của tôi là luật." },
            { h: "另外", p: "lìngwài", m: "Ngoài ra", ex: "我买了一件衣服，另外还买了双鞋。", exp: "Wǒ mǎile yī jiàn yīfu, lìngwài hái mǎile shuāng xié.", exv: "Tôi mua một chiếc áo, ngoài ra còn mua thêm một đôi giày." },
            { h: "收入", p: "shōurù", m: "Thu nhập", ex: "他的月收入很高。", exp: "Tā de yuè shōurù hěn gāo.", exv: "Thu nhập hàng tháng của anh ấy rất cao." },
            { h: "咱们", p: "zánmen", m: "Chúng ta", ex: "咱们明天去看电影吧。", exp: "Zánmen míngtiān qù kàn diànyǐng ba.", exv: "Chúng ta ngày mai đi xem phim nhé." },
            { h: "安排", p: "ānpái", m: "Sắp xếp", ex: "老师安排我负责接待客人。", exp: "Lǎoshī ānpái wǒ fùzé jiēdài kèrén.", exv: "Giáo viên sắp xếp tôi phụ trách đón tiếp khách." },
            { h: "首先", p: "shǒuxiān", m: "Trước hết", ex: "首先，我想感谢大家的帮助。", exp: "Shǒuxiān, wǒ xiǎng gǎnxiè dàjiā de bāngzhù.", exv: "Trước hết, tôi muốn cảm ơn sự giúp đỡ của mọi người." },
            { h: "正式", p: "zhèngshì", m: "Chính thức", ex: "今天是正式上班的第一天。", exp: "Jīntiān shì zhèngshì shàngbān de dì yī tiān.", exv: "Hôm nay là ngày đầu tiên đi làm chính thức." },
            { h: "留", p: "liú", m: "Để lại", ex: "他给我留了一张纸条。", exp: "Tā gěi wǒ liúle yī zhāng zhǐtiáo.", exv: "Anh ấy để lại cho tôi một mẩu giấy." },
            { h: "其次", p: "qícì", m: "Thứ hai, tiếp theo", ex: "首先要努力学习，其次要注意身体。", exp: "Shǒuxiān yào nǔlì xuéxí, qícì yào zhùyì shēntǐ.", exv: "Trước hết phải học chăm, thứ hai là chú ý sức khỏe." },
            { h: "诚实", p: "chéngshí", m: "Trung thực", ex: "他是一个很诚实的员工。", exp: "Tā shì yí ge hěn chéngshí de yuángōng.", exv: "Anh ấy là một nhân viên rất trung thực." },
            { h: "改变", p: "gǎibiàn", m: "Thay đổi", ex: "他的态度完全改变了。", exp: "Tā de tàidù wánquán gǎibiàn le.", exv: "Thái độ của anh ấy đã hoàn toàn thay đổi." },
            { h: "感觉", p: "gǎnjué", m: "Cảm thấy / Cảm giác", ex: "我感觉今天比昨天冷。", exp: "Wǒ gǎnjué jīntiān bǐ zuótiān lěng.", exv: "Tôi cảm thấy hôm nay lạnh hơn hôm qua." },
            { h: "判断", p: "pànduàn", m: "Phán đoán", ex: "你不能只看外表来判断一个人。", exp: "Nǐ bùnéng zhǐ kàn wàibiǎo lái pànduàn yí ge rén.", exv: "Bạn không thể chỉ nhìn bề ngoài để đánh giá một người." },
            { h: "顾客", p: "gùkè", m: "Khách hàng", ex: "这家店的顾客很多。", exp: "Zhè jiā diàn de gùkè hěn duō.", exv: "Cửa hàng này có rất nhiều khách." },
            { h: "准时", p: "zhǔnshí", m: "Đúng giờ", ex: "他每天都准时上班。", exp: "Tā měitiān dōu zhǔnshí shàngbān.", exv: "Anh ấy mỗi ngày đều đi làm đúng giờ." },
            { h: "不管", p: "bùguǎn", m: "Bất kể", ex: "不管结果如何，我都支持你。", exp: "Bùguǎn jiéguǒ rúhé, wǒ dōu zhīchí nǐ.", exv: "Dù kết quả thế nào tôi cũng ủng hộ bạn." },
            { h: "与", p: "yǔ", m: "Với (giống 和)", ex: "他与老师关系很好。", exp: "Tā yǔ lǎoshī guānxì hěn hǎo.", exv: "Anh ấy có quan hệ rất tốt với giáo viên." }
        ];

        const lessonsData = [
            { id: 1, title: "Bài khóa 1", desc: "面试的情况", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson3/03-1.mp3", completed: false, sentences: [{ h: "你上午的面试怎么样？", p: "Nǐ shàngwǔ de miànshì zěnmeyàng?", vi: "Buổi phỏng vấn sáng nay của bạn thế nào?" },{ h: "还可以，他们问的问题都挺容易的。", p: "Hái kěyǐ, tāmen wèn de wèntí dōu tǐng róngyì de.", vi: "Cũng ổn, những câu hỏi họ hỏi đều khá dễ." },{ h: "就是我有点儿紧张。", p: "Jiùshì wǒ yǒudiǎnr jǐnzhāng.", vi: "Chỉ là tôi hơi căng thẳng." },{ h: "面试的时候，一定要对自己有信心。", p: "Miànshì de shíhou, yídìng yào duì zìjǐ yǒu xìnxīn.", vi: "Khi phỏng vấn, nhất định phải có tự tin vào bản thân." },{ h: "要相信自己的能力。", p: "Yào xiāngxìn zìjǐ de nénglì.", vi: "Phải tin vào năng lực của mình." },{ h: "你说得对！", p: "Nǐ shuō de duì!", vi: "Bạn nói đúng!" },{ h: "3月15号上午8点在学校体育馆还有一个招聘会。", p: "Sān yuè shíwǔ hào shàngwǔ bā diǎn zài xuéxiào tǐyùguǎn hái yǒu yí gè zhāopìnhuì.", vi: "Vào 8 giờ sáng ngày 15 tháng 3 tại nhà thi đấu của trường còn có một hội chợ việc làm." },{ h: "你去吗？", p: "Nǐ qù ma?", vi: "Bạn có đi không?" },{ h: "我还没决定呢。", p: "Wǒ hái méi juédìng ne.", vi: "Tôi vẫn chưa quyết định." },{ h: "听说这次招聘会提供的工作机会很多。", p: "Tīngshuō zhè cì zhāopìnhuì tígōng de gōngzuò jīhuì hěn duō.", vi: "Nghe nói hội chợ lần này cung cấp rất nhiều cơ hội việc làm." },{ h: "我们一起去看看吧。", p: "Wǒmen yìqǐ qù kànkan ba.", vi: "Chúng ta cùng đi xem nhé." }] },

            { id: 3, title: "Bài khóa 3", desc: "王静的工作情况", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson3/03-3.mp3", completed: false, sentences: [{ h: "好久不见了！", p: "Hǎo jiǔ bú jiàn le!", vi: "Lâu rồi không gặp!" },{ h: "大学毕业后就没联系了。", p: "Dàxué bìyè hòu jiù méi liánxì le.", vi: "Sau khi tốt nghiệp đại học thì không còn liên lạc nữa." },{ h: "你现在在哪儿工作呢？", p: "Nǐ xiànzài zài nǎr gōngzuò ne?", vi: "Bây giờ bạn đang làm việc ở đâu?" },{ h: "我一毕业就去上海当律师了。", p: "Wǒ yí bìyè jiù qù Shànghǎi dāng lǜshī le.", vi: "Tôi vừa tốt nghiệp là đến Thượng Hải làm luật sư." },{ h: "你对现在的工作一定非常满意 ba?", p: "Nǐ duì xiànzài de gōngzuò yídìng fēicháng mǎnyì ba?", vi: "Bạn chắc chắn rất hài lòng với công việc hiện tại phải không?" },{ h: "我很喜欢现在的工作。", p: "Wǒ hěn xǐhuan xiànzài de gōngzuò.", vi: "Tôi rất thích công việc hiện tại." },{ h: "因为 wǒ 学的就是法律专业。", p: "Yīnwèi wǒ xué de jiùshì fǎlǜ zhuānyè.", vi: "Vì tôi học chuyên ngành luật." },{ h: "而且同事们都很喜欢我。", p: "Érqiě tóngshìmen dōu hěn xǐhuan wǒ.", vi: "Hơn nữa đồng nghiệp đều rất thích tôi." },{ h: "另外，收入也不错。", p: "Lìngwài, shōurù yě búcuò.", vi: "Ngoài ra, thu nhập cũng khá tốt." },{ h: "星期天咱们同学聚会。", p: "Xīngqītiān zánmen tóngxué jùhuì.", vi: "Chủ nhật chúng ta họp lớp." },{ h: "你能来参加吗？", p: "Nǐ néng lái cānjiā ma?", vi: "Bạn có thể đến tham gia không?" },{ h: "能来。", p: "Néng lái.", vi: "Có thể đến." },{ h: "虽然这次来北京，时间安排得很紧张。", p: "Suīrán zhè cì lái Běijīng, shíjiān ānpái de hěn jǐnzhāng.", vi: "Mặc dù lần này đến Bắc Kinh, thời gian sắp xếp rất gấp." },{ h: "但我一定借这次机会去跟大家见见面。", p: "Dàn wǒ yídìng jiè zhè cì jīhuì qù gēn dàjiā jiànjian miàn.", vi: "Nhưng tôi nhất định sẽ nhân cơ hội này đi gặp mọi người." }] },
            { id: 4, title: "Bài khóa 4", desc: "面试的注意事项", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson3/03-4.mp3", completed: false, sentences: [{ h: "面试的时候，经理对我印象不错。", p: "Miànshì de shíhou, jīnglǐ duì wǒ yìnxiàng búcuò.", vi: "Trong lúc phỏng vấn, quản lý có ấn tượng khá tốt về tôi." },{ h: "还通知我明天就可以上班了。", p: "Hái tōngzhī wǒ míngtiān jiù kěyǐ shàngbān le.", vi: "Còn thông báo tôi ngày mai có thể đi làm luôn." },{ h: "真没想到，找工作这么顺利。", p: "Zhēn méi xiǎngdào, zhǎo gōngzuò zhème shùnlì.", vi: "Thật không ngờ, tìm việc lại thuận lợi như vậy." },{ h: "你想知道面试需要注意什么吗？", p: "Nǐ xiǎng zhīdào miànshì xūyào zhùyì shénme ma?", vi: "Bạn có muốn biết khi phỏng vấn cần chú ý điều gì không?" },{ h: "首先，要穿正式的衣服。", p: "Shǒuxiān, yào chuān zhèngshì de yīfu.", vi: "Trước hết, cần mặc trang phục lịch sự." },{ h: "这会给面试者留下一个好的印象。", p: "Zhè huì gěi miànshìzhě liúxià yí gè hǎo de yìnxiàng.", vi: "Điều này sẽ để lại ấn tượng tốt cho người phỏng vấn." },{ h: "让他觉得你是一个认真的人。", p: "Ràng tā juéde nǐ shì yí gè rènzhēn de rén.", vi: "Khiến họ cảm thấy bạn là người nghiêm túc." },{ h: "其次，应聘时不要紧张。", p: "Qícì, yìngpìn shí búyào jǐnzhāng.", vi: "Thứ hai, khi ứng tuyển không nên căng thẳng." },{ h: "回答问题时，说得不要太快。", p: "Huídá wèntí shí, shuō de búyào tài kuài.", vi: "Khi trả lời câu hỏi, đừng nói quá nhanh." },{ h: "声音也不要太小。", p: "Shēngyīn yě búyào tài xiǎo.", vi: "Giọng nói cũng không nên quá nhỏ." },{ h: "要相信自己有能力做好。", p: "Yào xiāngxìn zìjǐ yǒu nénglì zuò hǎo.", vi: "Phải tin rằng mình có khả năng làm tốt." },{ h: "当然，最重要的是回答问题要诚实。", p: "Dāngrán, zuì zhòngyào de shì huídá wèntí yào chéngshí.", vi: "Tất nhiên, quan trọng nhất là phải trả lời trung thực." }] },
            { id: 5, title: "Bài khóa 5", desc: "第一印象的重要性", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson3/03-5.mp3", completed: false, sentences: [{ h: "第一印象就是在第一次见面时给别人留下的印象。", p: "Dì yī yìnxiàng jiùshì zài dì yī cì jiànmiàn shí gěi biérén liúxià de yìnxiàng.", vi: "Ấn tượng đầu tiên là ấn tượng để lại cho người khác trong lần gặp đầu tiên." },{ h: "虽然第一印象不总是对的。", p: "Suīrán dì yī yìnxiàng bù zǒng shì duì de.", vi: "Mặc dù ấn tượng đầu tiên không phải lúc nào cũng đúng." },{ h: "但如果想改变却很困难。", p: "Dàn rúguǒ xiǎng gǎibiàn què hěn kùnnan.", vi: "Nhưng nếu muốn thay đổi thì lại rất khó." },{ h: "你给别人的第一印象会影响他们以后对你的感觉 và 判断。", p: "Nǐ gěi biérén de dì yī yìnxiàng huì yǐngxiǎng tāmen yǐhòu duì nǐ de gǎnjué hé pànduàn.", vi: "Ấn tượng đầu tiên bạn để lại sẽ ảnh hưởng đến cảm nhận và đánh giá của họ về bạn sau này." },{ h: "所以，给第一次见面的同事留下好的印象。", p: "Suǒyǐ, gěi dì yī cì jiànmiàn de tóngshì liúxià hǎo de yìnxiàng.", vi: "Vì vậy, hãy để lại ấn tượng tốt với đồng nghiệp gặp lần đầu." },{ h: "以后的工作可能会更顺利。", p: "Yǐhòu de gōngzuò kěnéng huì gèng shùnlì.", vi: "Công việc sau này có thể sẽ thuận lợi hơn." },{ h: "给第一次见面的顾客留下好的印象。", p: "Gěi dì yī cì jiànmiàn de gùkè liúxià hǎo de yìnxiàng.", vi: "Để lại ấn tượng tốt với khách hàng gặp lần đầu." },{ h: "你可能会卖出更多的东西。", p: "Nǐ kěnéng huì màichū gèng duō de dōngxi.", vi: "Bạn có thể bán được nhiều hàng hơn." },{ h: "但是，如果第一次见面给别人留下像不准时这样的坏印象。", p: "Dànshì, rúguǒ dì yī cì jiànmiàn gěi biérén liúxià xiàng bù zhǔnshí zhèyàng de huài yìnxiàng.", vi: "Nhưng nếu lần đầu gặp mà để lại ấn tượng xấu như không đúng giờ." },{ h: "那么以后就很难让别人相信你。", p: "Nàme yǐhòu jiù hěn nán ràng biérén xiāngxìn nǐ.", vi: "Thì sau này sẽ rất khó để người khác tin tưởng bạn." },{ h: "所以不管是上课、上班，还是与别人约会。", p: "Suǒyǐ bùguǎn shì shàngkè, shàngbān, háishì yǔ biérén yuēhuì.", vi: "Vì vậy dù là đi học, đi làm hay hẹn gặp người khác." },{ h: "准时都非常重要。", p: "Zhǔnshí dōu fēicháng zhòngyào.", vi: "Đúng giờ đều rất quan trọng." }] }
        ];

        let currentFlashList = [], flashcardIdx = 0, learnedCount = 0, unlearnedItems = [];
        function startFlashcards(list) {
            playAudio('audio-click');
            currentFlashList = [...list];
            flashcardIdx = 0; learnedCount = 0; unlearnedItems = [];
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('flashcard-screen').classList.remove('hidden');
            document.getElementById('card-total').innerText = currentFlashList.length;
            updateFlashcard();
        }
        function updateFlashcard() {
            const card = currentFlashList[flashcardIdx];
            document.getElementById('card-index').innerText = flashcardIdx + 1;
            document.getElementById('card-hanzi').innerText = card.h;
            document.getElementById('card-pinyin').innerText = card.p;
            document.getElementById('card-mean').innerText = card.m;
            document.getElementById('card-example-cn').innerText = card.ex;
            document.getElementById('card-example-py').innerText = card.exp;
            document.getElementById('card-example-vi').innerText = card.exv;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }
        function flipCard() { playAudio('audio-flip'); document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }
        function markCard(learned) {
            if (learned) learnedCount++; else unlearnedItems.push(currentFlashList[flashcardIdx]);
            flashcardIdx++;
            if (flashcardIdx < currentFlashList.length) updateFlashcard(); else showFlashcardStats();
        }
        function showFlashcardStats() {
            document.getElementById('flashcard-screen').classList.add('hidden');
            document.getElementById('flashcard-stat-screen').classList.remove('hidden');
            const learnedPercent = Math.round((learnedCount / currentFlashList.length) * 100);
            document.getElementById('stat-learned-percent').innerText = learnedPercent + "%";
            document.getElementById('stat-unlearned-percent').innerText = (100 - learnedPercent) + "%";
            const listContainer = document.getElementById('unlearned-list');
            listContainer.innerHTML = unlearnedItems.length > 0 ? '' : '<p class="text-center py-4 font-bold text-emerald-700">Tuyệt vời! Bạn đã thuộc hết.</p>';
            unlearnedItems.forEach(item => {
                listContainer.innerHTML += `<div class="flex justify-between border-b border-amber-200 pb-1 text-sm"><span class="font-bold text-amber-900">${item.h}</span><span class="text-gray-600">${item.m}</span></div>`;
            });
            document.getElementById('btn-relearn').classList.toggle('hidden', unlearnedItems.length === 0);
        }
        function relearnUnlearned() { startFlashcards(unlearnedItems); }
        function endFlashcardSession() { completedStatus.flashcard = true; document.getElementById('check-flashcard').classList.remove('hidden'); checkUnlockForm(); returnToStart(); }

        let currentLessonIdx = -1, dictStep = 0;
        function openDictationMenu() {
            playAudio('audio-click');
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('dictation-menu-screen').classList.remove('hidden');
            renderLessonList();
        }
        function renderLessonList() {
            const listContainer = document.getElementById('lesson-list');
            listContainer.innerHTML = '';
            let allCompleted = true;
            lessonsData.forEach((lesson, index) => {
                if (!lesson.completed) allCompleted = false;
                const btn = document.createElement('button');
                btn.className = `btn-ghibli text-left py-4 relative flex flex-col ${lesson.completed ? 'opacity-80 bg-emerald-100' : ''}`;
                btn.onclick = () => startDictationLesson(index);
                btn.innerHTML = `<span class="font-bold">${lesson.title}</span><span class="text-xs">${lesson.desc}</span>${lesson.completed ? '<span class="absolute right-4 text-xl">✅</span>' : ''}`;
                listContainer.appendChild(btn);
            });
            if (allCompleted && lessonsData.length > 0) {
                document.getElementById('dictation-menu-screen').classList.add('hidden');
                document.getElementById('dictation-end-screen').classList.remove('hidden');
            }
        }
        function startDictationLesson(index) {
            playAudio('audio-click');
            currentLessonIdx = index;
            dictStep = 0;
            document.getElementById('dictation-menu-screen').classList.add('hidden');
            document.getElementById('dictation-screen').classList.remove('hidden');
            document.getElementById('lesson-audio-player').src = lessonsData[currentLessonIdx].audioSrc;
            loadDictationStep();
        }
        function backToDictationMenu() { 
            const player = document.getElementById('lesson-audio-player');
            player.pause();
            openDictationMenu(); 
        }
        function loadDictationStep() {
            const lesson = lessonsData[currentLessonIdx];
            const sentenceObj = lesson.sentences[dictStep];
            document.getElementById('dictation-title-display').innerHTML = `Bài 3: Câu <span id="dict-step">${dictStep + 1}</span>/${lesson.sentences.length}`;
            const rawH = sentenceObj.h.replace(/[，。？！、\s]/g, '');
            document.getElementById('sentence-range-hint').innerText = `${rawH.substring(0, 2)} ... ${rawH.substring(rawH.length - 2)}`;
            const inputField = document.getElementById('dict-input');
            inputField.value = ""; inputField.disabled = false;
            document.getElementById('dict-answer-box').classList.add('hidden');
            document.getElementById('btn-next-dict').classList.add('hidden');
            inputField.focus();
        }
        function cleanChineseText(text) { return text.replace(/[^\u4e00-\u9fa5]/g, '').trim(); }
        function checkDictation() {
            const sentenceObj = lessonsData[currentLessonIdx].sentences[dictStep];
            const feedback = document.getElementById('dict-feedback');
            const userInput = cleanChineseText(document.getElementById('dict-input').value);
            const correctInput = cleanChineseText(sentenceObj.h);
            
            if (userInput === correctInput) {
                playAudio('audio-correct');
                feedback.innerText = "Chính xác! 🌟";
                feedback.className = "w-full p-2 rounded-lg text-center bg-emerald-100 text-emerald-700 font-bold";
            } else {
                playAudio('audio-wrong');
                feedback.innerText = "Chưa đúng! Đáp án:";
                feedback.className = "w-full p-2 rounded-lg text-center bg-rose-100 text-rose-700 font-bold";
            }
            document.getElementById('ans-hanzi').innerText = sentenceObj.h;
            document.getElementById('ans-pinyin').innerText = sentenceObj.p;
            document.getElementById('ans-vi').innerText = sentenceObj.vi;
            document.getElementById('dict-answer-box').classList.remove('hidden');
            document.getElementById('dict-input').disabled = true;
            
            const btnNext = document.getElementById('btn-next-dict');
            btnNext.innerText = (dictStep === lessonsData[currentLessonIdx].sentences.length - 1) ? "Hoàn thành Bài khóa 🏆" : "Câu tiếp theo ➡️";
            btnNext.classList.remove('hidden');
        }
        function nextDictation() {
            if (dictStep < lessonsData[currentLessonIdx].sentences.length - 1) {
                dictStep++;
                loadDictationStep();
            } else {
                lessonsData[currentLessonIdx].completed = true;
                openDictationMenu();
            }
        }
        function endDictationSession() { completedStatus.dictation = true; document.getElementById('check-dictation').classList.remove('hidden'); checkUnlockForm(); returnToStart(); }

        function checkUnlockForm() {
            const allDictDone = lessonsData.every(l => l.completed);
            if (completedStatus.flashcard && allDictDone) {
                const btn = document.getElementById('btn-form');
                btn.disabled = false;
                btn.className = "btn-ghibli text-lg mt-2 bg-emerald-100 border-emerald-500 text-emerald-800 shadow-md";
                btn.innerHTML = '📝 Phần 3: Bài Tập (Đã mở khóa)';
                btn.onclick = () => window.open('https://forms.gle/KninNTAi99ZFSqASA', '_blank');
            }
        }

        document.addEventListener("keydown", function(e) {
            const dictScreen = document.getElementById('dictation-screen');
            if (e.key === "Enter" && !dictScreen.classList.contains('hidden')) {
                e.preventDefault();
                const btnNext = document.getElementById('btn-next-dict');
                const inputField = document.getElementById('dict-input');
                if (!btnNext.classList.contains('hidden')) nextDictation();
                else if (!inputField.disabled) checkDictation();
            }
        });
    </script>
</body>
</html>
