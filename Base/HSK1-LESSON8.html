    <script>
        // --- ÂM THANH ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU BÀI 8 ---
        const hanziData = [
            { char: '想', pinyin: 'xiǎng', meaning: 'muốn, nhớ', type: 'Hình thanh & Hội ý', radical: '心 (Tâm)', memo: 'Tướng (相 - nhìn) bằng Tâm (心 - lòng) thì sinh ra TƯỞNG nhớ, mong MUỐN.' },
            { char: '喝', pinyin: 'hē', meaning: 'uống', type: 'Hình thanh', radical: '口 (Khẩu)', memo: 'Há miệng (口) để UỐNG nước.' },
            { char: '茶', pinyin: 'chá', meaning: 'trà', type: 'Hội ý', radical: '艹 (Thảo)', memo: 'Cây cỏ (艹) mọc giữa người (人) và cây (木) là cây TRÀ.' },
            { char: '买', pinyin: 'mǎi', meaning: 'mua', type: 'Hội ý', radical: '乙 (Ất)', memo: 'Có cái đầu (乛) và mang tiền móc (乙) đi MUA đồ.' },
            { char: '店', pinyin: 'diàn', meaning: 'cửa hàng', type: 'Hình thanh', radical: '广 (Nghiễm)', memo: 'Dưới mái nhà (广) có người bói toán (占 - chiếm) mở CỬA HÀNG.' },
            { char: '杯', pinyin: 'bēi', meaning: 'cốc, ly', type: 'Hình thanh', radical: '木 (Mộc)', memo: 'Ngày xưa LY, CỐC làm bằng gỗ (木), bên phải là chữ Bất (不) chỉ âm.' },
            { char: '钱', pinyin: 'qián', meaning: 'tiền', type: 'Hình thanh', radical: '钅 (Kim)', memo: 'TIỀN thời xưa làm bằng kim loại (钅), có thể gây ra tranh chấp bằng vũ khí (戋).' },
            { char: '块', pinyin: 'kuài', meaning: 'đồng, cục', type: 'Hình thanh', radical: '土 (Thổ)', memo: 'CỤC đất (土) chia thành nhiều ĐỒNG để trao đổi.' }
        ];

        const vocabData = [
            { word: '想', pinyin: 'xiǎng', meaning: 'Muốn, nhớ', ex_cn: '我想喝茶。', ex_py: 'Wǒ xiǎng hē chá.', ex_vn: 'Tôi muốn uống trà.' },
            { word: '喝', pinyin: 'hē', meaning: 'Uống', ex_cn: '你喝什么？', ex_py: 'Nǐ hē shénme?', ex_vn: 'Bạn uống gì?' },
            { word: '茶', pinyin: 'chá', meaning: 'Trà', ex_cn: '中国茶', ex_py: 'Zhōngguó chá', ex_vn: 'Trà Trung Quốc' },
            { word: '吃', pinyin: 'chī', meaning: 'Ăn', ex_cn: '你吃什么？', ex_py: 'Nǐ chī shénme?', ex_vn: 'Bạn ăn gì?' },
            { word: '米饭', pinyin: 'mǐfàn', meaning: 'Cơm', ex_cn: '我吃米饭。', ex_py: 'Wǒ chī mǐfàn.', ex_vn: 'Tôi ăn cơm.' },
            { word: '下午', pinyin: 'xiàwǔ', meaning: 'Buổi chiều', ex_cn: '下午我去商店。', ex_py: 'Xiàwǔ wǒ qù shāngdiàn.', ex_vn: 'Buổi chiều tôi đi cửa hàng.' },
            { word: '商店', pinyin: 'shāngdiàn', meaning: 'Cửa hàng', ex_cn: '去商店买东西。', ex_py: 'Qù shāngdiàn mǎi dōngxi.', ex_vn: 'Đi cửa hàng mua đồ.' },
            { word: '买', pinyin: 'mǎi', meaning: 'Mua', ex_cn: '我想买一个杯子。', ex_py: 'Wǒ xiǎng mǎi yí ge bēizi.', ex_vn: 'Tôi muốn mua 1 cái ly.' },
            { word: '个', pinyin: 'gè', meaning: 'Cái, chiếc', ex_cn: '一个杯子', ex_py: 'Yí ge bēizi', ex_vn: 'Một cái ly' },

            { word: '这', pinyin: 'zhè', meaning: 'Đây, này', ex_cn: '这是一个杯子。', ex_py: 'Zhè shì yí ge bēizi.', ex_vn: 'Đây là một cái ly.' },
            { word: '多少', pinyin: 'duōshao', meaning: 'Bao nhiêu', ex_cn: '多少钱？', ex_py: 'Duōshao qián?', ex_vn: 'Bao nhiêu tiền?' },
            { word: '钱', pinyin: 'qián', meaning: 'Tiền', ex_cn: '买杯子多少钱？', ex_py: 'Mǎi bēizi duōshao qián?', ex_vn: 'Mua ly bao nhiêu tiền?' },
            { word: '块', pinyin: 'kuài', meaning: 'Đồng', ex_cn: '二十块', ex_py: 'Èrshí kuài', ex_vn: '20 đồng' },
            { word: '那', pinyin: 'nà', meaning: 'Kia, đó', ex_cn: '那个人是谁？', ex_py: 'Nà ge rén shì shéi?', ex_vn: 'Người kia là ai?' },
            { word: '好吃', pinyin: 'hǎochī', meaning: 'Ngon (đồ ăn)', ex_cn: '中国菜很好吃。', ex_py: 'Zhōngguó cài hěn hǎochī.', ex_vn: 'Món ăn Trung Quốc rất ngon.' },
            { word: '好喝', pinyin: 'hǎohē', meaning: 'Ngon (đồ uống)', ex_cn: '这个茶很好喝。', ex_py: 'Zhège chá hěn hǎohē.', ex_vn: 'Trà này rất ngon.' },
            { word: '早上', pinyin: 'zǎoshang', meaning: 'Buổi sáng', ex_cn: '早上好！', ex_py: 'Zǎoshang hǎo!', ex_vn: 'Chào buổi sáng!' }
        ];

        const quizQuestions = [
            { q: 'Từ nào có nghĩa là "muốn, nhớ" trong tiếng Trung?', options: ['看 (kàn)', '想 (xiǎng)', '吃 (chī)', '去 (qù)'], answer: 1, exp: '想 (xiǎng) là động từ năng nguyện, có nghĩa là "muốn" làm gì đó, hoặc "nhớ" ai đó.' },
            { q: 'Dịch câu: "Tôi muốn uống trà."', options: ['我喝想茶。', '我想喝茶。', '我想吃茶。', '喝我想茶。'], answer: 1, exp: 'Cấu trúc: Chủ ngữ (我) + 想 (muốn) + Động từ (喝) + Tân ngữ (茶).' },
            { q: 'Chữ <span class="question-highlight">茶</span> (trà) có chứa bộ thủ nào liên quan đến cây cỏ?', options: ['Bộ Mộc (木)', 'Bộ Thuỷ (氵)', 'Bộ Khẩu (口)', 'Bộ Thảo (艹)'], answer: 3, exp: 'Bộ Thảo (艹) thường xuất hiện trong các chữ liên quan đến thực vật, cây cỏ.' },
            { q: '"Buổi chiều" trong tiếng Trung là gì?', options: ['今天 (jīntiān)', '下午 (xiàwǔ)', '明天 (míngtiān)', '昨天 (zuótiān)'], answer: 1, exp: '下午 (xiàwǔ) nghĩa là Buổi chiều.' },
            { q: '"Cơm" trong tiếng Trung nói như thế nào?', options: ['茶 (chá)', '菜 (cài)', '米饭 (mǐfàn)', '汉字 (Hànzì)'], answer: 2, exp: '米饭 (mǐfàn) là Cơm. Thường ghép với từ 吃 (ăn) thành 吃米饭.' },
            { q: 'Để hỏi "Cái này bao nhiêu tiền?", ta dùng câu nào?', options: ['这个多少钱？', '这个几钱？', '这个多少块？', '多少钱这个？'], answer: 0, exp: '这个 (cái này) + 多少钱 (bao nhiêu tiền).' },
            { q: 'Lượng từ phổ biến nhất trong tiếng Trung dùng cho người và vật (như "cái, chiếc") là từ nào?', options: ['岁 (suì)', '口 (kǒu)', '个 (gè)', '块 (kuài)'], answer: 2, exp: '个 (gè) là lượng từ thông dụng nhất. Ví dụ: 一个杯子 (1 cái ly).' },
            { q: 'Chữ <span class="question-highlight">钱</span> (Tiền) được ghép từ bộ thủ nào liên quan đến kim loại?', options: ['Bộ Thổ (土)', 'Bộ Kim (钅)', 'Bộ Mộc (木)', 'Bộ Nhân (亻)'], answer: 1, exp: 'Tiền thời xưa đúc bằng đồng/kim loại nên chữ 钱 có bộ Kim (钅).' },
            { q: '"Cửa hàng" tiếng Trung đọc là gì?', options: ['xuéxiào', 'shāngdiàn', 'míngtiān', 'bēizi'], answer: 1, exp: '商店 (shāngdiàn) nghĩa là Cửa hàng.' },
            { q: 'Điền vào chỗ trống: 我去商店 _____ 一个杯子。 (Tôi đi cửa hàng mua 1 cái ly)', options: ['看 (kàn)', '吃 (chī)', '买 (mǎi)', '喝 (hē)'], answer: 2, exp: '买 (mǎi) có nghĩa là Mua. Đi cửa hàng để Mua đồ.' },
            { q: 'Đơn vị tiền tệ thường dùng trong khẩu ngữ của Trung Quốc là gì?', options: ['块 (kuài)', '个 (gè)', '号 (hào)', '岁 (suì)'], answer: 0, exp: '块 (kuài) có nghĩa là "Đồng", dùng rất phổ biến khi nói về tiền bạc hàng ngày.' },
            { q: '"Kia, đó" trong tiếng Trung là đại từ nào?', options: ['这 (zhè)', '哪 (nǎ)', '谁 (shéi)', '那 (nà)'], answer: 3, exp: '那 (nà) nghĩa là Kia, đó (chỉ vị trí ở xa). Ngược với 这 (zhè) là Đây, này.' },
            { q: 'Chữ <span class="question-highlight">杯</span> trong 杯子 (cái ly) có bộ Mộc (木) ở bên trái. Điều này cho thấy ngày xưa ly thường được làm bằng gì?', options: ['Đất', 'Gỗ', 'Vàng', 'Thủy tinh'], answer: 1, exp: 'Bộ Mộc (木) chỉ các đồ vật liên quan đến cây cối, gỗ. Ngày xưa ly cốc hay làm bằng gỗ hoặc tre.' },
            { q: 'Câu "下午你想做什么？" (Xiàwǔ nǐ xiǎng zuò shénme?) có nghĩa là gì?', options: ['Hôm nay bạn muốn làm gì?', 'Buổi chiều bạn muốn làm gì?', 'Ngày mai bạn đi đâu?', 'Buổi chiều bạn muốn mua gì?'], answer: 1, exp: '下午 (Buổi chiều) + 你想 (bạn muốn) + 做什么 (làm gì).' },
            { q: 'Nếu muốn mua một ly trà có giá 15 đồng, người bán sẽ nói giá là bao nhiêu?', options: ['五十块 (wǔshí kuài)', '五块 (wǔ kuài)', '十五块 (shíwǔ kuài)', '十五个 (shíwǔ gè)'], answer: 2, exp: 'Số 15 là 十五 (shíwǔ), ghép với đơn vị tiền tệ 块 (kuài) ta được 十五块.' }
        ];

        // --- RENDER ---
        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Lật thẻ</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "✅" : "❌";
            document.getElementById('modal-title').innerText = correct ? "Đúng rồi!" : "Tiếc quá!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
