    <script>
        // --- ÂM THANH ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU BÀI 9 ---
        // Phân tích các chữ Hán mới (Bỏ qua 子, 儿, 生 vì đã học/liên quan bài trước)
        const hanziData = [
            { char: '小', pinyin: 'xiǎo', meaning: 'nhỏ, bé', type: 'Tượng hình', radical: '小 (Tiểu)', memo: 'Hình ảnh một vật bị chia cắt làm đôi ở hai bên, trở nên NHỎ bé.' },
            { char: '猫', pinyin: 'māo', meaning: 'con mèo', type: 'Hình thanh', radical: '犭 (Khuyển)', memo: 'Con MÈO (bộ 犭chỉ động vật) thường kêu meo meo ngoài đồng cỏ (苗 - miêu).' },
            { char: '狗', pinyin: 'gǒu', meaning: 'con chó', type: 'Hình thanh', radical: '犭 (Khuyển)', memo: 'Con CHÓ (bộ 犭) kêu sủa gâu gâu từng câu (句 - câu).' },
            { char: '在', pinyin: 'zài', meaning: 'ở, tại', type: 'Hình thanh', radical: '土 (Thổ)', memo: 'Cắm một cây thập tự (十) trên mặt đất (土) để đánh dấu vị trí mình đang Ở.' },
            { char: '椅', pinyin: 'yǐ', meaning: 'ghế', type: 'Hình thanh', radical: '木 (Mộc)', memo: 'Chiếc GHẾ làm bằng gỗ (木) có hình dáng rất kì lạ (奇 - kì).' },
            { char: '工', pinyin: 'gōng', meaning: 'công, thợ', type: 'Tượng hình', radical: '工 (Công)', memo: 'Hình dáng chiếc thước đo góc vuông của người thợ, tượng trưng cho CÔNG VIỆC.' },
            { char: '医', pinyin: 'yī', meaning: 'y, chữa bệnh', type: 'Hội ý', radical: '匚 (Phương)', memo: 'Cất giấu (匚) mũi tên (矢) đã nhổ ra để CHỮA TRỊ vết thương.' },
            { char: '爸', pinyin: 'bà', meaning: 'bố, ba', type: 'Hình thanh', radical: '父 (Phụ)', memo: 'Người CHA (父) là trụ cột gia đình, bên dưới có chữ 巴 (ba) chỉ âm đọc.' }
        ];

        const vocabData = [
            { word: '小', pinyin: 'xiǎo', meaning: 'Nhỏ, bé', ex_cn: '小狗和小猫。', ex_py: 'Xiǎo gǒu hé xiǎo māo.', ex_vn: 'Chó con và mèo con.' },
            { word: '猫', pinyin: 'māo', meaning: 'Mèo', ex_cn: '我的猫在哪儿？', ex_py: 'Wǒ de māo zài nǎr?', ex_vn: 'Con mèo của tôi ở đâu?' },
            { word: '在', pinyin: 'zài', meaning: 'Ở, tại', ex_cn: '他在医院。', ex_py: 'Tā zài yīyuàn.', ex_vn: 'Anh ấy ở bệnh viện.' },
            { word: '哪儿', pinyin: 'nǎr', meaning: 'Ở đâu, chỗ nào', ex_cn: '你去哪儿？', ex_py: 'Nǐ qù nǎr?', ex_vn: 'Bạn đi đâu?' },
            { word: '狗', pinyin: 'gǒu', meaning: 'Chó', ex_cn: '那是一只狗。', ex_py: 'Nà shì yì zhī gǒu.', ex_vn: 'Đó là một con chó.' },
            { word: '椅子', pinyin: 'yǐzi', meaning: 'Ghế tựa', ex_cn: '猫在椅子下面。', ex_py: 'Māo zài yǐzi xiàmian.', ex_vn: 'Con mèo ở dưới cái ghế.' },
            { word: '下面', pinyin: 'xiàmian', meaning: 'Bên dưới', ex_cn: '在桌子下面。', ex_py: 'Zài zhuōzi xiàmian.', ex_vn: 'Ở bên dưới cái bàn.' },
            { word: '工作', pinyin: 'gōngzuò', meaning: 'Làm việc / Công việc', ex_cn: '他在哪儿工作？', ex_py: 'Tā zài nǎr gōngzuò?', ex_vn: 'Anh ấy làm việc ở đâu?' },
            { word: '儿子', pinyin: 'érzi', meaning: 'Con trai', ex_cn: '我儿子三岁了。', ex_py: 'Wǒ érzi sān suì le.', ex_vn: 'Con trai tôi 3 tuổi rồi.' },
            { word: '医院', pinyin: 'yīyuàn', meaning: 'Bệnh viện', ex_cn: '去医院看医生。', ex_py: 'Qù yīyuàn kàn yīshēng.', ex_vn: 'Đi bệnh viện khám bác sĩ.' },
            { word: '医生', pinyin: 'yīshēng', meaning: 'Bác sĩ', ex_cn: '我爸爸是医生。', ex_py: 'Wǒ bàba shì yīshēng.', ex_vn: 'Bố tôi là bác sĩ.' },
            { word: '爸爸', pinyin: 'bàba', meaning: 'Bố, cha', ex_cn: '爸爸在家。', ex_py: 'Bàba zài jiā.', ex_vn: 'Bố ở nhà.' }
        ];

        const quizQuestions = [
            { q: 'Đại từ dùng để hỏi địa điểm "Ở đâu" trong tiếng Trung là gì?', options: ['什么 (shénme)', '哪儿 (nǎr)', '怎么 (zěnme)', '谁 (shéi)'], answer: 1, exp: '哪儿 (nǎr) có nghĩa là "Ở đâu, chỗ nào", dùng để hỏi về vị trí.' },
            { q: 'Dịch câu: "Con mèo ở đâu?" sang tiếng Trung.', options: ['小猫是谁？', '小狗在哪儿？', '小猫在哪儿？', '在小猫哪儿？'], answer: 2, exp: 'Chủ ngữ (小猫 - Mèo con) + 在 (ở) + 哪儿 (đâu).' },
            { q: 'Cả chữ <span class="question-highlight">猫</span> (Mèo) và <span class="question-highlight">狗</span> (Chó) đều có chung bộ thủ nào ở bên trái?', options: ['Bộ Thủy (氵)', 'Bộ Khẩu (口)', 'Bộ Nhân (亻)', 'Bộ Khuyển (犭)'], answer: 3, exp: 'Bộ Khuyển (犭) thường xuất hiện trong các chữ Hán chỉ loài vật (như chó, mèo, heo, sói...).' },
            { q: '"Bên dưới, phía dưới" tiếng Trung nói như thế nào?', options: ['今天 (jīntiān)', '下面 (xiàmian)', '下午 (xiàwǔ)', '前面 (qiánmian)'], answer: 1, exp: '下面 (xiàmian) hoặc 下 (xià) đều có nghĩa là bên dưới.' },
            { q: 'Nghề "Bác sĩ" tiếng Trung đọc là gì?', options: ['yīshēng', 'yīyuàn', 'lǎoshī', 'xuéshēng'], answer: 0, exp: '医生 (yīshēng) nghĩa là Bác sĩ. (Lưu ý: 医院 yīyuàn là Bệnh viện).' },
            { q: 'Điền từ còn thiếu: 医生在 ______ 工作。 (Bác sĩ làm việc ở bệnh viện).', options: ['学校 (xuéxiào)', '医院 (yīyuàn)', '商店 (shāngdiàn)', '家 (jiā)'], answer: 1, exp: '医院 (yīyuàn) là Bệnh viện - nơi làm việc của bác sĩ.' },
            { q: 'Dịch câu "Bạn làm việc ở đâu?"', options: ['你在哪儿工作？', '你工作哪儿？', '在哪儿你工作？', '你做哪儿工作？'], answer: 0, exp: 'Trong tiếng Trung, trạng ngữ chỉ địa điểm (在哪儿) phải đứng TRƯỚC động từ chính (工作).' },
            { q: '"Bố, cha" trong tiếng Trung gọi là gì?', options: ['妈妈 (māma)', '女儿 (nǚ\'ér)', '儿子 (érzi)', '爸爸 (bàba)'], answer: 3, exp: '爸爸 (bàba) có nghĩa là Bố/Ba.' },
            { q: 'Chữ <span class="question-highlight">椅</span> (Trong từ 椅子 - cái ghế) có bộ Mộc (木) vì ngày xưa ghế thường làm bằng gì?', options: ['Sắt', 'Đất', 'Gỗ', 'Nhựa'], answer: 2, exp: 'Bộ Mộc (木) chỉ các đồ vật làm từ cây cối, gỗ. Ghế ngày xưa chủ yếu đóng bằng gỗ.' },
            { q: 'Pinyin của từ "Công việc, làm việc" là gì?', options: ['gōngzuò', 'gōngzì', 'hànyǔ', 'míngzi'], answer: 0, exp: '工作 (gōngzuò) vừa là Động từ (làm việc) vừa là Danh từ (công việc).' },
            { q: '"Con trai" tiếng Trung là gì?', options: ['女儿 (nǚ\'ér)', '儿子 (érzi)', '学生 (xuéshēng)', '朋友 (péngyou)'], answer: 1, exp: '儿子 (érzi) là Con trai. (Ngược lại 女儿 nǚ\'ér là con gái).' },
            { q: 'Từ nào mang nghĩa trái ngược với từ 大 (dà - to, lớn)?', options: ['多 (duō)', '小 (xiǎo)', '少 (shǎo)', '好 (hǎo)'], answer: 1, exp: '大 (dà - Lớn) > < 小 (xiǎo - Nhỏ).' },
            { q: 'Sắp xếp các từ sau thành câu hoàn chỉnh: 椅子 / 猫 / 在 / 下面。', options: ['椅子在猫下面。', '猫下面在椅子。', '在椅子下面猫。', '猫在椅子下面。'], answer: 3, exp: 'Chủ ngữ (猫) + 在 + Địa điểm (椅子下面) -> Mèo ở dưới cái ghế.' },
            { q: 'Trong câu "他在家" (Anh ấy ở nhà), chữ 在 (zài) đóng vai trò gì?', options: ['Động từ', 'Danh từ', 'Lượng từ', 'Đại từ'], answer: 0, exp: 'Trong câu này, 在 là động từ chính mang nghĩa "Ở" (Anh ấy ở nhà).' },
            { q: 'Chọn đáp án đúng điền vào chỗ trống: 我的狗 ____ 椅子下面。', options: ['是 (shì)', '有 (yǒu)', '在 (zài)', '去 (qù)'], answer: 2, exp: 'Dùng 在 (zài) để chỉ vị trí: 我的狗在椅子下面 (Chó của tôi ở dưới ghế).' }
        ];

        // --- RENDER ---
        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Lật thẻ</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "✅" : "❌";
            document.getElementById('modal-title').innerText = correct ? "Đúng rồi!" : "Tiếc quá!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
