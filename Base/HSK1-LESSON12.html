            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            { q: 'Phủ định của "Lạnh" là gì?', options: ['不冷 (bù lěng)', '没冷 (méi lěng)', '太冷 (tài lěng)', '不热 (bù rè)'], answer: 0, exp: 'Dùng phó từ 不 để phủ định tính từ.' },
            { q: '"Ăn thêm chút trái cây đi" nói thế nào?', options: ['吃水果。', '多吃点儿水果。', '少吃点儿水果。', '不吃水果。'], answer: 1, exp: '多 (Nhiều) + 吃 (Ăn) + 点儿 (Chút) + 水果 (Trái cây).' },
            { q: 'Từ "Cô / Tiểu thư" trong tiếng Trung là gì?', options: ['先生 (xiānsheng)', '小姐 (xiǎojiě)', '医生 (yīshēng)', '老师 (lǎoshī)'], answer: 1, exp: '小姐 (xiǎojiě) dùng cho phụ nữ trẻ.' },
            { q: 'Nếu thời tiết không nóng cũng không lạnh, ta nói:', options: ['太热了', '太冷了', '不冷不热', '会冷会热'], answer: 2, exp: '不冷不热 (Bù lěng bú rè) nghĩa là vừa phải, mát mẻ.' },
            { q: 'Chữ <span class="question-highlight">爱</span> có nghĩa là gì trong bài này?', options: ['Yêu người nào đó', 'Thích làm gì đó', 'Cả 2 phương án trên', 'Không có nghĩa nào đúng'], answer: 2, exp: '爱 có thể là yêu (tình cảm) hoặc thích (thói quen, sở thích).' },
            { q: 'Dịch câu: "Ngày mai thời tiết thế nào?"', options: ['明天天气怎么样？', '昨天天气怎么样？', '今天天气怎么样？', '明天天气好吗？'], answer: 0, exp: '明天 (Ngày mai) + 天气 (Thời tiết) + 怎么样 (Thế nào).' }
        ];

        function render() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details"><p><b>🧩 Bộ thủ:</b> ${h.radical}</p></div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front"><div class="word-cn">${v.word}</div><div class="hint">👆 Chạm để lật</div></div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div><div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div><div class="ex-py">${v.ex_py}</div><div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        let currentQ = 0, score = 0, answering = false;
        function switchTab(id) {
            playSound('click');
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'game') startGame();
        }

        function startGame() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ+1}/15`;
            document.getElementById('progress').style.width = `${(currentQ/15)*100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => {
                    if(answering) return; answering = true;
                    if(i === q.answer) { btn.classList.add('correct'); score += 10; playSound('correct'); }
                    else { btn.classList.add('wrong'); container.children[q.answer].classList.add('correct'); playSound('wrong'); }
                    setTimeout(() => showModal(i === q.answer), 600);
                };
                container.appendChild(btn);
            });
        }

        function showModal(correct) {
            const m = document.getElementById('explanation-modal');
            document.getElementById('modal-icon').innerText = correct ? "🌸" : "☁️";
            document.getElementById('modal-title').innerText = correct ? "Giỏi quá!" : "Cố lên nhé!";
            document.getElementById('modal-title').className = `modal-title ${correct ? 't-correct' : 't-wrong'}`;
            document.getElementById('modal-desc').innerText = quizQuestions[currentQ].exp;
            m.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if(currentQ < 15) loadQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
                const medal = document.getElementById('medal-emoji');
                medal.innerText = score >= 140 ? "🌟" : (score >= 100 ? "🎈" : "🌱");
            }
        }

        window.onload = render;
    </script>
</body>
</html>
