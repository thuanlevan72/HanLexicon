
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK 1 - Bài 1: 你好 | Nga Học HSK</title>
    <link href="[https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap)" rel="stylesheet">
    <style>
        :root {
            --primary: #8bc34a; 
            --primary-dark: #558b2f;
            --secondary: #ffb74d; 
            --bg-color: #f1f8e9; 
            --card-bg: #ffffff;
            --text-main: #33691e;
            --text-muted: #5d4037;
            --hanzi-color: #d84315;
            --font-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; 
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#cddc39 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
        }

        /* --- BRANDING & HEADER --- */
        .branding {
            width: 100%; background: #fff; text-align: center; padding: 6px 0;
            font-size: 0.8rem; font-weight: 800; color: var(--primary-dark);
            letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }

        .header {
            width: 100%; max-width: 800px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border-radius: 0 0 20px 20px;
            box-shadow: 0 5px 15px rgba(139, 195, 74, 0.3);
        }

        .btn-back {
            background: rgba(255,255,255,0.2); color: white; text-decoration: none;
            padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.5);
        }

        .header h2 { font-size: 1.2rem; text-align: center; flex: 1; margin: 0 10px; }
        .header-spacer { width: 80px; } /* Giữ cân bằng layout */

        /* --- TABS (Fixed for Mobile) --- */
        .tabs {
            display: flex; justify-content: space-between; gap: 5px;
            margin: 20px auto; background: white; padding: 6px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 95%; max-width: 600px;
        }

        .tab-btn {
            flex: 1; /* Chia đều không gian cho 3 nút */
            border: none; background: transparent;
            padding: 10px 0; border-radius: 25px;
            font-size: 0.9rem; /* Chữ nhỏ lại một chút */
            font-weight: 700; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
            text-align: center; white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--secondary); color: white;
            box-shadow: 0 4px 10px rgba(255, 183, 77, 0.4);
        }

        /* --- CONTENT AREA --- */
        .section { display: none; width: 100%; max-width: 800px; padding: 0 15px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HÁN TỰ GRID --- */
        .hanzi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .hanzi-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border-top: 4px solid var(--primary);
        }
        .char-display { font-family: var(--font-cn); font-size: 4rem; color: var(--hanzi-color); line-height: 1.2; }
        .pinyin {
            background: #e3f2fd; color: #1565c0; padding: 4px 15px; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; display: inline-block; margin-bottom: 10px;
        }
        .meaning { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--text-muted); }
        .memo { font-size: 0.95rem; background: #fff8e1; padding: 10px; border-radius: 10px; color: #5d4037; text-align: left; border-left: 4px solid var(--secondary); }

        /* --- FLASHCARDS --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .flashcard { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; }
        .flashcard-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.5s; transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px;
        }
        .flashcard-front { background: #fff; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .flashcard-front .word-cn { font-family: var(--font-cn); font-size: 4rem; color: var(--text-main); }
        .flashcard-front .hint { position: absolute; bottom: 10px; font-size: 0.8rem; color: #aaa; }
        .flashcard-back { background: #fffde7; transform: rotateY(180deg); border: 2px solid var(--secondary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .flashcard-back .py { font-size: 1.3rem; font-weight: bold; color: #1976d2; margin-bottom: 5px; }
        .flashcard-back .mn { font-size: 1.2rem; font-weight: 800; color: #e65100; margin-bottom: 15px; }
        .example-box { background: white; padding: 10px; border-radius: 10px; width: 100%; }
        .ex-cn { font-family: var(--font-cn); font-size: 1.1rem; color: #333; margin-bottom: 2px; }
        .ex-py { font-size: 0.9rem; color: #666; margin-bottom: 2px; }
        .ex-vn { font-size: 0.9rem; color: var(--primary-dark); font-style: italic; }

        /* --- GAME LUYỆN TẬP --- */
        .game-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
        .game-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; color: var(--primary-dark); font-size: 1rem; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), #ff9800); width: 0%; transition: width 0.3s; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; color: var(--text-muted); line-height: 1.4; }
        .question-highlight { font-family: var(--font-cn); font-size: 2.5rem; color: var(--hanzi-color); display: block; margin: 10px 0; font-weight: normal; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; } /* Xếp dọc trên đt cho dễ bấm */
        .option-btn {
            background: #f8f9fa; border: 2px solid #e0e0e0; padding: 15px; border-radius: 12px;
            font-size: 1.1rem; font-weight: bold; color: #424242; cursor: pointer; transition: all 0.2s; font-family: var(--font-cn);
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: #4CAF50; color: white; border-color: #388E3C; }
        .option-btn.wrong { background: #F44336; color: white; border-color: #D32F2F; }

        /* --- MODAL GIẢI THÍCH --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 400px; padding: 25px;
            border-radius: 20px; text-align: center; animation: popIn 0.3s;
        }
        .modal-icon { font-size: 4rem; margin-bottom: 10px; line-height: 1; }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .modal-title.t-correct { color: #4CAF50; }
        .modal-title.t-wrong { color: #F44336; }
        .modal-desc { font-size: 1.05rem; color: #555; margin-bottom: 20px; line-height: 1.5; }
        .btn-next {
            background: var(--primary); color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%;
        }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- KẾT QUẢ GAME --- */
        .game-result { display: none; flex-direction: column; align-items: center; gap: 15px; }
        .score-circle {
            width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; color: var(--primary-dark); margin: 10px 0;
        }
        .btn-play-again {
            background: var(--secondary); color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 10px;
        }

    </style>
</head>
<body>

    <!-- BRANDING -->
    <div class="branding">© Bản Quyền Thuộc Về Nga Học HSK</div>

    <header class="header">
        <a href="index.html" class="btn-back">❮ Về Vườn</a>
        <h2>Bài 1: 你好</h2>
        <div class="header-spacer"></div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('hanzi')">✏️ Hán Tự</button>
        <button class="tab-btn" onclick="switchTab('vocab')">🃏 Từ Vựng</button>
        <button class="tab-btn" onclick="switchTab('game')">🎮 Luyện Tập</button>
    </div>

    <!-- PHẦN 1: HÁN TỰ -->
    <section id="hanzi" class="section active">
        <div class="hanzi-grid" id="hanzi-container"></div>
    </section>

    <!-- PHẦN 2: TỪ VỰNG -->
    <section id="vocab" class="section">
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem;">
            * Chạm vào thẻ để lật xem mặt sau
        </p>
        <div class="vocab-grid" id="vocab-container"></div>

    <!-- PHẦN 3: LUYỆN TẬP -->
    <section id="game" class="section">
        <div class="game-container" id="quiz-area">
            <div class="game-header">
                <span id="score-display">Điểm: 0</span>

            </div>

        </div>
    </section>

    <!-- MODAL GIẢI THÍCH -->
    <div id="explanation-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-icon" class="modal-icon">✅</div>
            <h3 id="modal-title" class="modal-title">Đúng rồi!</h3>
            <p id="modal-desc" class="modal-desc">Giải thích chi tiết.</p>
            <button class="btn-next" onclick="nextQuestion()">Tiếp tục ❯</button>
        </div>
    </div>

    <script>
        // === HỆ THỐNG ÂM THANH (Web Audio API) ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } 
            else if (type === 'correct') {
                osc.type = 'sine';
                // Tiếng Ting Ting (Mô phỏng chuông)
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
            else if (type === 'wrong') {
                osc.type = 'sawtooth';
                // Tiếng Tè (Thấp, rung)
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
            else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(554.37, now + 0.15); // C#5
                osc.frequency.setValueAtTime(659.25, now + 0.3); // E5
                osc.frequency.setValueAtTime(880, now + 0.45); // A5
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }

        // Bắt sự kiện click để bật audio context (Bảo mật của trình duyệt yêu cầu)
        document.body.addEventListener('click', initAudio, { once: true });

        // === DỮ LIỆU ===
        const hanziData = [
            { char: '你', pinyin: 'nǐ', meaning: 'bạn, anh, chị', memo: 'Bộ nhân (亻) + chữ Nhĩ (尔) → Chỉ người đối diện.' },
            { char: '好', pinyin: 'hǎo', meaning: 'tốt, khỏe, đẹp', memo: 'Phụ nữ (女) đứng cạnh đứa con (子) → Điều tốt đẹp.' },
            { char: '您', pinyin: 'nín', meaning: 'ngài, ông, bà', memo: 'Chữ Bạn (你) đặt trên trái tim (心) → Kính trọng.' },
            { char: '们', pinyin: 'men', meaning: 'hậu tố số nhiều', memo: 'Bộ người (亻) + cánh cửa (门) → Một nhóm người.' },
            { char: '对', pinyin: 'duì', meaning: 'đúng; đối với', memo: 'Bàn tay (又) và tấc (寸) → Hành động đo lường → đúng.' },
            { char: '不', pinyin: 'bù', meaning: 'không', memo: 'Nét đặc trưng biểu thị sự phủ định.' },
            { char: '起', pinyin: 'qǐ', meaning: 'bắt đầu', memo: 'Bản thân (己) bắt đầu đi (走) → khởi đầu, đứng dậy.' },
            { char: '没', pinyin: 'méi', meaning: 'không có; chưa', memo: 'Nước (氵) bị làm mất đi (殳) → Không còn.' },
            { char: '关', pinyin: 'guān', meaning: 'đóng, cửa ải', memo: 'Người dang tay dưới trời bị chặn lại → đóng.' },
            { char: '系', pinyin: 'xì', meaning: 'hệ thống', memo: 'Sợi tơ (糸) tạo thành mối liên kết, buộc chặt.' }
        ];

        const vocabData = [
            { word: '你', pinyin: 'nǐ', meaning: 'Bạn', ex_cn: '你是谁？', ex_py: 'Nǐ shì shéi?', ex_vn: 'Bạn là ai?' },
            { word: '你好', pinyin: 'nǐ hǎo', meaning: 'Xin chào', ex_cn: '你好，很高兴认识你。', ex_py: 'Nǐ hǎo, hěn gāo xìng...', ex_vn: 'Chào bạn, rất vui được làm quen.' },
            { word: '您好', pinyin: 'nín hǎo', meaning: 'Xin chào (Lịch sự)', ex_cn: '老师，您好！', ex_py: 'Lǎo shī, nín hǎo!', ex_vn: 'Em chào thầy/cô!' },
            { word: '你们', pinyin: 'nǐ men', meaning: 'Các bạn', ex_cn: '你们好', ex_py: 'Nǐ men hǎo?', ex_vn: 'Chào các bạn' },
            { word: '对不起', pinyin: 'duì bu qǐ', meaning: 'Xin lỗi', ex_cn: '妈妈，对不起。', ex_py: 'māma，Duì bu qǐ.', ex_vn: 'Con xin lỗi mẹ' },
            { word: '没关系', pinyin: 'méi guān xi', meaning: 'Không sao', ex_cn: '没关系，下次注意。', ex_py: 'Méi guān xi, xià cì zhù yì.', ex_vn: 'Không sao, lần sau chú ý.' }
        ];

        const quizQuestions = [
            { q: 'Nghĩa của câu <span class="question-highlight">对不起</span> là gì?', options: ['Cảm ơn', 'Tạm biệt', 'Xin lỗi', 'Không sao'], answer: 2, exp: '对不起 (duì bu qǐ) là câu xin lỗi thông dụng nhất trong tiếng Trung.' },
            { q: 'Khi đi họp muộn, bước vào phòng bạn nên nói:', options: ['没关系', '你好', '再见', '对不起'], answer: 3, exp: 'Khi làm sai hoặc đến muộn, cần dùng 对不起[ duìbuqǐ ]  (xin lỗi).' },
            { q: 'Pinyin của chữ <span class="question-highlight">好</span> là gì?', options: ['hǎo', 'hāo', 'nǐ', 'hào'], answer: 0, exp: 'Chữ 好 (tốt) đọc là hǎo, mang thanh 3.' },
            { q: 'Từ mang nghĩa "Bạn" (ngôi thứ 2 số ít)?', options: ['我 ', '你 ', '他 ', '您 '], answer: 1, exp: '你 (nǐ) dùng để gọi người đang giao tiếp với mình ngang hàng.' },
            { q: 'Điền vào chỗ trống:<br><span class="question-highlight">没 _ 系</span>', options: ['对 (duì)', '起 (qǐ)', '关 (guān)', '你 (nǐ)'], answer: 2, exp: 'Cụm từ đúng là 没关系 (méi guān xi) nghĩa là Không có gì / Không sao.' },
            { q: 'Câu <span class="question-highlight">没关系</span> thường được dùng khi nào?', options: ['Chào hỏi', 'Đáp lại lời xin lỗi', 'Tạm biệt', 'Xin lỗi người khác'], answer: 1, exp: 'Khi người khác nói 对不起 (Xin lỗi), bạn đáp lại 没关系 (Không sao) để tha thứ.' },
            { q: 'Gặp đối tác lớn tuổi, bạn chào thế nào để lịch sự?', options: ['你好', '对不起', '你们好', '您好'], answer: 3, exp: 'Chữ 您 (nín) có bộ Tâm (心) ở dưới, dùng để xưng hô trang trọng.' },
            { q: 'Pinyin của <span class="question-highlight">你们</span> (Các bạn):', options: ['nǐ men', 'wǒ men', 'tā men', 'nín men'], answer: 0, exp: '你们 (nǐ men) là dạng số nhiều của 你 (nǐ).' },
            { q: 'Chữ <span class="question-highlight">不</span> (bù) nghĩa là gì?', options: ['Có', 'Đúng', 'Không', 'Tốt'], answer: 2, exp: '不 (bù) là phó từ dùng để phủ định (Không).' },
            { q: 'Chữ <span class="question-highlight">好</span> gồm 2 bộ thủ nào?', options: ['Nhân & Khẩu', 'Nữ & Tử', 'Mộc & Thủy', 'Tâm & Môn'], answer: 1, exp: 'Bên trái là bộ Nữ (女 - phụ nữ), bên phải là bộ Tử (子 - con cái).' },
            { q: '"Xin chào các bạn" nói bằng tiếng Trung là:', options: ['你们好', '你好', '您好', '对不起'], answer: 0, exp: 'Các bạn (你们) + Khỏe/Tốt (好) = 你们好 (Chào các bạn).' },
            { q: 'Người lạ vô tình đạp trúng bạn và nói "对不起", bạn đáp:', options: ['你好', '不', '没关系', '您'], answer: 2, exp: 'Luôn dùng 没关系 (Không sao) để đáp lại 对不起.' },
            { q: 'Chọn chữ có pinyin là <span class="question-highlight">xì</span>:', options: ['起', '关', '没', '系'], answer: 3, exp: 'Chữ 系 (Hệ thống, quan hệ) đọc là xì.' },
            { q: 'Chữ <span class="question-highlight">您</span> chứa bộ thủ nào ở dưới cùng?', options: ['Bộ Tâm (心)', 'Bộ Nữ (女)', 'Bộ Thủy (氵)', 'Bộ Nhân (亻)'], answer: 0, exp: 'Bộ Tâm (心 - trái tim) thể hiện sự thành tâm, kính trọng người đối diện.' },
            { q: 'Điền vào chỗ trống:<br><span class="question-highlight">对不 _</span>', options: ['起 (qǐ)', '没 (méi)', '系 (xì)', '好 (hǎo)'], answer: 0, exp: 'Cụm từ xin lỗi hoàn chỉnh là 对不起 (duì bu qǐ).' }
        ];

        // === INIT & RENDER ===
        function renderContent() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(item => `
                <div class="hanzi-card">
                    <div class="char-display">${item.char}</div>
                    <div class="pinyin">${item.pinyin}</div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="memo">💡 <b>Mẹo nhớ:</b> ${item.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(item => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="word-cn">${item.word}</div>
                            <div class="hint">👆 Chạm để lật thẻ</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="py">${item.pinyin}</div>
                            <div class="mn">${item.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${item.ex_cn}</div>
                                <div class="ex-py">${item.ex_py}</div>
                                <div class="ex-vn">${item.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // === TAB LOGIC ===
        function switchTab(tabId) {
            playSound('click');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'game' && currentQuestionIndex === 0 && score === 0) startGame();
        }

        // === QUIZ LOGIC ===
        let currentQuestionIndex = 0, score = 0, isAnswering = false;

        function startGame() {
            currentQuestionIndex = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            isAnswering = false;
            const q = quizQuestions[currentQuestionIndex];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQuestionIndex + 1}/15`;
            document.getElementById('progress').style.width = `${(currentQuestionIndex / 15) * 100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswering) return; 
            isAnswering = true;

            const q = quizQuestions[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            const isCorrect = (selectedIndex === q.answer);

            // Xử lý nút bấm
            if (isCorrect) {
                btnElement.classList.add('correct');
                score += 10;
                playSound('correct');
            } else {
                btnElement.classList.add('wrong');
                allBtns[q.answer].classList.add('correct');
                playSound('wrong');
            }
            document.getElementById('score-display').innerText = `Điểm: ${score}`;

            // Hiện Modal giải thích
            setTimeout(() => {
                const modal = document.getElementById('explanation-modal');
                const title = document.getElementById('modal-title');
                const icon = document.getElementById('modal-icon');
                
                document.getElementById('modal-desc').innerText = q.exp;
                modal.querySelector('.modal-content').className = `modal-content ${isCorrect ? 'correct' : 'wrong'}`;
                
                if (isCorrect) {
                    icon.innerText = "✅"; title.innerText = "Tuyệt vời!";
                    title.className = "modal-title t-correct";
                } else {
                    icon.innerText = "❌"; title.innerText = "Rất tiếc!";
                    title.className = "modal-title t-wrong";
                }
                modal.style.display = 'flex';
            }, 500); // Chờ nửa giây để nhìn thấy đáp án đúng/sai trên nút
        }

        function nextQuestion() {
            playSound('click');
            document.getElementById('explanation-modal').style.display = 'none';
            currentQuestionIndex++;
            if (currentQuestionIndex < 15) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            playSound('win');
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('progress').style.width = '100%';
            document.getElementById('final-score').innerText = score;
            const title = document.getElementById('result-title');
            
            if (score === 150) {
                title.innerText = "Hoàn hảo! 150/150"; title.style.color = "#2e7d32";
            } else if (score >= 100) {
                title.innerText = "Rất Tốt!"; title.style.color = "#f57c00";
            } else {
                title.innerText = "Cố lên nhé!"; title.style.color = "#d84315";
            }
        }

        window.onload = renderContent;
    </script>
</body>
</html>
