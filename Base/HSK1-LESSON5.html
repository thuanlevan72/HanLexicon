    <script>
        // === HỆ THỐNG ÂM THANH ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.15); 
                osc.frequency.setValueAtTime(659.25, now + 0.3); osc.frequency.setValueAtTime(880, now + 0.45); 
                gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }
        document.body.addEventListener('click', initAudio, { once: true });

        // === DỮ LIỆU BÀI 5 ===
        const hanziData = [
            { char: '家', pinyin: 'jiā', meaning: 'nhà, gia đình', type: 'Hội ý', radical: '宀 (Miên - mái nhà), 豕 (Thỉ - con lợn)', memo: 'Ngày xưa, dưới mái nhà (宀) có nuôi lợn (豕) thì mới gọi là một gia đình.' },
            { char: '有', pinyin: 'yǒu', meaning: 'có', type: 'Hội ý', radical: '又 (Hựu - cái tay), 月 (Nguyệt - nhục/thịt)', memo: 'Tay (又) cầm miếng thịt (月) mang về nhà -> CÓ đồ ăn.' },
            { char: '口', pinyin: 'kǒu', meaning: 'cái miệng, lượng từ nhân khẩu', type: 'Tượng hình', radical: '口 (Khẩu)', memo: 'Hình dáng mô phỏng cái miệng đang mở.' },
            { char: '女', pinyin: 'nǚ', meaning: 'nữ, phụ nữ', type: 'Tượng hình', radical: '女 (Nữ)', memo: 'Hình ảnh người phụ nữ đang ngồi quỳ chéo chân thời xưa.' },
            { char: '儿', pinyin: 'ér', meaning: 'nhi, trẻ con', type: 'Tượng hình', radical: '儿 (Nhân đi)', memo: 'Hình ảnh đôi chân của đứa trẻ đang chạy nhảy.' },
            { char: '几', pinyin: 'jǐ', meaning: 'mấy, vài', type: 'Tượng hình', radical: '几 (Kỷ - cái bàn nhỏ)', memo: 'Hình dáng giống cái bàn nhỏ. Dùng làm đại từ hỏi số lượng (dưới 10).' },
            { char: '岁', pinyin: 'suì', meaning: 'tuổi', type: 'Hội ý', radical: '山 (Sơn - núi), 夕 (Tịch - chiều tối)', memo: 'Tuổi tác chồng chất cao lên như ngọn núi (山).' },
            { char: '今', pinyin: 'jīn', meaning: 'nay, hiện nay', type: 'Hội ý', radical: '人 (Nhân - người)', memo: 'Người (人) vươn tay ra chộp lấy ngày HÔM NAY (一).' },
            { char: '年', pinyin: 'nián', meaning: 'năm', type: 'Hội ý', radical: '干 (Can - làm)', memo: 'Hình ảnh người nông dân đội lúa trên đầu -> Một NĂM thu hoạch.' },
            { char: '多', pinyin: 'duō', meaning: 'nhiều, bao nhiêu', type: 'Hội ý', radical: '夕 (Tịch - chiều tối)', memo: 'Hai chữ Tịch (夕) chồng lên nhau -> Hết đêm này qua đêm khác -> Rất NHIỀU.' },
            { char: '大', pinyin: 'dà', meaning: 'to lớn', type: 'Tượng hình', radical: '大 (Đại)', memo: 'Hình ảnh một người (人) đang dang rộng hai tay hai chân -> Rất TO.' },
            { char: '了', pinyin: 'le', meaning: 'rồi (trợ từ)', type: 'Tượng hình', radical: '亅 (Quyết - nét móc)', memo: 'Hình ảnh đứa trẻ sơ sinh bị quấn chặt tã, tượng trưng cho một sự việc ĐÃ XONG RỒI.' }
        ];

        const vocabData = [
            { word: '家', pinyin: 'jiā', meaning: 'Nhà, gia đình', ex_cn: '我家有三口人。', ex_py: 'Wǒ jiā yǒu sān kǒu rén.', ex_vn: 'Nhà tôi có 3 người.' },
            { word: '有', pinyin: 'yǒu', meaning: 'Có', ex_cn: '他有苹果吗？', ex_py: 'Tā yǒu píngguǒ ma?', ex_vn: 'Anh ấy có táo không?' },
            { word: '口', pinyin: 'kǒu', meaning: 'Lượng từ (cho số người trong nhà)', ex_cn: '你家有几口人？', ex_py: 'Nǐ jiā yǒu jǐ kǒu rén?', ex_vn: 'Nhà bạn có mấy người?' },
            { word: '女儿', pinyin: 'nǚ\'ér', meaning: 'Con gái', ex_cn: '她是我女儿。', ex_py: 'Tā shì wǒ nǚ\'ér.', ex_vn: 'Đó là con gái tôi.' },
            { word: '几岁', pinyin: 'jǐ suì', meaning: 'Mấy tuổi (Hỏi trẻ em)', ex_cn: '你女儿几岁了？', ex_py: 'Nǐ nǚ\'ér jǐ suì le?', ex_vn: 'Con gái bạn mấy tuổi rồi?' },
            { word: '今年', pinyin: 'jīnnián', meaning: 'Năm nay', ex_cn: '今年我二十岁。', ex_py: 'Jīnnián wǒ èrshí suì.', ex_vn: 'Năm nay tôi 20 tuổi.' },
            { word: '多大', pinyin: 'duō dà', meaning: 'Bao nhiêu tuổi (Hỏi người lớn)', ex_cn: '老师今年多大？', ex_py: 'Lǎoshī jīnnián duō dà?', ex_vn: 'Thầy giáo năm nay bao nhiêu tuổi?' },
            { word: '爸爸 / 妈妈', pinyin: 'bàba / māma', meaning: 'Bố / Mẹ', ex_cn: '我爸爸是老师。', ex_py: 'Wǒ bàba shì lǎoshī.', ex_vn: 'Bố tôi là giáo viên.' },
            { word: '哥哥 / 弟弟', pinyin: 'gēge / dìdi', meaning: 'Anh trai / Em trai', ex_cn: '他是我哥哥。', ex_py: 'Tā shì wǒ gēge.', ex_vn: 'Anh ấy là anh trai tôi.' },
            { word: '姐姐 / 妹妹', pinyin: 'jiějie / mèimei', meaning: 'Chị gái / Em gái', ex_cn: '我有妹妹。', ex_py: 'Wǒ yǒu mèimei.', ex_vn: 'Tôi có em gái.' }
        ];

        const quizQuestions = [
            { q: 'Để hỏi tuổi một ĐỨA TRẺ (dưới 10 tuổi), ta dùng mẫu câu nào?', options: ['你多大了？', '你几岁了？', '你今年多大？', '你是谁？'], answer: 1, exp: '几岁 (jǐ suì) dùng để hỏi tuổi trẻ em (dưới 10). 多大 (duō dà) dùng để hỏi tuổi người lớn.' },
            { q: 'Lượng từ nào chuyên dùng để đếm số lượng thành viên trong gia đình?', options: ['个 (gè)', '岁 (suì)', '口 (kǒu)', '家 (jiā)'], answer: 2, exp: '口 (kǒu - cái miệng) được dùng làm lượng từ đếm người trong gia đình. VD: 三口人 (3 miệng ăn/3 người).' },
            { q: 'Dịch câu sau sang tiếng Việt: <br><span class="question-highlight">她女儿今年二十岁。</span>', options: ['Cô ấy năm nay 20 tuổi.', 'Con gái cô ấy năm nay 20 tuổi.', 'Con trai cô ấy năm nay 20 tuổi.', 'Nhà cô ấy có 20 người.'], answer: 1, exp: '她 (Cô ấy) + 女儿 (Con gái) + 今年 (Năm nay) + 二十 (20) + 岁 (Tuổi).' },
            { q: 'Pinyin của từ "Năm nay" <span class="question-highlight">今年</span> là gì?', options: ['jīn qián', 'míng nián', 'jīn nián', 'jīng nián'], answer: 2, exp: '今年 phiên âm chuẩn là jīnnián.' },
            { q: 'Kiến thức chữ Hán: Chữ <span class="question-highlight">家</span> (Nhà) gồm bộ Miên (mái nhà) và bộ thủ gì bên dưới?', options: ['Bộ Nữ (女 - Phụ nữ)', 'Bộ Thỉ (豕 - Con lợn)', 'Bộ Khẩu (口 - Miệng)'], answer: 1, exp: 'Người Trung Quốc xưa quan niệm: Dưới mái nhà (宀) có nuôi gia súc/lợn (豕) thì mới tạo thành một Gia đình.' },
            { q: 'Từ nào dùng để hỏi tuổi NGƯỜI LỚN?', options: ['什么 (shénme)', '几岁 (jǐ suì)', '多大 (duō dà)', '哪国 (nǎ guó)'], answer: 2, exp: '多大 (Bao lớn/Bao nhiêu tuổi) dùng để hỏi tuổi người trưởng thành một cách lịch sự.' },
            { q: 'Từ "Ông nội" trong tiếng Trung là gì?', options: ['奶奶 (nǎinai)', '哥哥 (gēge)', '爷爷 (yéye)', '弟弟 (dìdi)'], answer: 2, exp: '爷爷 (yéye) là ông nội. 奶奶 (nǎinai) là bà nội.' },
            { q: 'Chữ <span class="question-highlight">多</span> (Nhiều) được ghép bởi 2 bộ thủ nào chồng lên nhau?', options: ['Hai bộ Tịch (夕 - Chiều tối)', 'Hai bộ Khẩu (口 - Miệng)', 'Hai bộ Nhật (日 - Mặt trời)'], answer: 0, exp: 'Chữ 多 gồm 2 chữ Tịch (夕). Hết đêm này qua đêm khác -> Rất nhiều.' },
            { q: 'Phủ định của động từ <span class="question-highlight">有</span> (Có) là gì?', options: ['不有 (bù yǒu)', '没有 (méi yǒu)', '都有 (dōu yǒu)', '少有 (shǎo yǒu)'], answer: 1, exp: 'Động từ 有 (Có) ĐẶC BIỆT chỉ đi với phó từ phủ định 没 (méi) -> 没有 (Không có). Tuyệt đối không dùng 不有.' },
            { q: 'Dịch câu sau: "Nhà tôi có 4 người".', options: ['我家是四人。', '我家有四个。', '我家有四口人。', '我家四口有人。'], answer: 2, exp: 'Cấu trúc: 我家 (Nhà tôi) + 有 (Có) + 四 (4) + 口 (lượng từ) + 人 (Người).' },
            { q: 'Số 8 trong tiếng Trung đọc là gì?', options: ['bā (八)', 'liù (六)', 'qī (七)', 'jiǔ (九)'], answer: 0, exp: 'Một (一 yī), Hai (二 èr), Ba (三 sān), Bốn (四 sì), Năm (五 wǔ), Sáu (六 liù), Bảy (七 qī), Tám (八 bā), Chín (九 jiǔ), Mười (十 shí).' },
            { q: 'Pinyin của từ "Con gái" <span class="question-highlight">女儿</span> là gì?', options: ['nǔ ér', 'nǚ ér', 'nǚ rèn', 'nǚ yé'], answer: 1, exp: 'Chú ý: Chữ Nữ phiên âm là nǚ (âm u-umlaut, đọc tròn môi).' },
            { q: 'Tình huống: Bạn gặp một người bạn hỏi "你家有几口人？", bạn trả lời thế nào là chuẩn nhất?', options: ['我今年二十岁。', '我家有爸爸和妈妈。', '我家有五口人。', '我是中国人。'], answer: 2, exp: 'Câu hỏi "Nhà bạn có mấy người?" (几口人) -> Trả lời số lượng + 口人. (VD: 5 người - 五口人).' },
            { q: 'Chữ <span class="question-highlight">有</span> (Có) bao gồm bộ Hựu (Lại/Cái tay) và bộ thủ gì?', options: ['Bộ Nhật (Mặt trời)', 'Bộ Nguyệt (Mặt trăng/Miếng thịt)', 'Bộ Khẩu (Miệng)'], answer: 1, exp: 'Bộ Nguyệt (月) ở đây tượng trưng cho miếng thịt. Tay cầm miếng thịt mang về nhà -> CÓ đồ ăn.' },
            { q: 'Trợ từ <span class="question-highlight">了</span> (le) trong câu "你女儿几岁了" mang ý nghĩa gì?', options: ['Chỉ sự sở hữu', 'Câu hỏi ngược lại', 'Sự thay đổi / Đã trải qua', 'Chỉ vị trí'], answer: 2, exp: '了 (le) đứng cuối câu chỉ một sự việc đã xảy ra hoặc một tình trạng mới (Năm nay đã thêm một tuổi mới).' }
        ];

        // === INIT & RENDER ===
        function renderContent() {
            document.getElementById('hanzi-container').innerHTML = hanziData.map(item => `
                <div class="hanzi-card">
                    <div class="char-display">${item.char}</div>
                    <div class="pinyin">${item.pinyin}</div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="hanzi-details">
                        <p><b>🏷️ Cấu tạo:</b> ${item.type}</p>
                        <p><b>🧩 Bộ thủ:</b> ${item.radical}</p>
                    </div>
                    <div class="memo">💡 <b>Mẹo nhớ:</b> ${item.memo}</div>
                </div>`).join('');

            document.getElementById('vocab-container').innerHTML = vocabData.map(item => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="word-cn">${item.word}</div>
                            <div class="hint">👆 Chạm để lật thẻ</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="py">${item.pinyin}</div>
                            <div class="mn">${item.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${item.ex_cn}</div>
                                <div class="ex-py">${item.ex_py}</div>
                                <div class="ex-vn">${item.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // === TAB LOGIC ===
        function switchTab(tabId) {
            playSound('click');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'game' && currentQuestionIndex === 0 && score === 0) startGame();
        }

        // === QUIZ LOGIC ===
        let currentQuestionIndex = 0, score = 0, isAnswering = false;

        function startGame() {
            currentQuestionIndex = 0; score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            isAnswering = false;
            const q = quizQuestions[currentQuestionIndex];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQuestionIndex + 1}/15`;
            document.getElementById('progress').style.width = `${(currentQuestionIndex / 15) * 100}%`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswering) return; 
            isAnswering = true;

            const q = quizQuestions[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            const isCorrect = (selectedIndex === q.answer);

            if (isCorrect) {
                btnElement.classList.add('correct');
                score += 10;
                playSound('correct');
            } else {
                btnElement.classList.add('wrong');
                allBtns[q.answer].classList.add('correct');
                playSound('wrong');
            }
            document.getElementById('score-display').innerText = `Điểm: ${score}`;

            setTimeout(() => {
                const modal = document.getElementById('explanation-modal');
                const title = document.getElementById('modal-title');
                const icon = document.getElementById('modal-icon');
                
                document.getElementById('modal-desc').innerText = q.exp;
                modal.querySelector('.modal-content').className = `modal-content ${isCorrect ? 'correct' : 'wrong'}`;
                
                if (isCorrect) {
                    icon.innerText = "✅"; title.innerText = "Tuyệt vời!";
                    title.className = "modal-title t-correct";
                } else {
                    icon.innerText = "❌"; title.innerText = "Rất tiếc!";
                    title.className = "modal-title t-wrong";
                }
                modal.style.display = 'flex';
            }, 500); 
        }

        function nextQuestion() {
            playSound('click');
            document.getElementById('explanation-modal').style.display = 'none';
            currentQuestionIndex++;
            if (currentQuestionIndex < 15) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            playSound('win');
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('progress').style.width = '100%';
            document.getElementById('final-score').innerText = score;
            const title = document.getElementById('result-title');
            
            if (score === 150) {
                title.innerText = "Hoàn hảo! 150/150"; title.style.color = "#2e7d32";
            } else if (score >= 100) {
                title.innerText = "Rất Tốt!"; title.style.color = "#f57c00";
            } else {
                title.innerText = "Cố lên nhé!"; title.style.color = "#d84315";
            }
        }

        window.onload = renderContent;
    </script>
</body>
