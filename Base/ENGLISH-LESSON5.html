<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Lesson 5 - Present Simple Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-pink: #ffb7c5;
            --ghibli-wood: #8b5a2b;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)), url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px; width: 95%;
            text-align: center; border: 3px solid var(--ghibli-green);
            backdrop-filter: blur(10px); margin-top: 20px;
            position: relative;
        }

        h1 { color: var(--ghibli-dark-green); font-size: 1.5rem; margin-bottom: 20px; }

        .speed-control {
            margin-bottom: 15px;
            background: rgba(157, 193, 131, 0.15);
            padding: 12px 20px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(157, 193, 131, 0.3);
        }
        .speed-control label { font-size: 0.9rem; color: var(--ghibli-dark-green); font-weight: 600; margin-right: 10px; }
        #speedRange { vertical-align: middle; cursor: pointer; accent-color: var(--ghibli-dark-green); width: 150px; }
        #speedValue { display: inline-block; min-width: 40px; font-size: 0.9rem; font-weight: bold; color: var(--ghibli-wood); margin-left: 10px; }

        .audio-btn {
            background: var(--ghibli-green);
            border: none; width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer;
            font-size: 28px; color: white;
            margin-bottom: 15px; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(157, 193, 131, 0.4);
            display: block; margin-left: auto; margin-right: auto;
        }

        .audio-btn:hover { transform: scale(1.1); background: var(--ghibli-dark-green); }

        .input-area { width: 100%; margin: 15px 0; }

        input[type="text"] {
            width: 90%; padding: 15px;
            border: 2px solid #ddd; border-radius: 15px;
            font-size: 1.1rem; font-family: inherit;
            text-align: center; outline: none; transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--ghibli-green); box-shadow: 0 0 10px rgba(157, 193, 131, 0.2); }

        .feedback-container { min-height: 120px; margin: 10px 0; }
        .main-feedback { font-weight: 600; font-size: 1.1rem; margin-bottom: 8px; }
        .correct { color: #2ecc71; }
        .incorrect { color: #e74c3c; }

        .detail-info { 
            background: rgba(157, 193, 131, 0.15); 
            padding: 12px; border-radius: 15px;
            display: none; animation: fadeIn 0.5s;
            text-align: center;
        }
        .ipa { color: var(--ghibli-wood); font-style: italic; font-size: 1rem; margin: 4px 0; }
        .translation { color: var(--ghibli-dark-green); font-weight: 600; font-size: 1rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .progress { font-size: 0.8rem; color: #666; margin-bottom: 10px; }

        .btn-nav {
            background: white; border: 2px solid var(--ghibli-green);
            color: var(--ghibli-dark-green); padding: 8px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            margin: 5px; transition: 0.3s;
        }

        .btn-nav:hover { background: var(--ghibli-green); color: white; }

        .back-home { margin-top: 20px; text-decoration: none; color: var(--ghibli-dark-green); font-size: 0.9rem; font-weight: bold; display: block; }
        
        #congrats-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); border-radius: 22px;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="congrats-overlay">
        <h2>🎉 Tuyệt vời! 🎉</h2>
        <p>Bạn đã hoàn thành xong Bài 5!</p>
        <button class="btn-nav" onclick="window.location.href='index.html'" style="margin-top: 20px;">Quay về Khu Vườn 🌿</button>
    </div>

    <div class="progress" id="progress">Câu 1 / 32</div>
    <h1>English: Lesson 5 🎧</h1>

    <div class="speed-control">
        <label>Tốc độ: </label>
        <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="0.8">
        <span id="speedValue">0.8x</span>
    </div>
    
    <button class="audio-btn" onclick="playAudio()">🔊</button>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Nghe và gõ lại câu..." autocomplete="off">
    </div>

    <div class="feedback-container">
        <div id="mainFeedback" class="main-feedback"></div>
        <div id="detailInfo" class="detail-info">
            <div id="displayScript" style="font-weight: bold;"></div>
            <div id="displayIpa" class="ipa"></div>
            <div id="displayTrans" class="translation"></div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn-nav" onclick="checkAnswer()">Kiểm tra</button>
        <button class="btn-nav" onclick="showHint()">Gợi ý</button>
        <button class="btn-nav" onclick="nextQuestion()" id="nextBtn" style="display:none;">Tiếp theo ➔</button>
    </div>

    <a href="index.html" class="back-home">🌿 Quay về trang chủ</a>
</div>

<script>
    const data = [
        { s: "He plays football every day.", p: "/hiː pleɪz ˈfʊtbɔːl ˈevri deɪ/", t: "Anh ấy chơi bóng đá mỗi ngày" },
        { s: "She watches TV in the evening.", p: "/ʃiː ˈwɒtʃɪz ˌtiːˈviː ɪn ði ˈiːvnɪŋ/", t: "Cô ấy xem TV buổi tối" },
        { s: "I read books at night.", p: "/aɪ riːd bʊks æt naɪt/", t: "Tôi đọc sách vào buổi tối" },
        { s: "He writes emails at work.", p: "/hiː raɪts ˈiːmeɪlz æt wɜːk/", t: "Anh ấy viết email ở nơi làm việc" },
        { s: "They listen to music.", p: "/ðeɪ ˈlɪsn tuː ˈmjuːzɪk/", t: "Họ nghe nhạc" },
        { s: "She speaks English well.", p: "/ʃiː spiːks ˈɪŋɡlɪʃ wel/", t: "Cô ấy nói tiếng Anh tốt" },
        { s: "He rides a bike to school.", p: "/hiː raɪdz ə baɪk tuː skuːl/", t: "Anh ấy đi xe đạp đến trường" },
        { s: "They live in Hanoi.", p: "/ðeɪ lɪv ɪn ˌhæˈnɔɪ/", t: "Họ sống ở Hà Nội" },
        { s: "She likes coffee.", p: "/ʃiː laɪks ˈkɒfi/", t: "Cô ấy thích cà phê" },
        { s: "He enjoys music.", p: "/hiː ɪnˈdʒɔɪz ˈmjuːzɪk/", t: "Anh ấy thích âm nhạc" },
        { s: "She sings every day.", p: "/ʃiː sɪŋz ˈevri deɪ/", t: "Cô ấy hát mỗi ngày" },
        { s: "They dance together.", p: "/ðeɪ dɑːns təˈɡeðə/", t: "Họ nhảy cùng nhau" },
        { s: "I walk to school.", p: "/aɪ wɔːk tuː skuːl/", t: "Tôi đi bộ đến trường" },
        { s: "We learn English.", p: "/wiː lɜːn ˈɪŋɡlɪʃ/", t: "Chúng tôi học tiếng Anh" },
        { s: "I visit my grandparents.", p: "/aɪ ˈvɪzɪt maɪ ˈɡrænpeərənts/", t: "Tôi thăm ông bà" },
        { s: "She washes dishes.", p: "/ʃiː ˈwɒʃɪz ˈdɪʃɪz/", t: "Cô ấy rửa bát" },
        { s: "He studies at university.", p: "/hiː ˈstʌdiz æt ˌjuːnɪˈvɜːsəti/", t: "Anh ấy học ở đại học" },
        { s: "She has a bike.", p: "/ʃiː hæz ə baɪk/", t: "Cô ấy có một chiếc xe đạp" },
        { s: "He does homework.", p: "/hiː dʌz ˈhəʊmwɜːk/", t: "Anh ấy làm bài tập" },
        { s: "We eat breakfast.", p: "/wiː iːt ˈbrekfəst/", t: "Chúng tôi ăn sáng" },
        { s: "He goes to school.", p: "/hiː ɡəʊz tuː skuːl/", t: "Anh ấy đi học" },
        { s: "They travel a lot.", p: "/ðeɪ ˈtrævl ə lɒt/", t: "Họ đi du lịch nhiều" },
        { s: "She helps her mother.", p: "/ʃiː helps hə ˈmʌðə/", t: "Cô ấy giúp mẹ" },
        { s: "I drink coffee.", p: "/aɪ drɪŋk ˈkɒfi/", t: "Tôi uống cà phê" },
        { s: "He plays football.", p: "/hiː pleɪz ˈfʊtbɔːl/", t: "Anh ấy chơi bóng đá" },
        { s: "She plays the guitar.", p: "/ʃiː pleɪz ðə ɡɪˈtɑː/", t: "Cô ấy chơi đàn guitar" },
        { s: "He rides a bike.", p: "/hiː raɪdz ə baɪk/", t: "Anh ấy đi xe đạp" },
        { s: "They go by bus.", p: "/ðeɪ ɡəʊ baɪ bʌs/", t: "Họ đi bằng xe buýt" },
        { s: "She drinks coffee.", p: "/ʃiː drɪŋks ˈkɒfi/", t: "Cô ấy uống cà phê" }
    ];

    let currentIndex = 0;

    document.getElementById('speedRange').addEventListener('input', function() {
        document.getElementById('speedValue').innerText = this.value + 'x';
    });

    function playAudio() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance();
        msg.text = data[currentIndex].s;
        msg.lang = 'en-US';
        msg.rate = parseFloat(document.getElementById('speedRange').value);
        window.speechSynthesis.speak(msg);
    }

    function updateUI() {
        document.getElementById('progress').innerText = `Câu ${currentIndex + 1} / ${data.length}`;
        document.getElementById('userInput').value = "";
        document.getElementById('mainFeedback').innerText = "";
        document.getElementById('detailInfo').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('userInput').focus();
        setTimeout(playAudio, 400);
    }

    function checkAnswer() {
        const userCleaned = document.getElementById('userInput').value.trim().toLowerCase().replace(/[.,!?;'-]/g, "");
        const correctCleaned = data[currentIndex].s.toLowerCase().replace(/[.,!?;'-]/g, "");
        
        if (userCleaned === correctCleaned) {
            document.getElementById('mainFeedback').innerText = "Chính xác! ✨";
            document.getElementById('mainFeedback').className = "main-feedback correct";
            
            document.getElementById('displayScript').innerText = data[currentIndex].s;
            document.getElementById('displayIpa').innerText = data[currentIndex].p;
            document.getElementById('displayTrans').innerText = "→ " + data[currentIndex].t;
            document.getElementById('detailInfo').style.display = "block";
            
            document.getElementById('nextBtn').style.display = "inline-block";
        } else {
            document.getElementById('mainFeedback').innerText = "Hãy nghe lại nhé!";
            document.getElementById('mainFeedback').className = "main-feedback incorrect";
            playAudio();
        }
    }

    function showHint() {
        document.getElementById('mainFeedback').innerText = "Gợi ý: " + data[currentIndex].s;
        document.getElementById('mainFeedback').className = "main-feedback";
    }

    function nextQuestion() {
        if (currentIndex < data.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            document.getElementById('congrats-overlay').style.display = 'flex';
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('nextBtn').style.display === "inline-block") {
                nextQuestion();
            } else {
                checkAnswer();
            }
        }
    });

    window.onload = updateUI;
</script>

</body>
</html>
