    <script>
        // --- ÂM THANH MÔ PHỎNG ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU BÀI 10 ---
        const hanziData = [
            { char: '桌', pinyin: 'zhuō', meaning: 'cái bàn', radical: '木 (Mộc)', memo: 'Cái bàn làm bằng GỖ (木). Phía trên có chữ 卓 (cao) để chỉ âm đọc.' },
            { char: '脑', pinyin: 'nǎo', meaning: 'não, đầu óc', radical: '月 (Nhục)', memo: 'Liên quan đến cơ thể nên có bộ Nguyệt (月). 电脑 (điện não) là bộ não điện tử -> máy tính.' },
            { char: '里', pinyin: 'lǐ', meaning: 'trong, bên trong', radical: '里 (Lý)', memo: 'Hình ảnh thửa ruộng (田) và đất (土), mô tả không gian bên TRONG làng xóm.' },
            { char: '前', pinyin: 'qián', meaning: 'trước, phía trước', radical: '刂 (Đao)', memo: 'Tượng hình con thuyền đang tiến về phía TRƯỚC.' },
            { char: '后', pinyin: 'hòu', meaning: 'sau, phía sau', radical: '口 (Khẩu)', memo: 'Đứng phía SAU để ra lệnh bằng miệng (口).' },
            { char: '能', pinyin: 'néng', meaning: 'có thể', radical: '⺼ (Nhục)', memo: 'Hình ảnh con gấu mạnh mẽ, tượng trưng cho KHẢ NĂNG làm được việc.' },
            { char: '坐', pinyin: 'zuò', meaning: 'ngồi', radical: '土 (Thổ)', memo: 'Hai người (人) đang NGỒI đối diện nhau trên mặt đất (土).' }
        ];

        const vocabData = [
            { word: '桌子', pinyin: 'zhuōzi', meaning: 'Cái bàn', ex_cn: '桌子上有电脑。', ex_py: 'Zhuōzi shang yǒu diànnǎo.', ex_vn: 'Trên bàn có máy tính.' },
            { word: '电脑', pinyin: 'diànnǎo', meaning: 'Máy tính', ex_cn: '那是我的电脑。', ex_py: 'Nà shì wǒ de diànnǎo.', ex_vn: 'Đó là máy tính của tôi.' },

            { word: '本', pinyin: 'běn', meaning: 'Quyển (lượng từ)', ex_cn: '我买了一本书。', ex_py: 'Wǒ mǎi le yì běn shū.', ex_vn: 'Tôi đã mua một quyển sách.' },
            { word: '里', pinyin: 'lǐ', meaning: 'Trong, bên trong', ex_cn: '杯子里有水。', ex_py: 'Bēizi li yǒu shuǐ.', ex_vn: 'Trong ly có nước.' },
            { word: '前面', pinyin: 'qiánmiàn', meaning: 'Phía trước', ex_cn: '前面那个人是谁？', ex_py: 'Qiánmiàn nà ge rén shì shéi?', ex_vn: 'Người phía trước kia là ai?' },

        const quizQuestions = [
            { q: 'Để hỏi xin phép lịch sự "Tôi có thể ngồi đây không?", bạn nói thế nào?', options: ['我坐哪儿吗？', '我能坐这儿吗？', '这是我的坐吗？', '我坐不坐？'], answer: 1, exp: 'Cấu trúc: 我 (Tôi) + 能 (Có thể) + 坐 (Ngồi) + 这儿 (Ở đây) + 吗 (Không)?' },
            { q: 'Dịch câu: "Trên bàn có một cái máy tính."', options: ['桌子上有电脑。', '电脑在桌子。', '桌子下有电脑。', '电脑里有桌子。'], answer: 0, exp: 'Cấu trúc tồn tại: Địa điểm (桌子上) + 有 (có) + Vật (电脑).' },

            { q: 'Nếu muốn mời ai đó ngồi, bạn nên thêm từ nào để lịch sự hơn?', options: ['请 (qǐng)', '能 (néng)', '和 (hé)', '在 (zài)'], answer: 0, exp: '请坐 (qǐng zuò) nghĩa là "Mời ngồi".' },
            { q: 'Sắp xếp câu: 电脑 / 桌子 / 上 / 有 / 。', options: ['桌子上有电脑。', '电脑有桌子上。', '上桌子有电脑。', '有电脑桌子上。'], answer: 0, exp: 'Trật tự đúng: Địa điểm + 有 + Vật.' },
            { q: 'Hỏi tên người: "Người ở phía sau là ai?"', options: ['后面那个人是谁？', '是谁前面那个人？', '那个人是后面？', '谁是那个人后面？'], answer: 0, exp: '後面 (phía sau) + 那個人 (người kia) + 是誰 (là ai).' },
            { q: 'Bạn có thể thay "这儿" (đây) bằng từ nào mang nghĩa tương đương (phổ biến ở miền Nam Trung Quốc)?', options: ['那儿 (nàr)', '这里 (zhèlǐ)', '哪里 (nǎlǐ)', '什么 (shénme)'], answer: 1, exp: '这儿 (zhèr) và 这里 (zhèlǐ) đều có nghĩa là "ở đây, chỗ này".' }
        ];

        // --- RENDER FUNCTIONS ---
        function render() {
            // Render Hanzi
            const hanziContainer = document.getElementById('hanzi-container');
            hanziContainer.innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details">
                        <p><b>🧩 Bộ thủ:</b> ${h.radical}</p>
                    </div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>
            `).join('');

            // Render Vocab Flashcards
            const vocabContainer = document.getElementById('vocab-container');
            vocabContainer.innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="word-cn">${v.word}</div>
                            <div class="hint">👆 Chạm để lật</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div>
                            <div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div>
                                <div class="ex-py">${v.ex_py}</div>
                                <div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0;
        let score = 0;
        let answering = false;

        function switchTab(tabId) {
            playSound('click');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (tabId === 'game') startGame();
        }

        function startGame() {
            currentQ = 0;
            score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ + 1}/15`;
            document.getElementById('progress').style.width = `${((currentQ) / 15) * 100}%`;
            
            document.getElementById('question-text').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            if (answering) return;
            answering = true;
            
            const q = quizQuestions[currentQ];
            const btns = document.querySelectorAll('.option-btn');
            
            if (choice === q.answer) {
                btns[choice].classList.add('correct');
                score += 10;
                playSound('correct');
                showModal(true);
            } else {
                btns[choice].classList.add('wrong');
                btns[q.answer].classList.add('correct');
                playSound('wrong');
                showModal(false);
            }
        }

        function showModal(isCorrect) {
            const modal = document.getElementById('explanation-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            
            icon.innerText = isCorrect ? "✅" : "❌";
            title.innerText = isCorrect ? "Đúng rồi!" : "Tiếc quá!";
            title.className = `modal-title ${isCorrect ? 't-correct' : 't-wrong'}`;
            desc.innerText = quizQuestions[currentQ].exp;
            
            modal.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if (currentQ < 15) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
            
            const medal = document.getElementById('medal-emoji');
            const title = document.getElementById('result-title');
            if (score >= 140) { medal.innerText = "🏆"; title.innerText = "Tuyệt đỉnh!"; }
            else if (score >= 100) { medal.innerText = "🥈"; title.innerText = "Rất tốt!"; }
            else { medal.innerText = "🥉"; title.innerText = "Cố gắng lên!"; }
        }

        // Khởi tạo ứng dụng
        window.onload = render;
    </script>
</body>
</html>
