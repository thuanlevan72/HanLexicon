    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') { osc.frequency.setValueAtTime(600, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(659, now + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        // --- DỮ LIỆU BÀI 13 ---
        const hanziData = [
            { char: '喂', pinyin: 'wèi', meaning: 'a lô, này', radical: '口 (Khẩu)', memo: 'Khi gọi điện thoại nói A LÔ (喂) phải dùng Miệng (口).' },
            { char: '也', pinyin: 'yě', meaning: 'cũng', radical: '乚 (Ất)', memo: 'Chữ tượng hình, ban đầu vẽ hình cái phễu (CŨNG là một vật dụng).' },
            { char: '习', pinyin: 'xí', meaning: 'tập, ôn tập', radical: '乙 (Ất)', memo: 'Tượng hình con chim non đang TẬP vỗ cánh (羽 - vũ) bay lên.' },
            { char: '觉', pinyin: 'jiào / jué', meaning: 'ngủ / cảm giác', radical: '见 (Kiến)', memo: 'Ban đêm NGỦ say, lúc tỉnh dậy mới thấy (见) mặt trời.' },
            { char: '视', pinyin: 'shì', meaning: 'nhìn, xem', radical: '见 (Kiến)', memo: 'Chữ này có bộ Kiến (见 - nhìn, thấy). 电视 là tivi (xem bằng mắt).' },
            { char: '欢', pinyin: 'huān', meaning: 'hoan hỉ, vui vẻ', radical: '欠 (Khiếm)', memo: 'Mở miệng (欠) cười nói VUI VẺ, HOAN hỉ (又 - hựu).' },
            { char: '给', pinyin: 'gěi', meaning: 'cho', radical: '纟 (Mịch)', memo: 'Giao CHO ai đó những sợi tơ (纟) dệt cẩn thận.' }
        ];

        const vocabData = [
            { word: '喂', pinyin: 'wèi', meaning: 'A lô', ex_cn: '喂，你在做什么呢？', ex_py: 'Wèi, nǐ zài zuò shénme ne?', ex_vn: 'A lô, bạn đang làm gì đấy?' },
            { word: '也', pinyin: 'yě', meaning: 'Cũng', ex_cn: '我也喜欢看电视。', ex_py: 'Wǒ yě xǐhuan kàn diànshì.', ex_vn: 'Tôi cũng thích xem tivi.' },
            { word: '学习', pinyin: 'xuéxí', meaning: 'Học tập', ex_cn: '他在学习汉语。', ex_py: 'Tā zài xuéxí Hànyǔ.', ex_vn: 'Anh ấy đang học tiếng Trung.' },
            { word: '上午', pinyin: 'shàngwǔ', meaning: 'Buổi sáng', ex_cn: '上午我在家。', ex_py: 'Shàngwǔ wǒ zài jiā.', ex_vn: 'Buổi sáng tôi ở nhà.' },
            { word: '睡觉', pinyin: 'shuì jiào', meaning: 'Ngủ', ex_cn: '昨天晚上我没睡觉。', ex_py: 'Zuótiān wǎnshang wǒ méi shuì jiào.', ex_vn: 'Tối qua tôi không ngủ.' },
            { word: '电视', pinyin: 'diànshì', meaning: 'Tivi', ex_cn: '我不喜欢看电视。', ex_py: 'Wǒ bù xǐhuan kàn diànshì.', ex_vn: 'Tôi không thích xem tivi.' },
            { word: '喜欢', pinyin: 'xǐhuan', meaning: 'Thích', ex_cn: '你喜欢喝什么？', ex_py: 'Nǐ xǐhuan hē shénme?', ex_vn: 'Bạn thích uống gì?' },
            { word: '给', pinyin: 'gěi', meaning: 'Cho (ai đó)', ex_cn: '我给她打电话。', ex_py: 'Wǒ gěi tā dǎ diànhuà.', ex_vn: 'Tôi gọi điện thoại cho cô ấy.' },
            { word: '打电话', pinyin: 'dǎ diànhuà', meaning: 'Gọi điện thoại', ex_cn: '大卫在打电话呢。', ex_py: 'Dàwèi zài dǎ diànhuà ne.', ex_vn: 'David đang gọi điện thoại.' },
            { word: '吧', pinyin: 'ba', meaning: 'Nhé, đi (trợ từ)', ex_cn: '我们去看电影吧。', ex_py: 'Wǒmen qù kàn diànyǐng ba.', ex_vn: 'Chúng ta đi xem phim đi/nhé.' },
            { word: '大卫', pinyin: 'Dàwèi', meaning: 'David (Tên)', ex_cn: '大卫是美国人。', ex_py: 'Dàwèi shì Měiguórén.', ex_vn: 'David là người Mỹ.' }
        ];

        const quizQuestions = [
            { q: 'Để biểu thị hành động ĐANG diễn ra, ta dùng cấu trúc nào?', options: ['会......了', '在......呢', '太......了', '很......吗'], answer: 1, exp: 'Cấu trúc: 在 + Động từ + 呢 (đang làm gì đó).' },
            { q: 'Dịch câu "A lô, bạn đang làm gì đấy?" sang tiếng Trung.', options: ['喂，你做什么？', '喂，你在做什么呢？', '请问，做什么你呢？', '喂，你在哪里？'], answer: 1, exp: '喂 (A lô), 你在 (bạn đang) 做什么 (làm gì) 呢 (trợ từ).' },
            { q: 'Khi đọc số điện thoại 138..., số 1 sẽ được đọc là gì?', options: ['yī', 'yāo', 'yào', 'qī'], answer: 1, exp: 'Trong số điện thoại, số 1 đọc là "yāo" để tránh nhầm lẫn với số 7 (qī).' },
            { q: 'Chữ <span class="question-highlight">喂</span> (wèi - a lô) có bộ thủ gì?', options: ['Bộ Thủy (氵)', 'Bộ Khẩu (口)', 'Bộ Nhân (亻)', 'Bộ Mộc (木)'], answer: 1, exp: 'Vì là thán từ dùng miệng để gọi nên có bộ Khẩu (口).' },
            { q: '"Gọi điện thoại" trong tiếng Trung là cụm từ nào?', options: ['看电视 (kàn diànshì)', '打电话 (dǎ diànhuà)', '看书 (kàn shū)', '学习 (xuéxí)'], answer: 1, exp: '打电话 (dǎ diànhuà) nghĩa là gọi điện thoại.' },
            { q: 'Cấu trúc "Gọi điện thoại CHO ai đó" là gì?', options: ['打电话给他', '给打电话他', '给他打电话', '他给打电话'], answer: 2, exp: 'Cấu trúc: 给 + Người nhận + 打电话.' },
            { q: 'Điền từ: 我是学生，他 ____ 是学生。 (Tôi là học sinh, anh ấy CŨNG là học sinh).', options: ['在 (zài)', '也 (yě)', '和 (hé)', '不 (bù)'], answer: 1, exp: '也 (yě) là phó từ mang nghĩa "Cũng".' },
            { q: 'Trợ từ <span class="question-highlight">吧</span> (ba) thường đứng ở đâu trong câu?', options: ['Đầu câu', 'Giữa câu', 'Trước động từ', 'Cuối câu'], answer: 3, exp: 'Trợ từ ngữ khí 吧 luôn đứng ở cuối câu (ví dụ: 我们走吧 - Chúng ta đi thôi).' },
            { q: '"Thích" trong tiếng Trung đọc là gì?', options: ['xǐhuan', 'xuéxí', 'shuìjiào', 'gōngzuò'], answer: 0, exp: '喜欢 (xǐhuan) có nghĩa là Thích.' },
            { q: 'Từ nào mang nghĩa là "Ngủ"?', options: ['吃饭 (chī fàn)', '学习 (xuéxí)', '睡觉 (shuì jiào)', '喝水 (hē shuǐ)'], answer: 2, exp: '睡觉 (shuì jiào) nghĩa là ngủ.' },
            { q: 'Dịch câu "Chúng ta đi ăn cơm nhé." sang tiếng Trung.', options: ['我们去吃饭吧。', '你们去吃饭吧。', '我们去吃饭吗？', '我们去不吃饭。'], answer: 0, exp: 'Dùng 吧 ở cuối để đưa ra lời đề nghị nhẹ nhàng "nhé/đi".' },
            { q: 'Từ <span class="question-highlight">电视</span> (diànshì) nghĩa là gì?', options: ['Điện thoại', 'Máy tính', 'Tivi', 'Phim ảnh'], answer: 2, exp: '电 (Điện) + 视 (Thị/Nhìn) = Tivi.' },
            { q: 'Phủ định của "Đang làm gì đó" (在...呢) là từ nào?', options: ['不 (bù)', '没有 (méiyǒu) hoặc 没 (méi)', '也 (yě)', '太 (tài)'], answer: 1, exp: 'Để phủ định hành động đang xảy ra, ta dùng 没 (在)... (Ví dụ: 我没在看电视 - Tôi không đang xem tivi).' },
            { q: '上午 (shàngwǔ) là buổi nào trong ngày?', options: ['Buổi sáng', 'Buổi trưa', 'Buổi chiều', 'Buổi tối'], answer: 0, exp: '上午 là Buổi sáng (trước 12h trưa).' },
            { q: 'Sắp xếp câu: 也 / 我 / 喜欢 / 猫 / 。', options: ['我也喜欢猫。', '我喜欢猫也。', '也我喜欢猫。', '我喜欢也猫。'], answer: 0, exp: 'Phó từ 也 (cũng) phải đứng TRƯỚC động từ chính (喜欢).' }
        ];

        // --- RENDER FUNCTIONS ---
        function render() {
            const hanziContainer = document.getElementById('hanzi-container');
            hanziContainer.innerHTML = hanziData.map(h => `
                <div class="hanzi-card">
                    <div class="char-display">${h.char}</div>
                    <div class="pinyin">${h.pinyin}</div>
                    <div class="meaning">${h.meaning}</div>
                    <div class="hanzi-details">
                        <p><b>🧩 Bộ thủ:</b> ${h.radical}</p>
                    </div>
                    <div class="memo">💡 ${h.memo}</div>
                </div>
            `).join('');

            const vocabContainer = document.getElementById('vocab-container');
            vocabContainer.innerHTML = vocabData.map(v => `
                <div class="flashcard" onclick="playSound('click'); this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="word-cn">${v.word}</div>
                            <div class="hint">👆 Chạm để lật</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="py">${v.pinyin}</div>
                            <div class="mn">${v.meaning}</div>
                            <div class="example-box">
                                <div class="ex-cn">${v.ex_cn}</div>
                                <div class="ex-py">${v.ex_py}</div>
                                <div class="ex-vn">${v.ex_vn}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- GAME LOGIC ---
        let currentQ = 0;
        let score = 0;
        let answering = false;

        function switchTab(tabId) {
            playSound('click');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (tabId === 'game') startGame();
        }

        function startGame() {
            currentQ = 0;
            score = 0;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            answering = false;
            const q = quizQuestions[currentQ];
            document.getElementById('score-display').innerText = `Điểm: ${score}`;
            document.getElementById('question-count').innerText = `Câu: ${currentQ + 1}/15`;
            document.getElementById('progress').style.width = `${((currentQ) / 15) * 100}%`;
            
            document.getElementById('question-text').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            if (answering) return;
            answering = true;
            
            const q = quizQuestions[currentQ];
            const btns = document.querySelectorAll('.option-btn');
            
            if (choice === q.answer) {
                btns[choice].classList.add('correct');
                score += 10;
                playSound('correct');
                showModal(true);
            } else {
                btns[choice].classList.add('wrong');
                btns[q.answer].classList.add('correct');
                playSound('wrong');
                showModal(false);
            }
        }

        function showModal(isCorrect) {
            const modal = document.getElementById('explanation-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            
            icon.innerText = isCorrect ? "✅" : "❌";
            title.innerText = isCorrect ? "Đúng rồi!" : "Tiếc quá!";
            title.className = `modal-title ${isCorrect ? 't-correct' : 't-wrong'}`;
            desc.innerText = quizQuestions[currentQ].exp;
            
            modal.style.display = 'flex';
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').style.display = 'none';
            currentQ++;
            if (currentQ < 15) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
            
            const medal = document.getElementById('medal-emoji');
            const title = document.getElementById('result-title');
            if (score >= 140) { medal.innerText = "🏆"; title.innerText = "Tuyệt đỉnh!"; }
            else if (score >= 100) { medal.innerText = "🥈"; title.innerText = "Rất tốt!"; }
            else { medal.innerText = "🥉"; title.innerText = "Cố gắng lên!"; }
        }

        // Khởi tạo ứng dụng
        window.onload = render;
    </script>
</body>
</html>
