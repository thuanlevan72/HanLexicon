version: '3.8'

services:
  db:
    image: postgres:16-alpine # Thay đổi ở đây
    container_name: hanlexicon_db
    restart: always
    environment:
      POSTGRES_DB: hanlexicon
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: