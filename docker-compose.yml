version: "3.8"

services:
  api:
    build:
      context: ./HanLexicon.Api
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=hanlexicon;Username=user;Password=password"
      MinioSettings__Endpoint: "minio:9000"
      MinioSettings__AccessKey: "minioadmin"
      MinioSettings__SecretKey: "minioadminpassword"
      MinioSettings__PublicUrl: "http://localhost:9000"
      JWT__Key: "Chuoi_Bi_Mat_Sieu_Cap_An_Toan_Dung_De_Ky_JWT_123456789!@#"
      JWT__Issuer: "TodoApp"
      JWT__Audience: "TodoAppUsers"
    ports:
      - "8080:8080"
    depends_on:
      - db
      - minio
  mandarin_flow:
    build: ./HanLexicon.Frontend
    container_name: mandarin_flow_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
  db:
    image: postgres:16-alpine # Thay đổi ở đây
    container_name: hanlexicon_db
    restart: always
    environment:
      POSTGRES_DB: hanlexicon
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # --- 2. DATABASE MỚI (CHẠY SONG SONG, TRẮNG TINH) ---
  db_empty:
    image: postgres:16-alpine
    container_name: hanlexicon_db_empty # Đổi tên container
    restart: always
    environment:
      POSTGRES_DB: hanlexicon_empty # Tên database bên trong (bạn có thể giữ nguyên hanlexicon nếu muốn)
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" # Đổi port ra ngoài thành 5433 để không đụng hàng
    volumes:
      - postgres_data_empty:/var/lib/postgresql/data # QUAN TRỌNG: Tên volume mới để data trống
  minio:
    image: minio/minio
    container_name: hanlexicon-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  postgres_data_empty:
  minio_data:
